ting\"). The feature stack did not justify the engineering cost.\n- Lesson: Aesthetic + cadence drove recognition. Features in service of cadence (Ask team) won. Features in service of depth (ingredient tap, servings, family edition) lost.\n\n### Product 3 — Habuild app Content Tab ❌ DISCOVERY FAILURE\n\n- Built in the main Habuild app. Has recipes embedded.\n- **52% of members don't know it exists.** (May 11 poll)\n- Multiple confused: *\"When I opened the app content tab is not there.\"*\n- Likely cause: app-version-gated (Sweta caught this).\n- Verdict: ❌ The thing we built is invisible to half of our most-engaged users. Discovery is the real problem, not content.\n- Lesson: An invisible feature = a non-feature. Onboarding/IA fix would deliver bigger lift than building new features.\n\n### Product 4 — Sunday Weekly Master Guide PDF ✅ EVIDENCE OF DEMAND\n\n- Sent on Sundays. Ashalatha mentioned starring it (\"the weekly master guide which they used to send on the weekends\").\n- Members ask for *more* of these (Isha, Madhavee).\n- Verdict: ✅ This is a content type that already worked, that members already save. Underleveraged.\n- Lesson: We have a working Sunday cadence already. The \"weekly chart\" Sumathi is asking for is essentially this.\n\n### Product 5 — Saurabh Sir / Chef RJ Live Sessions ✅ STRONG TAILWIND\n\n- Supriya: *\"Also tried the recipes from chef Rajeev's sessions too\"*\n- Multiple acknowledgments of SB sessions\n- LD (live demo) sessions cited as a habit driver\n- Verdict: ✅ Live + recipe is a strong combo. Recipe shows up *during* a behaviour that already has SB authority attached. Highest credibility moment.\n- Lesson: Recipe content delivered *through* live yoga sessions (or paired with them) has the strongest authority signal. Bigger asset than our content-team-driven WhatsApp drops.\n\n## 3.2 Format experiments tried (within Product 2 or proposed)\n\n### Format A — Image (current WhatsApp PDF) ✅ WORKS\n\n- **66% prefer current image format** (May 7 poll)\n- Always reads, sometimes saves, occasionally cooks\n- One-handed, no auth, share-in-one-tap\n- Verdict: ✅ Don't change the image format. Add complementary surfaces only.\n\n### Format B — Step-by-step in-app ⚠️ MIXED\n\n- **20% prefer this** (May 7 poll)\n- Members who want this are the App Archivist segment (Madhavee, Sweta) and tech-confident cooks\n- Doesn't work as a *replacement* — works as a *secondary* on tap-through\n- Verdict: ⚠️ Useful for the 20% who'll opt in. Not the default. We built this. It's correct.\n\n### Format C — Short 1–2 min video ⚠️ MIXED\n\n- **12% prefer this** (May 7 poll)\n- Sweta: *\"if possible some shorts like boiling, or 3D images like smoke coming out\"*\n- High production cost\n- Verdict: ⚠️ Niche demand, high cost. Not worth investing now. Could be 1 per week if it slots into SB sessions.\n\n### Format D — Voice notes ❌ DEAD\n\n- **0% prefer this** (May 7 poll). Literally zero votes.\n- One member said \"voice note English\" — but in the poll itself, 0 votes.\n- Verdict: ❌ Kill. Free up the production capacity.\n\n### Format E — Magazine layout (current Product 2) ✅ AESTHETIC WORKS\n\n- Members called it \"interesting\", \"motivating\", \"good\"\n- Story-first (member dish) was specifically praised by Achla\n- But the magazine *features* (ingredient tap etc.) didn't connect\n- Verdict: ✅ The look + feel + story-first layout WORKS. The feature stack inside didn't deliver. Keep the aesthetic, simplify the features.\n\n### Format F — Theme-of-the-week (Herbal Tea Week style) ✅ STRONGEST FORMAT\n\n- **85% recall** weeks later\n- Daily variations of one idea\n- See section 2.1\n- Verdict: ✅ The single highest-recall format we have. Underused.\n\n## 3.3 Features experimented (Product 2 stack)\n\n### F1 — Daily recipe stream ✅ WINNER\n\n- **64% top vote** — the only feature with broad recognition\n- \"A new recipe every morning\" is the value, not the surrounding features\n- Verdict: ✅ The cadence IS the product. Build everything else in service of this.\n\n### F2 — Tap ingredient → photo + 7 Indian languages + substitutes ❌ UNDERWHELMING\n\n- **5% top vote** (last place)\n- Highest engineering cost (33 ingredient photos, 7 regional names each, substitute logic, etc.)\n- Why it didn't land: this audience already KNOWS what jowar is. They speak 2 of those 7 languages already.\n- May matter more for: younger members, new cooks, regional outsiders\n- Verdict: ❌ for this audience. Cut to minimal regional-name tooltip (Milan asked); reclaim engineering time.\n\n### F3 — Servings selector (1/2/4/6 with auto-scale) ⚠️ MID\n\n- **8% top vote**\n- Achla and Priyaga specifically asked for measurements + grams\n- Members didn't notice it in the test — but those who needed it found it useful\n- Verdict: ⚠️ Keep but don't promote. Useful for the precision-cooker (small slice).\n\n### F4 — Family Edition tip (joint family scaling) ⚠️ NICHE, RIGHT IDEA\n\n- **8% top vote**\n- Chitra's quote was the qualitative genesis. The feature exists *because* of her message.\n- But only 8% recognised it. We didn't surface it well.\n- Verdict: ⚠️ Right idea, weak surfacing. **Re-position rather than re-build:** make it the default (\"This recipe, for the whole family\") rather than an accordion.\n\n### F5 — Ask the team a question inside recipe ✅ SLEEPER HIT\n\n- **15% top vote (#2)** — under daily recipe but well clear of all the depth features\n- 72% have questions sometimes (May 19 poll: 16+39)\n- Real questions in the chat: *\"Can diabetics have ambali in dinner?\"*, *\"Wheat flour okay?\"*, *\"Quinoa explanation?\"*\n- Verdict: ✅ Real demand, low product surface area. **Build the auto-answer + escalate flow with intent.** This is the WhatsApp-can't-do-this wedge.\n\n### F6 — Member featured recipe (story-only initially, recipe added later) ⚠️ STORY WORKS, MISSING RECIPE WAS A BUG\n\n- Achla: *\"Story is definitely motivating BUT if someone wants the recipe, how to get it?\"*\n- Priyaga: same\n- We added the recipe in same session (now lives at /tmp/habuild-nutrition/)\n- Verdict: ⚠️ Story+recipe together is the unit. Story alone teases; recipe alone bores. Combo is gold.\n\n### F7 — Share with WhatsApp (text + image) ✅ WORKED AFTER ITERATION\n\n- First version: preview modal + image generation = confusion + bugs\n- Fixed: direct WhatsApp redirect with text + auto image download = clean\n- New message format: *\"Today I tried 'recipe' — super healthy and delicious!\"* + URL\n- Verdict: ✅ Once we cut the preview modal it works cleanly. Iterated successfully in real-time during the test.\n\n### F8 — Onboarding walkthrough (5 screens for product features) 🟡 BUILT, NOT TESTED\n\n- Added based on the realisation that members were confused about purpose\n- Sweta specifically asked: *\"please clearly share message in the request or small 1 minute video about purpose\"*\n- Verdict: 🟡 Built but didn't get tested in this round. Test in next round.\n\n### F9 — Quick Quiz inside recipe ❌ REMOVED\n\n- Was originally part of recipe detail (Day 1 quiz, etc.)\n- Members didn't react to it\n- Khushi requested removal mid-test\n- Verdict: ❌ Cognitive load with no perceived value. Removed correctly.\n\n### F10 — Filter by health condition ⚠️ BUILT BUT NOT THE TOP CHOICE\n\n- **39% prefer this** (#2 in the May 20 poll)\n- Built as primary filter on browse screen\n- Verdict: ⚠️ Useful as a *secondary* dimension. Not the primary nav.\n\n### F11 — Filter by meal time (breakfast/lunch/dinner/snack) 🟢 NOT BUILT — STRONGEST DEMAND\n\n- **58% prefer this** (#1 in the May 20 poll)\n- We didn't build it. We built filter-by-condition instead.\n- Verdict: 🟢 Build this next. Single biggest IA fix available.\n\n### F12 — Filter by ingredient I have ❌ LOW DEMAND DESPITE INTUITION\n\n- **3% prefer this** (#3 in the May 20 poll)\n- We built browse-by-ingredient in the prototype\n- Verdict: ❌ Counter-intuitive — we assumed ingredient browse was big. It isn't. The \"mix-and-match cook\" doesn't browse, she just swaps.\n\n### F13 — Saved recipes view ✅ BUILT, USED\n\n- Bookmark + Saved filter chip + Saved link on home\n- Direct response to the \"starring on WhatsApp\" behaviour\n- Verdict: ✅ Right surface. Mirrors a known habit. Should grow as we accumulate recipes.\n\n### F14 — Recipe FAQ auto-answer (matched from PDF + question bank) ✅ INFRASTRUCTURE SOLID\n\n- 100 FAQ entries per recipe (20 non-Ambali recipes × 5 themes)\n- 35 Ambali-specific FAQs\n- Plural stripping, ambali synonyms, recipe-scoped answers\n- Verdict: ✅ Robust backend. Underused because Ask CTA needs better promotion.\n\n### F15 — Search past recipes 🟢 NOT BUILT — 42% FRICTION\n\n- 42% of members report friction finding old recipes\n- Madhavee called it out twice across two rounds\n- Verdict: 🟢 Build this. Structural blocker for the \"build up your cookbook\" thesis.\n\n### F16 — Weekly meal plan (Saturday delivery) 🟢 NOT BUILT — REPEATED REQUEST\n\n- Isha + Sumathi + Madhu in two rounds\n- Fits the \"tips & tricks\" 47% demand\n- Verdict: 🟢 Build this. Anti-WhatsApp wedge (WhatsApp can't easily render a weekly table).\n\n### F17 — Swap Chips / ingredient alternatives 🟢 PARTIALLY BUILT (in ingredient sheet) — UPGRADE NEEDED\n\n- Substitute list lives inside the ingredient sheet (low-traffic)\n- Should be at the recipe-line level: *\"Out of methi? Use ajwain\"* inline\n- Verdict: 🟢 Mix-and-match cook (30% segment) needs this surfaced. Critical.\n\n### F18 — Member submission flow (Add your recipe) ✅ BUILT, NEEDS UGC TRIGGER\n\n- Simplified to 3 fields: Name · How to make · Why it's special (one line)\n- 99% in poll said they'd share\n- Verdict: ✅ Right shape. Needs a prompt (\"Have you tried this? Share your version\") to activate.\n\n### F19 — Servings + grams + bowl size ⚠️ HALF-BUILT\n\n- We have qty + grams in tsp/tbsp/cup mapping\n- Achla still asked: *\"What's the bowl size? It'll be good if the measure is given in grams as well\"*\n- We don't show grams for cups/glasses well\n- Verdict: ⚠️ Finish the metric story. Especially for new ingredients (quinoa, microgreens).\n\n### F20 — Multilingual UI (Hindi-first) 🟢 NOT BUILT — REPEATED HINTS\n\n- Multiple Hindi/Marathi messages\n- Members write to us in mother-tongue, we reply in English\n- Language preference not directly polled\n- Verdict: 🟢 Test in next round. Likely a 30–40% lift in clarity if even just the headings are Hindi.\n\n### F21 — Onboarding video (1-min explainer) 🟢 NOT BUILT — ASKED FOR\n\n- Sweta: *\"please clearly share message in the request or small 1 minute video about purpose\"*\n- Multiple confused: \"Is this Facebook?\"\n- Verdict: 🟢 Cheapest win in the list. SB-voiceover, screen recording, done.\n\n## 3.4 Cross-cutting product insights\n\n### Insight A — Cadence is the product\n\nDaily recipe (64%) trounced every depth feature. The bigger lesson: **stop building features that compete with cadence. Build features that AMPLIFY the daily ritual.**\n\n### Insight B — WhatsApp wins habit, App should win memory\n\n- WhatsApp: arrives in your hand, no auth, share-able, familiar\n- App: search, archive, durability, personalisation, community\n- **Don't compete on speed. Compete on memory.**\n- This is now the locked thesis (confirmed across 2 rounds).\n\n### Insight C — The intention-action gap is the real problem\n\n64% read, 1% cook same-day. Everything we build should target this gap. The features that connect to *acting* (saved, family-edition, ask-team) outperform features that connect to *understanding* (ingredient tap, regional names).\n\n### Insight D — Themes > Recipes\n\nHerbal Tea Week 85% recall after weeks. A random Wednesday recipe? Forgotten by Friday. Programme content as themes (1-week arcs), not isolated recipes.\n\n### Insight E — Education > Volume\n\n47% want tips/tricks > 7% want more recipes. Stop scaling content; start adding depth. One recipe + one why-it-works tip > two recipes.\n\n### Insight F — Community wants to publish, not just consume\n\n99% will share. UGC loop is wide open. Featured member story chain (Ashalatha → Kirti → group) proves it.\n\n### Insight G — Older users need explicit purpose framing\n\nConfusion was high in Product 2 test. Older users can't infer the goal from the UI. **Always lead with: \"What is this? Why am I here? What do I tap?\"**\n\n### Insight H — The week has a shape\n\nSaturday/Sunday is the planning + content drop slot. Weekday is execution. Design to the existing weekly rhythm, don't impose a new one.\n\n---\n\n# PART 4 — Strategic Recommendations\n\n## Stop / De-prioritise\n\n- ❌ Voice notes (0% demand)\n- ❌ Heavy ingredient detail sheets (5% recognition, very high cost)\n- ❌ Quick quiz inside recipes (removed correctly)\n- ❌ Trying to win the WhatsApp daily delivery battle\n- ❌ Filter by ingredient as primary nav (3%)\n- ❌ Adding more recipes without education context (7% want more recipes)\n\n## Ship next (priority order)\n\n1. **Onboarding 1-min video** — cheapest, most ROI, Sweta explicitly asked\n2. **Filter by meal time** — 58% top demand, IA fix\n3. **Saturday Weekly Plan** — already partially exists as \"weekly master guide\"; productise it\n4. **Search past recipes** — 42% friction, structural blocker\n5. **Ask the team — auto-answer + escalate** — sleeper feature, WhatsApp can't compete\n6. **Regional content axis (South, East, West)** — Pushpa-style content gap\n7. **Swap Chips at recipe-line level** — 30% segment validated\n8. **Member submission with prompt triggers** — 99% will share; we just need to ask\n9. **Content tab discovery fix** — 52% don't know it exists\n10. **Hindi UI test** — language A/B test\n\n## Test next (round 4 polls)\n\n1. *Would you pay ₹49/month for the recipe feature inside Habuild?* (Pricing)\n2. *If we sent you ONE recipe + ONE tip every morning, would that beat current?* (Education vs volume head-to-head)\n3. *Saturday Weekly Plan vs daily recipe — which would you actually use?* (Cadence)\n4. *Hindi UI, English UI, or both?* (Language)\n5. *Re-run the App vs WhatsApp poll after Product 2* (Re-test the verdict)\n6. *Family-first framing vs individual recipe — which do you cook more?* (Positioning test)\n\n## The strategic call\n\n**This is not a recipe app.**\n\nIt's a **\"what changed in my kitchen this week\" archive built on top of WhatsApp's daily ritual.** Most of the design work that follows flows from accepting that frame.\n\nThe product unit is not a recipe. It is a **themed week + searchable archive + member community + Q&A layer.**\n\nMembers are not asking for more content. They are asking for *help making the content they already get more useful, more retrievable, and more applicable to their lives.*\n\nThat's the wedge. That's where to invest.\n\n---\n\n# Appendix A — All 14 polls (with full options)\n\n| # | Date | Question | Top option | Votes | Total |\n|---|---|---|---|---|---|\n| 1 | May 7 | Pichhle 1 mahine mein Habuild ki kitni recipes try kari? | 5-6 recipes | 87 (52%) | 166 |\n| 2 | May 7 | Recipe image aane ke baad? | Turant padhti hoon | 101 (64%) | 157 |\n| 3 | May 7 | Recipe ke liye kya pasand? | Image (current) | 88 (66%) | 131 |\n| 4 | May 7 | What would you prefer? | Tips and tricks for healthy eating | 85 (47%) | 177 |\n| 5 | May 7 | Purane recipes baad mein use? (v1) | Yes | 63 (84%) | 75 |\n| 6 | May 7 | Pichhle hafte ki recipe dobara dekhni? | Easily mil jaati hai | 60 (59%) | 102 |\n| 7 | May 7 | Purane recipes baad mein use? (v2) | Yes | 95 (82%) | 116 |\n| 8 | May 8 | Herbal Tea Week recall? | Yes | 138 (85%) | 163 |\n| 9 | May 9 | Test new app feature? | Yes today | 93 (70%) | 132 |\n| 10 | May 9 | App vs WhatsApp? | **WhatsApp message** | **61 (62%)** | 99 |\n| 11 | May 11 | Tried Product 1 link? | Yes | 59 (88%) | 67 |\n| 12 | May 11 | Content tab seen in Habuild app? | **No** | **35 (51%)** | 68 |\n| 13 | May 19 | Share own recipes? | Yes | 67 (86%) | 78 |\n| 14 | May 19 | Questions on shared recipes? | Depends, sometimes | 39 (45%) | 88 |\n| 15 | May 20 | Most useful Product 2 feature? | A new recipe every morning | 25 (64%) | 39 |\n| 16 | May 20 | Find recipes by? | **Meal time** | **21 (58%)** | 36 |\n\n# Appendix B — Notable members & quotes (for future research outreach)\n\n- **Madhavee Kedari (Chennai)** — App Archivist segment, repeated cross-rounds\n- **Supriya Kamath Viegas (Mumbai)** — WhatsApp Ritualist, has year-old recipe references\n- **Ashalatha (Bengaluru)** — Quiet Evangelist, shares photos unprompted, South Indian voice\n- **Kirti Sarmalkar (Indore)** — Quiet Evangelist, shared variant of Ashalatha's recipe\n- **Geeta (Nagpur)** — Outcome story: husband's sugar 145→124\n- **Chitra Srivastava** — Joint Family Cook, source of Family Edition idea\n- **Ravina Bellara** — Mix-and-Match Cook, asked for substitutes by name (twice)\n- **Achla** — Detailed UX feedback, asked for grams, bowl size\n- **Sweta Shah** — Tech-confident, gave detailed bug reports + onboarding video suggestion\n- **Milan Padgaonkar** — Regional names, ingredient photo request\n- **Babita Mishra** — \"Who shouldn't have this\" — safety/restriction request\n- **Anagha Pandit** — Health-condition specific question (diabetic ambali in dinner?)\n- **Pushpa** — \"We want all over India\" — regional gap\n- **Isha (Delhi)** — Weekly meal plan request, season-tagging\n- **Sumathi Potdar** — Weekly chart for full day request\n- **Manjula** — Langhanam therapy practitioner, advanced cook\n- **Shubhada Katti** — 3-year-old grandson cook, no-sugar advocate\n- **Chef RJ (Rajeev)** — Habuild's own chef-instructor — uses the app, asks UGC question\n- **Dr Laxmi Divekar** — Doctor in the cohort, gives medical-style answers\n\n# Appendix C — File map for this research\n\n- **This report:** `/Users/khushibagai/Documents/Habuild/research/recipe-feedback-group-insights-2026-05-21.md`\n- **Round 2 synthesis (May 11):** `recipe-feedback-group-synthesis-2026-05-11.md`\n- **Deep UX insights (May 13):** `recipes-deep-ux-insights-2026-05-13.md`\n- **Recipe app project memory:** `~/.claude/projects/-Users-khushibagai/memory/project-recipe-app.md`\n- **Prototype Product 1:** `khushibagai-create/habuild-your-recipes` GitHub\n- **Prototype Product 2:** `khushibagai-create/habuild-nutrition` GitHub\n- **Habuild master CLAUDE.md:** `/Users/khushibagai/Documents/Habuild/CLAUDE.md`\n- **Chat export 3 (this round):** `/Users/khushibagai/Downloads/WhatsApp Chat - Habuild Recipes - Feedback 3.zip`\n"},
  {"id": "recipe-feedback-r1", "title": "Recipes — Feedback Round 1 (May 11)", "group": "Recipes", "sc": "ps-a", "paraSection": "resources", "filename": "recipe-feedback-group-synthesis-2026-05-11.md", "content": "---\ndate: 2026-05-11\nsource: WhatsApp export \"Habuild Recipes - Feedback\"\ngroup_size: 642 join events (net ~605 after 37 leaves)\nperiod: 6 May 2026 (group created) → 11 May 2026\nextracted_by: Khushi (PM)\n---\n\n# Recipe Feedback Group — Synthesis (Week 1)\n\nA \"Habuild Recipes - Feedback\" WhatsApp group was set up to validate the Recipe Locker concept (https://khushibagai-create.github.io/habuild-your-recipes/) with members already engaged enough to actively ask for daily recipes. 605 members joined; 221 messages exchanged; 11 polls run; the live app prototype was shared on Day 4 and tested by ~92 members same-day.\n\nThis synthesis is the **clearest signal we've ever had** on the recipe product question. Several findings overturn or sharpen what the earlier 84-member synthesis showed.\n\n---\n\n## Headline findings (in priority order)\n\n### 1. WhatsApp is winning preference (61 vs 38) but for *very specific* reasons we can solve in-app\n\nWhen the live prototype was shared and members voted **\"Will you prefer recipes in the app or WhatsApp?\"**:\n\n| Option | Votes |\n|---|---|\n| **WhatsApp message** | **61 (62%)** |\n| App feature | 38 (38%) |\n\nThis looked like a loss at first glance. But the open-ended reasons revealed that **WhatsApp doesn't actually have a structural advantage — it has a habit advantage that the app can match if we copy WhatsApp's three properties**: starrable, always-on, no extra app-open.\n\nThe WhatsApp preferrers gave three reasons, all addressable in-app:\n\n> *\"What's app would be easier as you can keep them starred & I am already doing it for reference. I also refer to an year old OH salad recipes too on what's app... We can have a group for recipes alone which can be visited/referred to anytime.\"* — Supriya Kamath Viegas\n\n> *\"Kisi din busy hone se chut jata hai, samjh nahi aata kahan se shuru karu, itne msgs ho jaate hain... aisa lgta h kuch important miss n ho, pr sab dekhne ka tym b nhi hota\"* — Madhu Tayal (this is actually a WhatsApp *complaint* dressed as a WhatsApp preference)\n\n> *\"All three\"* — when asked \"do you prefer WhatsApp because it's easy / storage issue / habit\", many members said all three. Habit is the dominant driver.\n\n**The 38 who voted for the app gave structural reasons:**\n\n> *\"Better in Habuild app itself if recipes are available. We can check easily when ever we want. WhatsApp we need to go back and search. If we change phone all messages will go. If it is there in Habuild app, it will be very convenient.\"* — Madhavee Kedari (this is the same Madhavee who said \"If all recipes are available in app that will be easy\" in the earlier survey — she's the canonical persona for app-preferrers)\n\n> *\"If it's in App we can visit it any time and no need to save. Only download option should be there.\"* — Sweta Shah\n\n> *\"App looks good to me. I am sure all previous recipes will be stored in it and one can refer anytime. If we store in WhatsApp the mobile storage can be an issue for some. Also will app allow sharing recipes by members?\"* — Chef RJ\n\n> *\"I will prefer having recipes in App instead of WhatsApp, ma'am 🙏 I have the Habuild app. But nutrition is not there in it.\"* — R Bharathi\n\n**Strategic implication:** Don't fight WhatsApp. **Keep delivering on WhatsApp, but make the app the durable archive** — starrable, searchable, phone-change-proof, no storage cost. The members who voted WhatsApp will continue to use WhatsApp as the daily delivery, and pull from the app for retrieval. This was already the strategic frame from the earlier synthesis — now confirmed by 99 votes.\n\n### 2. The \"content tab\" awareness gap\n\nPolled on Day 5: **\"Have you seen content tab in Habuild App?\"**\n\n| Option | Votes |\n|---|---|\n| **Yes** | **27 (47%)** |\n| **No** | **30 (52%)** |\n| Maybe | 1 (1%) |\n\n**More than half of our most-engaged recipe members don't know the content tab exists.** Babita and another member responded:\n\n> *\"But when I opened the app... content tab is not there.\"* — Babita Mishra\n> *\"No, the content tab is not there\"* — anonymous (99301 06161)\n\nSweta caught the likely cause: *\"Update this message as it's visible after App update.\"*\n\n**Strategic implication:** Two related problems — (a) discovery: the content tab is invisible to half the cohort, and (b) delivery: even members on the latest app version may not see it (possibly version-gated or hidden in a sub-menu). This is a wedge for the recipe feature: if content tab discovery is fixed, recipe locker discovery gets fixed for free.\n\n### 3. Mix-and-match cooking is the dominant behaviour — at scale this time\n\nLast synthesis (n=30 open-ended) had 8 voices on mix-and-match. This time the same theme came back from a much larger pool with even more force:\n\n> *\"I mostly do mix and match of healthy recipes as per ingredients at home\"* — Ravina Bellara\n> *\"Even I do that 😊\"* — Happy Mother's Day (cascading \"same here\" responses)\n> *\"Same...me too\"* — Pushpa\n> *\"Mix and match with my recipies\"* — Neelam Doshi\n> *\"I follow Langhanam therapy on all Mondays.\"* — Manjula (people personalise recipes around their own habit systems)\n> *\"I do not try as per the cooking instructions given in the recipe booklet, instead I choose some ingredients and like to cook them as per my style and taste.\"* — anonymous (99301 06161)\n> *\"Cook recipes based on ingredients & also the family mood specially kids.\"* — Supriya\n> *\"I tried all the recipes but little changes coz with present ingredients and with my ideas.\"* — Krupa\n> *\"Mix & match I do..\"* — Sumathi\n> *\"I prepare recipes often n sometimes mix n match.\"* — Seema\n> *\"By and large I try to make most of the recipes and enjoy the process with my family.\"* — sunanda\n> *\"depending on the availability of ingredients\"* — Deepa, Varalakshmi (repeats)\n\n**Plus a direct ask for ingredient substitution support:**\n\n> *\"We would also appreciate if you could add in the alternatives of the ingredients just in case if some ingredients are not available\"* — Ravina Bellara\n\n**Strategic implication:** The Swap-It Chips idea (currently archived from v3 brainstorm) needs to come back into the build sequence. Members aren't asking for new recipes — they're asking for **adaptable** recipes. This is one of the most-recurring asks across both research rounds.\n\n### 4. Strong demand for: regional variety, seasonal recipes, and content gaps\n\nMembers are asking for specific recipe categories, not generic recipes:\n\n**Regional / dietary diversity (high signal):**\n> *\"Almost all are North Indian recipes. We want recipes from all over India — North, South, East, West and healthy\"* — Pushpa\n> *\"South we use lots of millets in breakfast.\"* — Ashalatha\n> *\"We use ragi & jawar flour regularly\"* — Duriya, Jayshree\n> *\"We need Recipes using all kinds of millets. Like dosa, idly, upma, kitchidis, pongal.\"* — Amruth\n\n**Seasonal recipes (recurring):**\n> *\"I would prefer more seasonal recipes like now we have summers so you know sattu ka different recipes.\"* — Raj Khopkar\n> *\"Please indicate which ones are summer friendly. Delhi is very hot now.\"* — Isha\n> *\"Sure sure ma'am we will add more recipes\"* — Khushi (already responded)\n\n**Specific gaps:**\n> *\"Recipes of oats, cornflakes, mussels, dry fruits\"* — Amruth\n> *\"More salads (fruit, vegetables, nuts, seeds, etc.)\"* — Amruth\n> *\"Recipes of drinks, juice, for problems related to gastric, acidity, digestive problems, indigestion\"* — Amruth\n> *\"More vegetarian gravies for chapati, pulka, roti types\"* — Amruth\n\n**Weekly meal-planning ask (top-3 in importance):**\n> *\"It would be nice if recipes for a given week are sent on previous Saturday. This will help us plan our meals and buy necessary ingredients in advance. Else it becomes difficult for working people.\"* — Isha\n> *\"It would be nice if you prepare weekly chart of morning drink to night dinner of different varieties daily\"* — Sumathi\n\n**Strategic implication:** Three productisation angles —\n- **Regional filter chip** in the locker (already in v3 design) — needed.\n- **Seasonal tag** (\"Summer-friendly\", \"Winter-friendly\", \"Monsoon-light\") — net new but trivial to add.\n- **Weekly meal plan view** — Sumathi and Isha both asked for this independently. Could become a \"Sunday plan\" mode where the next week's recipes drop on Saturday with a shopping list.\n\n### 5. Family-feeding context is universal — and unsolved\n\nSame theme as last synthesis, even stronger now:\n\n> *\"Joint family men apne liye alag se banane men thoda problem hota hai\"* — Chitra\n> *\"Same but fir b mein humchar mein, my husband, my in-laws ke liye one time kuch bhi isme se healthy try karti hu regular\"* — Madhu (translates: I make Habuild-healthy version for the family at least one meal a day)\n> *\"I make them all for my grandson too. He's 3 yrs old and till now hasn't tasted sugar.\"* — Shubhada (grandmother personifying the cooking-for-family persona)\n> *\"I have tried almost all your salad recipes & my family enjoys them.\"* — Supriya\n> *\"By and large I try to make most of the recipes and enjoy the process with my family.\"* — Sunanda\n\n**Strategic implication:** The Family Mode toggle (already shipped) is on the right track. Worth adding: a **\"Made for [household member]\"** tag option — e.g. \"Recipes my grandson loves\" — to surface a sub-collection of family-friendly recipes.\n\n### 6. Members are evangelising organically — UGC potential is real\n\nWhen Madhu mentioned ragi laddoo, **8+ members in the next hour asked for the recipe**, and Ashalatha shared it via two photos. Pure UGC chain.\n\n> *\"Recipe of ragi laddu. Just follow this recipe.\"* — Ashalatha (shared two photos)\n> *\"Thank you Asha ji for the recipe 🙏😊 I will definitely make it today.\"* — Suvra, Bharathi, Sharadha, Geetha, Mayamoon, Tuhina, Latha all chimed in asking\n> *\"I am making laddu yesterday but adding ragi flour with akrod and makhana, jaggery.\"* — Kirti (with their own variant)\n\nThis is the **Recipe Remix Wall idea from v3 brainstorm coming to life organically.** Members WANT to share their adapted recipes with each other. The 13% who \"forward to family group\" in the first poll just demonstrated the behaviour in their own group, completely unprompted.\n\n**Strategic implication:** Build a lightweight UGC mechanic. Don't make it a full social feed (moderation cost) — make it **\"What I changed: [photo + 1-line swap]\"**, opt-in, surfaced as a small strip below the canonical recipe. Tap to thank (\"👏 78 others tried this version\"). Khushi already has examples to use as design references.\n\n### 7. The \"we already know these recipes\" tension\n\nSeveral members noted:\n\n> *\"Almost similar types of all recipes... we used to make at home since long 🙂\"* — Dr Dipak Karia\n> *\"Most of them I used to already prepare so wasn't difficult for me to follow all\"* — Shubhada\n> *\"Many of the snacks recipes we follow from the childhood itself.\"* — Shobha\n> *\"Almost similar types of all recipes.. i used to make at home.\"* — Ujjwala\n\nThis is a double-edged signal:\n- **Positive:** the recipes feel familiar/trustworthy, no exotic ingredient friction\n- **Negative:** members may not perceive the recipe layer as adding much novelty\n\n**Strategic implication:** This is exactly what the \"Tips & Tricks\" idea solves (highest demand in earlier survey at 85 votes). Members already cook these dishes — what they want is the **upgrade** (why methi matters for diabetes, how fibre order changes glycemic load, etc.). This is the educational layer the app needs to lean into harder than recipe quantity.\n\n### 8. International members are a real segment we're excluding\n\n> *\"Does not allow to insert international numbers… please check\"* — Supriya\n> *\"So please include it once you launch & there will be many international community members too am sure\"* — Supriya\n> *\"I am going to USA for 5 months, due to different time zone I prefer WhatsApp\"* — Vidya Moondra\n\nHabuild has members in 169+ countries. **The onboarding currently forces +91, blocking everyone abroad** — and the only \"skip\" path forces them to never get personalised greeting / phone-based identity in Mixpanel.\n\n**Strategic implication:** Make the +91 prefix a dropdown with at least US/UK/UAE/AUS/CAN options (covers 95% of NRI members based on Habuild geography). Low-effort, removes a real onboarding wall.\n\n---\n\n## Quantitative snapshot — all 11 polls\n\n| # | Question | Top Answer | Count | Total | % |\n|---|---|---|---|---|---|\n| 1 | Recipes tried last month | 5–6 recipes | 87 | 166 | 52% |\n| 2 | What you do after receiving image | Turant padhti hoon (read immediately) | 101 | 157 | 64% |\n| 3 | Format preference | Image jaisi abhi (current image) | 88 | 131 | 67% |\n| 4 | What you want more of | Tips & tricks for healthy eating | 85 | 177 | 48% |\n| 5 | Do you save recipes? | Yes | 63 | 77 | 82% |\n| 6 | Finding old recipes | Easily mil jaati hai | 60 | 102 | 59% |\n| 7 | Do you cook with family in mind? | Yes | 95 | 116 | 82% |\n| 8 | Do you remember Herbal Tea Week? | Yes | 138 | 163 | 85% |\n| 9 | Interested in testing app feature? | Yes, will test today | 92 | 131 | 70% |\n| 10 | **App vs WhatsApp preference** | **WhatsApp** | **61** | **99** | **62%** |\n| 11 | Have you seen content tab? | No | 30 | 58 | 52% |\n\n### Key takeaways from polls\n- **Engagement is high.** 99 members voted on the make-or-break app vs WhatsApp question — that's ~16% of the 605-member group, a solid sample for week 1.\n- **The recipe loop is real.** 87% have cooked at least one recipe last month. Only 14% (23/166) haven't tried any.\n- **Image format wins, again.** 67% → image. Voice notes still get 0%. App step-by-step at 21%.\n- **138 members remember \"Herbal Tea Week\"** — content arcs have brand recall. The micro-habit theme strategy is the right packaging.\n- **Even the engaged cohort doesn't know the content tab exists** (52% No).\n\n---\n\n## Cross-referencing both research rounds\n\n| Theme | Earlier (n=84) | This round (605 members, 99-178 voters) | Verdict |\n|---|---|---|---|\n| Image format preference | 67% want it unchanged | 67% want it unchanged | **Bulletproof** |\n| Same-day cooking | 1% | 1.3% (2/157) | **Confirmed problem** |\n| Tips & tricks demand | 53% | 48% | **Top stated need** |\n| Joint family friction | 8+ voices | 8+ voices | **Persistent pain** |\n| Mix-and-match cooking | Dominant pattern | Even more voices | **Universal** |\n| Regional bias complaint | Pushpa, Ashalatha | Pushpa, Ashalatha, Amruth, Duriya, Jayshree | **Wider than thought** |\n| WhatsApp vs App preference | Implicit (\"if all recipes were in app it'd be easy\") | **Explicit 62%/38% for WhatsApp** | **New: WhatsApp is the habit, not the app** |\n| Content tab awareness | Not asked | 52% don't know it exists | **New: discovery problem** |\n| Phone-change recipe loss | Not asked | Madhavee surfaced this | **New: durability is an app benefit** |\n\n---\n\n## Top quotes for the thesis / leadership deck\n\n> *\"Searching for recipe is becoming difficult after we got ingredients. If all recipes are available in app that will be easy for us to make\"* — **Madhavee Kedari** *(the canonical app-preferrer)*\n\n> *\"Better in Habuild app itself if recipes are available. We can check easily when ever we want. WhatsApp we need to go back and search. If we change phone all messages will go.\"* — **Madhavee Kedari** (Day 4, after testing prototype)\n\n> *\"What's app would be easier as you can keep them starred & I am already doing it for reference. I also refer to an year old OH salad recipes too on what's app\"* — **Supriya** *(the canonical WhatsApp-loyalist)*\n\n> *\"Kisi din busy hone se chut jata hai... itne msgs ho jaate hain... aisa lgta h kuch important miss n ho\"* — **Madhu** *(the FOMO use case — WhatsApp's downside speaking for itself)*\n\n> *\"I do not try as per the cooking instructions given in the recipe booklet, instead I choose some ingredients and like to cook them as per my style and taste.\"* — **anonymous** *(mix-and-match philosophy in one line)*\n\n> *\"We would also appreciate if you could add in the alternatives of the ingredients just in case if some ingredients are not available\"* — **Ravina** *(direct ask for swap chips)*\n\n> *\"It would be nice if recipes for a given week are sent on previous Saturday. This will help us plan our meals and buy necessary ingredients in advance.\"* — **Isha** *(weekly meal-plan ask)*\n\n> *\"I make them all for my grandson too. He's 3 yrs old and till now hasn't tasted sugar\"* — **Shubhada** *(emotional core of family-feeding persona)*\n\n> *\"App looks good to me. I am sure all previous recipes will be stored in it and one can refer anytime. Also will app allow sharing recipes by members?\"* — **Chef RJ** *(asks for UGC feature unprompted)*\n\n> *\"if you can place an actual image of tea and that too without a tea bag will look proper. If possible some shorts like boiling, or 3D images like smoke coming out. In last it's written as SB ji teaches...mention the name Saurabh Sir..\"* — **Sweta Shah** *(specific design feedback on the prototype)*\n\n> *\"Tomorrow I will try\"* — **multiple members responding to the prototype URL** *(intent → trial behaviour we can measure in Mixpanel)*\n\n---\n\n## Recommendations for product\n\n### Ship next (locked in by this data)\n\n1. **Don't kill WhatsApp delivery.** The 62% preference is a habit, not a vote against the app. Continue Sunday weekly drops on WhatsApp. The app is the archive, not the delivery channel.\n\n2. **Make the content tab discoverable.** 52% of engaged members don't know it exists. This is the easiest fix with the biggest impact — solves recipe locker discovery for free.\n\n3. **Add Swap Chips** (previously archived). The single biggest unmet need. \"What if I don't have X?\" is asked by name. Implementation: each recipe gets 3–5 ingredient substitutes as chips below the ingredient list.\n\n4. **Add regional filter** to the locker grid. Pushpa, Amruth, Ashalatha, Duriya, Jayshree all asked. Implementation: chip set already exists for diabetic/quick/protein — add North/South/East/West.\n\n5. **International phone support** (+91 dropdown → multi-country). Currently blocking NRI members. ~5% of the active cohort flagged this in 5 days.\n\n### Ship next quarter\n\n6. **Seasonal tags / collections.** Summer recipes ask repeated; \"Summer-friendly\" filter chip. Same pattern can power Winter/Monsoon collections later.\n\n7. **Weekly meal plan view.** Sumathi + Isha asked. Could be a \"Sunday plan\" screen showing next week's 6 recipes + a one-tap shopping list.\n\n8. **Lightweight UGC (\"What I changed\").** Ashalatha's ragi laddoo response shows organic UGC chain. Surface this as a \"Member versions\" strip below each recipe with a single tap-to-thank action.\n\n### Validate before shipping\n\n9. **The content tab vs new recipe locker decision.** Are we adding a new locker, or is the existing content tab actually a recipe locker waiting to be discovered? Worth a conversation with Anshul/Bala before building parallel infra.\n\n10. **The app feature URL is not in Habuild app yet.** Members are confused — *\"Where is the app, which app are you all talking about?\"* (raniissrani10). The Mixpanel funnels we set up are tracking visitors to a standalone GitHub Pages URL, not the actual app. Need to ship the recipe feature into the Habuild app's content tab to get real funnel data.\n\n---\n\n## Mixpanel signal to verify (next 7 days)\n\nThe 92 members who voted \"Yes, I will test today\" and the 23 who said \"tomorrow\" — verify in Mixpanel that:\n- `App Opened` events count matches roughly 92–131 in the 24h after Khushi shared the URL\n- `Onboarding Completed` conversion rate (currently we suspect ~30–50% because of the +91 wall blocking international members)\n- `Recipe Opened` for Tulsi+Ginger Tea (the featured recipe for the week)\n- Filter by `project: recipe` to scope cleanly\n\nIf the Mixpanel data doesn't show 60+ `Onboarding Completed` events in the next 48h, the +91 wall + content-tab confusion are the bottlenecks — not the recipe feature itself.\n\n---\n\n## Open questions for next round\n\n- For the 38 who voted \"app feature\": is it because the prototype was already good, or because they're the digital-savvy minority? (Run a follow-up poll filtered to that segment with \"What did you like specifically about the app?\")\n- For the 61 WhatsApp voters: is \"I prefer WhatsApp\" the same as \"I will use only WhatsApp\"? Probably not — many likely use both. Need a \"Would you use both?\" follow-up.\n- The 23 members who said \"Ek bhi nahi\" (haven't tried any recipe) — are they newer members or members who just don't cook? Different problem.\n- Content tab feedback — pull NPS or 5-star rating on the existing content tab before launching the new recipe layer.\n\n---\n\n## Files referenced\n\n- WhatsApp export: `/Users/khushibagai/Downloads/WhatsApp Chat - Habuild Recipes - Feedback.zip`\n- Extracted: `/tmp/habuild-recipes-chat/_chat.txt` (221 real messages, 11 polls, 4 PDFs, 12 images, 1 audio, 1 video)\n- Earlier synthesis: `/Users/khushibagai/Documents/Habuild/research/recipe-features-prototype-context.md`\n- Live prototype: https://khushibagai-create.github.io/habuild-your-recipes/\n- Mixpanel project: User Research (ID: 3998338)\n"},
  {"id": "recipes-deep-ux", "title": "Recipes — Deep UX Insights (May 13)", "group": "Recipes", "sc": "ps-a", "paraSection": "resources", "filename": "recipes-deep-ux-insights-2026-05-13.md", "content": "---\ndate: 2026-05-13\ntype: deep-ux-research\nauthor: UX researcher pass on Khushi's 2-round recipe research\nstatus: insights doc — meant for PM review, not stakeholder share\ninput_data:\n  - recipe-feedback-group-synthesis-2026-05-11.md (Round 2, 605 members, 11 polls)\n  - recipe-features-prototype-context.md (Round 1, 84 + ~30 open-ended)\n  - recipe-app-session-state-2026-05-13.md (project state)\n  - feb-2026-recipe-database.md (18 recipes)\n  - recipe-app-mixpanel-funnels.md (funnel hypotheses)\n---\n\n# Recipes — Deep UX Insights (beyond the 1-pager)\n\nTwo rounds of research, ~700 unique voices, 18 recipes shipped, a live web app, and 11 polls. The headline numbers are clean. This doc is about what's **underneath** them — the segmentation, friction, contradictions, and the questions we still can't answer.\n\nThe thesis I land on at the end: **the product is not a recipe app. It is a \"what changed in my kitchen this week\" archive built on top of WhatsApp's daily ritual.** Most of the design work that follows flows from accepting that frame.\n\n---\n\n## 0. Re-reading the headline numbers (what they actually mean)\n\n| Stated finding | What it *looks* like | What I now think it actually means |\n|---|---|---|\n| 67% want WhatsApp image format unchanged | \"Don't change the format\" | \"Don't change the **ritual**. The image is a proxy for: it arrives in my hand, it's familiar, it's shareable in one tap, I don't have to authenticate.\" |\n| 53% want tips & tricks > more recipes | \"Members want education\" | Members are saying *\"I already know how to cook these dishes. Stop selling me recipes I can google. Sell me the upgrade.\"* They want **earned authority**, not content volume. |\n| 62% prefer WhatsApp over app (n=99) | \"App is losing\" | App is **competing against a habit, not a product**. The 38% who chose app gave structural reasons (durability, search, phone-change). The 62% gave emotional/habitual reasons. Habits beat features at week 1; durability wins at year 1. |\n| 52% don't know content tab exists | \"Discovery problem\" | \"We have a real estate problem inside our own app.\" Even our most-engaged members don't navigate past the home tab. This is a navigation IA failure, not a content one. |\n| 82% save recipes | \"Members value recipes\" | They value the **act of saving** — which is an aspirational action, not a usage action. Saving ≠ cooking. (Pinterest's entire model lives in this gap.) |\n| 87% remember \"Herbal Tea Week\" | \"Themes work\" | The brand has a content-arc memory that recipes alone don't have. **Themes are the unit, not recipes.** This is huge and underweighted. |\n| 1% cook same-day | \"Recipe-to-cook is broken\" | The recipe is **not a same-day instruction**. It's a *deposit into a personal cookbook* that gets withdrawn later. The current product design (Today's Hub, hero today's recipe) is solving the wrong problem. |\n\nThree of those re-readings are doing most of the work in the rest of this doc.\n\n---\n\n## 1. Behavioral segments — 5 archetypes underneath the data\n\nThe audience is not monolithic. The polls and quotes resolve into five distinct behaviour patterns. These are not personas — they're **states a member can be in**. The same Sushma-ji can move between them across a month.\n\n### Segment A — The WhatsApp Ritualist (~40% of engaged cohort)\n\n> *\"What's app would be easier as you can keep them starred & I am already doing it for reference. I also refer to an year old OH salad recipes too on what's app\"* — Supriya\n\n**Who:** Has WhatsApp open all day. Phone-literate but not app-literate. Stars messages already. Cooking is mid-morning after the live session. Recipe arrival is one of 200 daily WhatsApp pings; the Habuild ping is one of ~5 she actually opens.\n\n**Current behaviour:** Reads turant (immediately, 64%). Stars maybe 1 in 5. Cooks 5–6/month. Doesn't forward unless dish is novel.\n\n**Need:** No new app surface. Don't take WhatsApp away. Give her a way to retrieve the starred recipe 11 months later without scrolling. (Supriya quoted referring to a *year-old* OH salad. That is the actual job-to-be-done.)\n\n**What converts her to app:** Nothing converts her to \"instead of.\" Something converts her to \"in addition to\" — specifically a *one-tap \"save to my Habuild book\" forward* directly from the WhatsApp message. She never has to type. The link unfurls inside WhatsApp.\n\n**% of audience:** ~40% of engaged (extrapolating from the 62% WhatsApp preferrers weighted by habit-only reasons).\n\n---\n\n### Segment B — The App Archivist (~15% of engaged cohort)\n\n> *\"Better in Habuild app itself if recipes are available. We can check easily when ever we want. WhatsApp we need to go back and search. If we change phone all messages will go.\"* — Madhavee Kedari\n\n**Who:** Has changed phones, or is afraid she will. Has lost recipes. Has experienced WhatsApp's storage-full notification. Often digitally confident — uses banking apps, UPI, may be a teacher / clerk / former office worker.\n\n**Current behaviour:** Saves to WhatsApp + screenshots + sometimes a notebook. Triple-redundancy is itself a signal of pain.\n\n**Need:** A durable, searchable archive. **Doesn't need novelty.** Wants the past 12 months in one place, sortable.\n\n**What converts her to app:** This segment is *already converted*. She's the 38%. She just needs the app to actually contain what WhatsApp has. The product to her is: **\"WhatsApp's recipes, but they don't die when my phone does.\"**\n\n**% of audience:** ~15% of engaged. Small but high-LTV — she'll open the app weekly, not daily. Her presence in the data is structural, not loud.\n\n---\n\n### Segment C — The Joint Family Cook (~25% of engaged cohort, overlaps with A & B)\n\n> *\"Joint family men apne liye alag se banane men thoda problem hota hai\"* — Chitra\n> *\"I make them all for my grandson too. He's 3 yrs old and till now hasn't tasted sugar.\"* — Shubhada\n\n**Who:** Cooks for 4+. In-laws present. Husband has different preferences from kids. Mother-in-law's tastes are the constraint. This is not a segment — this is **the default state of 60–70% of 40+ Indian women**.\n\n**Current behaviour:** Reads recipe → mentally calculates \"can I make this for everyone, or just me at 11am alone?\" → 70% of the time the answer is \"just me, separately\" → which is the friction point.\n\n**Need:** *Permission* to cook for one. OR scale-for-six. The current Family Mode toggle solves scaling; it does **not** solve the emotional resistance of \"I'm cooking a separate weird thing for myself.\" That is a copy/positioning problem, not a feature problem.\n\n**What converts her:** Two things together: (1) **\"Make this as a side dish for the whole family\"** framing on every recipe, with portion math done for her, and (2) the **\"my grandson loves this\"** social proof — Shubhada's quote is the canonical evidence that cooking-for-family is *easier* when the recipe is positioned as family-first.\n\n**% of audience:** ~25% strong overlap with A & B. Not exclusive.\n\n---\n\n### Segment D — The Mix-and-Match Cook (~30% of engaged cohort, behavioural state not demographic)\n\n> *\"I do not try as per the cooking instructions given in the recipe booklet, instead I choose some ingredients and like to cook them as per my style and taste.\"* — anonymous (99301 06161)\n> *\"depending on the availability of ingredients\"* — Deepa, Varalakshmi, Pushpa, Yoga, Neelam (six independent voices, both rounds)\n\n**Who:** Cooks confidently. Doesn't need a recipe — needs an *idea*. Treats the recipe as a starting point, not a script. Sees Habuild content as inspiration, not instruction.\n\n**Current behaviour:** Reads recipe → mentally inventories her fridge → swaps 2–3 ingredients → cooks her version → doesn't recognise it as \"the Habuild recipe\" anymore.\n\n**Need:** **Permission to swap, surfaced inside the recipe**. Currently the app says \"1 tsp jeera, ½ tsp saunf\" with no acknowledgement that she will absolutely swap to ajwain if her cumin's run out. The recipe pretends she's a literal cook. She isn't.\n\n**What converts her:** Swap Chips. This is **the single highest-confidence feature in the whole roadmap** because the behaviour pre-exists the feature. Ravina asked for it by name.\n\n**% of audience:** ~30%. The biggest hidden segment in the data because they don't *complain* — they just silently deviate. The give-away signal: \"depending on the availability of ingredients\" repeated by 5 different people across two rounds.\n\n---\n\n### Segment E — The Quiet Evangelist (~10% of engaged cohort)\n\n> *\"Recipe of ragi laddu. Just follow this recipe.\"* — Ashalatha (shared two photos unprompted)\n> *\"I am making laddu yesterday but adding ragi flour with akrod and makhana, jaggery.\"* — Kirti (offered her variant)\n\n**Who:** The Ashalathas and Kirtis. Cooks well. Wants to teach. Already shares to WhatsApp groups (the 13% in Round 1's poll). When she finds a recipe that works, she becomes its salesperson.\n\n**Current behaviour:** Forwards to family WhatsApp groups. Adds her own twist. Will type a recipe out manually in WhatsApp if someone asks. Her variant is **better than the original** in the eyes of her cohort because it carries her trust.\n\n**Need:** A surface to publish her variant **with credit and lightweight social signal**. Not a full social feed (she's 50, she doesn't want a profile, comments, followers). Just: \"Ashalatha's ragi laddoo version · 47 batchmates cooked it.\"\n\n**What converts her:** The variant submission flow. Single biggest content-moat unlock for Habuild because at 14M members even 0.1% submission = 14,000 community recipes/cycle. Satvic structurally cannot match this — they have no cohorts.\n\n**% of audience:** ~10%. Tiny in count, **disproportionate in network effect**. They are the supply side of the future product.\n\n---\n\n### Segment overlap matrix\n\nA member can be multiple segments at once. The matrix matters because **features have to land for the intersections, not the segments in isolation.**\n\n|  | Ritualist (A) | Archivist (B) | Joint Family (C) | Mix-Match (D) | Evangelist (E) |\n|---|---|---|---|---|---|\n| **A** | — | Rare | Common | Common | Rare |\n| **B** | — | — | Common | Possible | Possible |\n| **C** | — | — | — | Very common | Possible |\n| **D** | — | — | — | — | Common |\n| **E** | — | — | — | — | — |\n\nMost common combo: **C + D** — the joint-family mix-and-match cook. This is the modal Habuild member. **She is not the persona the current Recipe Locker is designed for.** The current locker assumes a solo cook who follows recipes literally — i.e. essentially nobody in the data.\n\n---\n\n## 2. The friction map — full journey with evidence\n\nTracking from WhatsApp ping through to (potential) sharing back. Friction labels: **(L)** Low / **(M)** Medium / **(H)** High / **(K)** Killer (causes abandonment).\n\n| # | Step | What user does | Friction level | Evidence |\n|---|---|---|---|---|\n| 1 | Morning live session ends | Member types \"today\" in WhatsApp | L | Implicit — 87% engagement on cook = funnel works |\n| 2 | Recipe poster arrives | Reads in WhatsApp | L | 64% read immediately (Poll 2 both rounds) |\n| 3 | **Decides \"will I cook this today\"** | Mental calc: ingredients, time, family | **H** | 1% cook same-day. The decision happens here and the answer is almost always \"not today\" |\n| 4 | Stars / screenshots for later | Manual save action | **M** | Supriya: stars manually. Multi-redundancy (screenshot + star + notebook) = pain signal |\n| 5 | Days/weeks pass | Recipe sits in WhatsApp scroll | **H** | Madhu: *\"itne msgs ho jaate hain... aisa lgta h kuch important miss n ho\"* |\n| 6 | Decides to cook on a different day | Tries to retrieve recipe | **K** | Madhavee: *\"Searching for recipe is becoming difficult after we got ingredients\"*. **This is where the product dies.** |\n| 7 | Mental adaptation: \"I have lauki not bottle gourd\" | Improvises swaps | **M** | Ravina, Deepa, Varalakshmi, Pushpa, Neelam (5+ voices). Currently zero product support. |\n| 8 | Scales for family | Mental math × 4 or × 6 | **M** | Chitra, Madhu — explicitly cited. Family Mode partially addresses. |\n| 9 | Goes shopping | Buys missing ingredients | **M** | Isha asked for \"advance Saturday drop so I can plan shopping\" — gap |\n| 10 | Cooks | Follows or adapts recipe | L | 87% cook regularly — works |\n| 11 | **Reflects on what changed** | Did her family eat it? did she feel calmer? | **H** | Currently zero closure. Reflection screen exists but is empty of meaning beyond \"Done\" button. |\n| 12 | Considers sharing variant | Hesitates — \"is it good enough?\" | **H** | Ashalatha did it unprompted. The other 604 didn't. Threshold is too high. |\n| 13 | Phone changes / 6 months later | Wants to recook | **K** | Madhavee: *\"if I change phone all messages will go\"*. This is the durability killer. |\n\n### Insight: the two **K** (killer) friction points are #6 and #13 — both retrieval problems, not cooking problems\n\nThis reframes the whole product. The recipe app is not optimising for the cook step (step 10 — already at 87%). It is optimising for the **retrieval** step (6 and 13). Once we accept that, every feature priority shifts:\n\n- \"Recipe Locker\" is correct in name but **wrong in IA** if the home screen is \"Today's Hub\". Today's recipe is friction #3 (not-today decision). The home should be **\"My Saved Book\"**, not today.\n- Cohort signals on the recipe detail are wasted at step 10 — by then she's already committed. They belong at step 3 (\"**67 of your batch cooked this last Wednesday**\") or step 11.\n- Search is the most important feature, not filters. Madhavee said \"searching is difficult\" verbatim.\n\n---\n\n## 3. Hidden insights — things buried under the numbers\n\n### 3.1 \"Tips & tricks\" winning is not about tips. It's about authority.\n\n53% picked Tips & Tricks. The naive reading: \"members want more educational content.\" The real reading: **Habuild's biggest brand asset is SB's voice, and the recipe layer doesn't carry it.**\n\nLook at the quotes:\n- *\"Most of them I used to already prepare so wasn't difficult\"* — Shubhada\n- *\"Almost similar types of all recipes... we used to make at home since long\"* — Dr Dipak Karia\n\nThese members are **politely telling us the recipes are commoditised**. The same haldi-doodh exists on 200 YouTube channels. What they cannot get anywhere else: SB saying *\"yeh methi diabetes ke liye kaise kaam karti hai, woh main batata hoon\"* in his exact voice with his exact framing.\n\n**Implication:** Tips & Tricks isn't a content type. It's the **authority layer**. The 53% are saying \"give me the SB version of why this works.\" The Tips & Tricks Voice Layer (Idea #2 in Round 1) is mis-priced as #2 priority — it should be **integrated into every recipe**, not a separate feature. Every recipe = food + SB's 30-second \"why this matters.\"\n\n### 3.2 The WhatsApp preference is **partially** social context, not just habit\n\nUnderneath the \"WhatsApp is habit\" reading: WhatsApp is also where her *family group* lives. When she sees a recipe in WhatsApp, she's one tap away from forwarding it to \"Sasural Family ❤️\" or \"Daughters group\". The app cannot replicate that adjacency. The recipe in the app sits inside a single-player experience.\n\nEvidence:\n- 13% in Round 1 said they forward to family/friends groups\n- Ashalatha's ragi laddoo went viral *inside a WhatsApp group* — not in any app\n- Supriya: *\"We can have a group for recipes alone which can be visited/referred to anytime\"* — she's asking for a **social** retrieval surface, not a personal one\n\n**Implication:** The \"Share to WhatsApp\" CTA in the app is necessary but not sufficient. The deeper insight: **build the app to assume the recipe will leave it.** Every recipe should be designed to look good as a forwarded WhatsApp message. Branded share cards. Pre-written captions. Quote-tweet style (\"I made this — Shubhada\"). The app's job is to be the **production studio** for content that lives in WhatsApp.\n\n### 3.3 52% don't know the content tab — and that's the funnel ceiling\n\nThis is the most under-discussed number. If 52% of our **most-engaged** members (606 self-selected to a feedback group, the top decile of intent) don't know the content tab exists, then for the average member the number is closer to 80%.\n\nThe implication is structural: **anything we build in the content tab will hit a discovery ceiling of ~50% even after we ship it perfectly.**\n\nTwo paths forward:\n- **Path A — Promote the tab.** Push notification \"Did you know your content tab has 18 recipes?\" Onboarding tour. In-session pop-up after morning class.\n- **Path B — Bring the tab to where members already are.** Don't fight for tab attention — surface the recipe inside the home tab where 100% of openers go.\n\nPath B is more aligned with the data: members open the home tab daily after morning session. They don't navigate. The recipe feature should *be on the home tab today*, with a \"see all\" link to the content tab for the long-tail browse.\n\n**The \"where does the recipe live in the app?\" question is the biggest unanswered design call in the whole project.** It's hidden inside a discovery number.\n\n### 3.4 Saving without cooking — what does 82% save / 1% same-day cook actually mean?\n\nThe gap is the product. 82% save the recipe; only 1% cook it same-day. The other 81% are saving with intent that never converts.\n\nThis is **Pinterest behaviour**: aspirational saves that never get acted on. The product's real opportunity is not to push more cooking — it's to make the *saved-and-never-cooked* recipe useful in a different way. Three product moves come out of this:\n\n- **Re-surface old saves at the right moment.** \"You saved this 3 weeks ago. Cook it tonight?\" (push notification timing matters — Wed evening at 5pm, not Sunday)\n- **Reframe saving as collecting.** Not a to-do list. A personal cookbook she's building. The aspirational frame is what makes Pinterest work.\n- **Reward viewing the saved book.** \"You've saved 12 recipes. Here are 3 you'd love tomorrow morning.\" Curated re-discovery.\n\n### 3.5 \"Herbal Tea Week\" remembered by 85% — themes are sticky, recipes aren't\n\nThis is the highest-recall data point in the whole study and the one with the **most** under-applied product implication. **Themed weeks are stickier than individual recipes.** The product's content unit should be the week, not the day.\n\nCurrently the calendar screen shows 4 weeks (Hydration / Herbal Teas / Fibre / Balanced Plate). But the home screen shows today's recipe. Mismatch. The home should be: **\"Week 2: Herbal Teas — Day 3 of 6, here's today's\"**.\n\nThe week-as-unit framing also unlocks:\n- Sunday meal plan view (Isha asked for it)\n- Shopping list view (whole-week ingredient roll-up)\n- Weekly badge / completion (\"You completed Herbal Tea Week\")\n- Cross-cohort signals: \"Hema ji's batch is on Fibre Week today\"\n\nThe 85% recall is telling us: members remember the **arc**. They don't remember the recipe. Build for the arc.\n\n### 3.6 The 23 who said \"Ek bhi nahi tried\" are a different segment, possibly the most strategic\n\nWe ignored these 23 in the Round 2 synthesis. They are either: (a) new members who haven't had a month yet, (b) members who don't cook at all (consume Habuild for yoga only), or (c) members who only consume the daily nudge for habit reasons.\n\nIf (c) is even partially true, **there is a sub-segment for whom the recipe is performative content, not actionable content.** They read the recipe as a *micro-habit ritual* — \"I read today's tip\" = no-zero day equivalent for content. The cooking is not the point. The arrival is.\n\nThis is a really interesting hypothesis and we have no data on it. Listed in section 4 as a research gap.\n\n### 3.7 The voice-note format scored 0% — that needs interrogating, not accepting\n\nIn Round 1, Poll 3, voice note got 0 votes. We took that as \"voice notes are bad.\" But:\n- Voice notes are SB's strongest brand asset\n- 14M+ members consume his voice daily\n- The poll asked about *recipe* format — not authority/tips format\n\nI suspect what members rejected was: **recipe instructions delivered via voice note (hard to navigate, can't re-listen to step 4).** What they did **not** reject is *tips/why-it-works delivered via voice note* — the educational layer where voice's warmth advantage exists.\n\nThe 0% should not kill the voice layer. It should narrow it: **voice for tips, image for recipe.**\n\n### 3.8 The seasonal ask is a clock-driven content engine we're underweighting\n\nRaj, Isha asked for summer recipes. The data point looks small (2 voices). But underneath: **Indian cooking is fundamentally seasonal**. There are seasons inside seasons (early summer mango vs late summer watermelon, monsoon ginger vs winter ginger). A non-seasonal recipe app feels off-rhythm to a 50-year-old cook.\n\nThe Feb 2026 content is excellent but **time-locked to one month**. If a member opens the app in May, the herbal-tea-week framing feels stale. The product needs a **rolling seasonal calendar**, not a static one. This is content-engineering, not feature-engineering — but it's a foundational decision.\n\n---\n\n## 4. What we got wrong / what's still unknown\n\nHonest section. Where the data is thin and where we may be over-reading.\n\n### 4.1 Self-report bias is heavy\n\n- \"Yes I will test today\" (70%) → we don't know the actual Mixpanel cook rate\n- \"Cooked 5-6 recipes\" (52%) → no instrumented verification\n- \"Cook for family\" (82%) → social desirability bias; few people will admit \"I cook only for myself\"\n- \"Save recipes\" (82%) → saving doesn't mean using\n\n**What this means:** treat all stated-behaviour percentages as **directional, not absolute**. The Mixpanel data (when populated) will likely show 30–50% of stated rates.\n\n### 4.2 Selection bias in the Round 2 cohort\n\nThe 605 are members who actively joined a feedback group. By definition: top decile of engagement, intent, English/digital literacy. **The middle-of-funnel member is missing from this data.**\n\nThe 14M-member-scale finding might not generalise. The Sushma-ji in tier-3 Indore who never reads the feedback group invite — we have zero data on her.\n\n### 4.3 We don't know how cooking actually happens\n\nWe know what members *say* about cooking. We don't know:\n- When in the day they cook (morning vs evening?)\n- Whether they cook standing in the kitchen with phone propped up, or memorised in the morning and cooked later\n- Whether the phone is on Hindi or English\n- Whether they read the full recipe or scan for ingredients only\n- Whether they have one hand free or both\n- Whether the kitchen has good light to read the screen\n\n**This is in-context observation we have never done.** Even 5 home visits with a phone camera would change product direction significantly.\n\n### 4.4 We don't know the lurker:contributor ratio\n\nAshalatha posted. 8 asked for the recipe. 597 members didn't engage with the ragi laddoo thread. **What was happening for those 597?**\n\nPossibilities: (a) didn't see it (WhatsApp algo), (b) saw it but not interested in ragi, (c) cooks but doesn't care for laddoo, (d) interested but won't ask publicly. We don't know which. This determines whether UGC scales beyond Ashalatha.\n\n### 4.5 The 5 questions we still can't answer\n\n1. **How does retrieval actually happen?** When Madhavee wants a recipe she remembers from 3 weeks ago, what does she try first? WhatsApp scroll? Search? Ask in a group? Phone notebook? We need to watch.\n2. **What does \"I cook for family\" actually mean?** Same dish for everyone? Habuild version for self + regular for family? Habuild as side-dish? The Family Mode design assumes one of these but data doesn't say which.\n3. **Are the \"Ek bhi nahi\" 14% actually consuming the recipe as habit content?** Hypothesis 3.6 above — needs validation.\n4. **How does the voice format actually perform when isolated to tips, not recipes?** Need an in-flow A/B.\n5. **Will the variant-submission flow get >2% supply?** Ashalatha is one data point. We need to know if 1 in 50 will post.\n\n### 4.6 What we may have over-read\n\n- **The 62% WhatsApp preference** — we framed it as \"addressable habit.\" Some of it may be **structural** (older members will literally never download/use the app, period). The fix-with-features framing might be optimistic by 10–15 percentage points.\n- **The mix-and-match dominance** — we have 11 voices across two rounds. That's loud but not 50%. Don't be surprised if Swap Chips usage is 20-25%, not majority.\n- **The content tab as wedge** — solving discovery might unblock recipes for free, OR it might reveal that the content tab is poorly designed and members bounce. We're assuming the former.\n\n---\n\n## 5. Recommendations — ranked by impact × confidence\n\nFormat: each rec has Impact (1-5), Confidence (1-5), Effort (S/M/L), and the evidence it's based on.\n\n| # | Recommendation | Impact | Confidence | Effort | Key evidence |\n|---|---|---|---|---|---|\n| 1 | **Surface the recipe on the home tab** of Habuild app (not behind the content tab) | 5 | 5 | M | 52% don't know content tab exists; 100% open home tab daily |\n| 2 | **Reframe IA from \"Today's Hub\" to \"My Recipe Book\"** — make retrieval the home, today's recipe one card inside it | 5 | 4 | M | Friction #6 & #13 are killers; Madhavee, Supriya quotes |\n| 3 | **Build search before more filters** — Madhavee said \"searching is difficult\" by name | 5 | 5 | S | Direct quote, both rounds |\n| 4 | **Ship Swap Chips** with regional + diet substitutes | 4 | 5 | S | Ravina asked by name; 5+ voices on mix-and-match |\n| 5 | **Tips as voice layer per recipe**, not separate feature | 4 | 4 | M | 53% want tips; SB voice is brand asset |\n| 6 | **Multi-country phone prefix** in onboarding | 4 | 5 | XS | NRI segment blocked; Supriya, Vidya |\n| 7 | **Re-surface saved recipes via push notification** with right timing (Wed 5pm) | 4 | 3 | M | 82% save but 1% same-day cook |\n| 8 | **Weekly meal plan + shopping list** dropped Saturday for the next week | 4 | 4 | M | Isha + Sumathi independently |\n| 9 | **Family-first framing** in copy — \"make this for everyone\" not \"Family Mode toggle\" | 3 | 4 | XS | Chitra, Shubhada, joint-family universal |\n| 10 | **Variant submission flow** (\"What I changed\") — pilot in one batch | 5 | 3 | L | Ashalatha organic; UGC moat thesis. **Highest upside, lowest confidence — pilot it** |\n| 11 | **Seasonal tags** (\"Summer-friendly\", \"Winter-friendly\") | 3 | 4 | S | Raj, Isha |\n| 12 | **Regional filter** chip in locker | 3 | 5 | S | Pushpa, Ashalatha, Amruth, Duriya, Jayshree |\n| 13 | **Branded \"share to WhatsApp\" cards** as default share output | 4 | 4 | S | Forwarding behaviour is the actual viral loop; section 3.2 |\n| 14 | **Week-as-unit** content framing on home (not day-as-unit) | 4 | 4 | M | 85% remember Herbal Tea Week; recipes don't have same recall |\n| 15 | **In-context home visits** (5–10) before any more feature work | 5 | 5 | M | Section 4.3 — we don't know how cooking actually happens |\n\n### Top 3 takeaways if leadership reads only one section\n\n1. **Move the recipe to the home tab. Bring it to where members already are.** Don't ask them to navigate. (Rec #1)\n2. **Build the product as a personal cookbook (retrieval), not a daily push (delivery).** WhatsApp does delivery. The app does memory. (Rec #2)\n3. **Authority > content volume. Every recipe gets SB's 30-second voice tip.** Tips & tricks isn't a separate feature — it's *how every recipe should ship*. (Rec #5)\n\n---\n\n## 6. The Sushma-ji test — does each rec pass?\n\nSushma-ji: 52, lives in Nagpur, tier-3, reads Hindi comfortably, English with effort, has WhatsApp + UPI + 1 video-call app + Habuild. Thumb-only. Phone in jagran light is sometimes hard to read. Cooks for husband + son + mother-in-law + helps daughter-in-law sometimes.\n\n| Rec | Sushma-ji test verdict | Where it might fail |\n|---|---|---|\n| 1. Home-tab recipe | **Passes.** Her current pattern is open app → home → done. No new behaviour required. | If the home gets cluttered, she'll bounce. Keep it to 1 hero card. |\n| 2. My Recipe Book as home | **Conditional pass.** Needs *\"meri recipes\"* Hindi label, not \"My Recipe Book.\" Needs to look like a notebook visually (familiar metaphor). | If empty state isn't designed warmly, looks barren. |\n| 3. Search | **Fails as text-search.** Sushma-ji doesn't type recipe names in English. Needs **voice search** (which is already a \"coming soon\" — prioritise). Or visual ingredient browse. | Don't build text-search alone. |\n| 4. Swap Chips | **Passes if labels are in Hindi/Hinglish.** *\"Cheeni nahi hai? Gud try karein\"* works. *\"Sugar substitute: jaggery\"* doesn't. | English-only chip labels = fail. |\n| 5. Voice tips per recipe | **Strong pass.** SB's voice is what she trusts. Native format for her. | Auto-play vs tap-to-play — never auto-play (data costs, embarrassment in joint household). Tap to play. |\n| 6. Multi-country prefix | **N/A for Sushma-ji**, but unlocks NRI cohort. | — |\n| 7. Re-surface saved recipes | **Passes if push wording is warm**, not nagging. *\"Aapne yeh recipe save ki thi — aaj banana hai?\"* in Hindi. | English \"You saved this 3 weeks ago\" feels like a calendar reminder, not a friend. |\n| 8. Weekly meal plan | **Conditional pass.** Sushma-ji plans her week somewhat but not formally. The plan needs to be *one-screen scannable*, not a multi-step planner. | If it's a calendar UI with day cells, she'll bounce. If it's a one-page poster, she'll save and print it. |\n| 9. Family-first copy | **Strong pass.** This is her actual mental model. | \"Family Mode toggle\" fails. Reframe to \"Sabke liye banayein\". |\n| 10. Variant submission | **Conditional pass.** Photo + 1-line in Hindi. *\"Maine kya badla\"* prompt. Single-tap submit. Voice option for those who don't type. | If asks for caption + tag + category + visibility = fail. Keep to two fields. |\n| 11. Seasonal tags | **Passes.** \"Garmi mein achha\" is intuitive. | Don't label \"Seasonal: Summer (Q2)\". |\n| 12. Regional filter | **Strong pass.** *\"Dakshin Bharatiya\"* or simpler *\"South Indian\"* both work — but show in script she reads. | Filter chip in English-only when she scrolls in Marathi = fail. |\n| 13. Branded WhatsApp share | **Strong pass.** This is already her behaviour — make it look better. | If share takes >2 taps, fail. |\n| 14. Week-as-unit | **Strong pass.** Matches how she experiences Habuild content (weekly themes). | Don't add a \"week progress bar\" — feels like school. Show as *\"Is hafte: Herbal Chai\"*. |\n| 15. Home visits | **N/A — research, not product.** | — |\n\n### The two design rules that emerge from the Sushma-ji test\n\n1. **No English-only labels anywhere in the recipe surface.** Every chip, filter, CTA, push notification needs a Hindi/Hinglish primary. The current prototype has too many English-default strings (\"Cooked it\", \"Share\", \"Family Mode\").\n2. **Voice in, voice out for the tips layer.** Sushma-ji listens better than she reads on a phone screen. Voice tips beat written tips. Voice search beats text search. Voice variant submission beats typed variant submission. **The product should be biased to voice wherever possible.**\n\nThis is the design call we haven't made explicitly. It would make the product memorable.\n\n---\n\n## 7. The one design decision that would make this product memorable\n\nIf we ship only one thing different from every other recipe app:\n\n**Every recipe ships with a 30-second SB voice note saying *\"yeh kyun zaroori hai — meri raay\"*.**\n\nNot text. Not a transcript. Just the voice. Always there, tap to play, autoplay off, visible on the recipe card as a small mic icon with duration.\n\nWhy this works:\n- It's the only thing **structurally impossible to copy**. Satvic doesn't have SB. YouTube doesn't have his per-recipe take. WhatsApp can't browse old voices.\n- It addresses the 53% who want tips & tricks at the *highest emotional fidelity* (voice carries warmth that text doesn't)\n- It works for Sushma-ji's literacy comfort zone\n- It works for the joint-family kitchen (play on speaker while cooking — the audio-while-doing format)\n- It compounds: 18 recipes × 30s = 9 minutes of SB voice content per month, all evergreen, all searchable later\n- It changes the question from \"what do members think of the recipe\" to \"what did SB say about today's recipe\" — moves the centre of gravity to brand\n\nIf the product is one thing, it's *\"the recipes SB has personally taken a stance on.\"* Everything else is wrapper.\n\n---\n\n## 8. Closing — the thesis re-stated\n\nThe recipe app isn't a recipe app. It's:\n\n- **The durable archive** for WhatsApp's daily ritual (solves Madhavee's phone-change pain, Supriya's manual starring)\n- **The SB voice authority layer** that no one else can replicate (solves the 53% tips-and-tricks ask)\n- **The week-as-unit content frame** that members already remember (Herbal Tea Week recall, 85%)\n- **The community variant surface** for evangelists (Ashalatha's organic UGC moment, scaled)\n- **The retrieval product**, not the delivery product — WhatsApp keeps delivering\n\nThe current prototype is solving for delivery (Today's Hub, hero card for today's recipe). It needs to flip to solving for retrieval (My Book, search-first, week-themed, voice-authority-layer-attached).\n\nThe Sushma-ji test for the whole thesis: **would a 52-year-old Nagpur woman tell her friend \"Habuild ki app mein meri saari recipes hain, aur SB sir har ek pe bolte hain ki yeh kyun achhi hai\"?** That's the sentence. If yes, ship it. If no, we haven't built the right product yet.\n\n---\n\n## File map (related)\n\n- `/Users/khushibagai/Documents/Habuild/research/recipe-feedback-group-synthesis-2026-05-11.md` — Round 2 source\n- `/Users/khushibagai/Documents/Habuild/research/recipe-features-prototype-context.md` — Round 1 source + Satvic read\n- `/Users/khushibagai/Documents/Habuild/research/recipe-app-session-state-2026-05-13.md` — project state\n- `/Users/khushibagai/Documents/Habuild/research/feb-2026-recipe-database.md` — 18 recipes\n- `/Users/khushibagai/Documents/Habuild/projects/recipe-app-mixpanel-funnels.md` — funnel specs\n- `/Users/khushibagai/Documents/Habuild/prototypes/recipe-features-recipe-locker.html` — live prototype source\n- Live app: https://khushibagai-create.github.io/habuild-your-recipes/\n"},

    deadline: null,

  });

function collectDone(secFilter) {
  const list = [];
  data.forEach(sec => {
    if (secFilter && sec.id !== secFilter.id) return;
    sec.tasks.filter(t => t.done).forEach(t => list.push({
      sec: sec.label, label: t.label, priority: t.priority || ''
    }));
  });
  return list;
}

function logDoneTasks(tasksList) {
  if (!tasksList || !tasksList.length) return;
  const doc = paraData.areas.find(f => f.id === 'done-log');
  if (!doc) return;
  const dayHeader = '## ' + todayStr;
  const lines = tasksList.map(d =>
    '- [x] ' + (d.priority ? '[' + d.priority + '] ' : '') + '(' + d.sec + ') ' + d.label
  ).join('\n');
  if (doc.content.indexOf(dayHeader) !== -1) {
    // append under today's block
    doc.content = doc.content.replace(dayHeader + '\n', dayHeader + '\n' + lines + '\n');
  } else {
    // prepend a new dated block after the header preamble
    const marker = '---\n';
    const idx = doc.content.indexOf(marker);
    const insertion = '\n' + dayHeader + '\n' + lines + '\n';
    if (idx >= 0) {
      doc.content = doc.content.slice(0, idx + marker.length) + insertion + doc.content.slice(idx + marker.length);
    } else {
      doc.content += insertion;
    }
  }
  savePARA(paraData);
  // If the user is currently viewing the Done Tasks doc, refresh it
  if (typeof activeWorkFile !== 'undefined' && activeWorkFile === 'done-log' && typeof renderFileContent === 'function') {
    renderFileContent('done-log');
  }
}

// Sweep any tasks currently marked done (e.g. left over from before this change,

function sweepDoneTasks() {
  const list = collectDone();
  if (list.length) {
    logDoneTasks(list);
    data.forEach(sec => { sec.tasks = sec.tasks.filter(t => !t.done); });
    save();

  localStorage.setItem(DATE_KEY, todayStr);
}

function deadlineInfo(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return { label: 'Overdue', cls: 'para-deadline-overdue' };
  if (diff <= 7) return { label: diff === 0 ? 'Today' : `${diff}d`, cls: 'para-deadline-soon' };
  if (diff <= 30) return { label: `${diff}d`, cls: 'para-deadline-ok' };
  const months = Math.round(diff / 30);
  return { label: `${months}mo`, cls: 'para-deadline-ok' };
}

function downloadFile(id) {

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

function renderMarkdown(content, container, fileId) {
  if (typeof marked !== 'undefined') {
    marked.setOptions({breaks:true, gfm:true});
    container.innerHTML = marked.parse(content);
    // marked.js converts - [ ] / - [x] to <input type="checkbox" disabled>
    // Handlers attached separately via attachCheckboxHandlers()
    container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.removeAttribute('disabled');
      const li = cb.closest('li');
      if (li && cb.checked) { li.style.color = '#555'; li.style.textDecoration = 'line-through'; }
    });
    // Intercept .md doc links → open file in My Work
    container.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href') || '';
      const filename = href.split('/').pop();
      const fid = FILE_MAP[filename];
      if (fid) {
        a.onclick = e => { e.preventDefault(); activeWorkFile = fid; renderSidebar(); renderFileContent(fid); };
        a.style.cursor = 'pointer';
      } else if (href && !href.startsWith('http')) {
        a.style.color = '#555'; a.style.textDecoration = 'none'; a.style.cursor = 'default';
        a.onclick = e => e.preventDefault();
      }
    });
  } else {
    container.innerHTML = '<pre style="white-space:pre-wrap;color:#888">'+content.replace(/</g,'&lt;')+'</pre>';
  }
}
