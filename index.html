M | Box Breathing (day) | ✓ | — |\n| 2:00 PM | Water | ✓ | — |\n| 5:00 PM | Water | ✓ | — |\n| 5:05 PM | Evening Session Join Now | — | Sticky (till 6:00) |\n| 9:00 PM | Box Breathing (night) | ✓ | Regular |\n| 9:30 PM | Night reminder | ✓ | — |\n\n**Sunday adds:** 7:50 AM sticky push for Community Session (pinned till 8:45)\n\n**Daily totals:** ~3 phone pushes (4 with SE or on Sunday) · ~10 in-app chat slots\n\n### What if member doesn't open?\n\n**No special handling.** The in-app chat is a computed view, not a message log. It is rebuilt every time the member opens the app.\n\nEach slot has a **show window** — a time range when it is visible. While inside the window, the card shows. After the window ends, the card is gone. No backlog, no history to manage.\n\n| Slot | Show from | Show till |\n|---|---|---|\n| Good morning | 5:30 AM | 11:00 AM |\n| Yoga Everyday | 5:30 AM | 6:45 AM |\n| Strong Everyday *(if opted in)* | 7:15 AM | 8:00 AM |\n| Water | 11:00 AM / 2:00 PM / 5:00 PM | each shows for 1 hour |\n| Brain Game | 12:00 PM | 11:59 PM |\n| Box Breathing (day) | 2:00 PM | 5:00 PM |\n| Evening Session | 5:00 PM | 6:00 PM |\n| Box Breathing (night) | 9:00 PM | midnight |\n| Night reminder | 9:30 PM | midnight |\n\n**Result:**\n- Open at 7 AM → see morning slots\n- Open at 3 PM → see whatever's currently in window\n- Open at 11 PM → see night slots, not morning\n- Skip 5 days → open and see today's board, fresh. Nothing else.\n\nProgress tracking (Yoga Days counter, day-strip green ticks) lives in the **persistent header at the top of the screen** — not in the chat. Phone pushes still fire on schedule regardless — those are the nudges that bring members back into the app.\n\n---\n\n## Control Arm Changes (Revamped Home Screen)\n\nFor clean A/B parity, the Revamped Home Screen Control is modified from its Phase 1 PRD:\n\n- ❌ **Remove Quick Actions grid** (Physio / Community Calendar / Articles / Support) — **not in active-state Control for this experiment**\n- ❌ **Remove Your Poster banner** — not in Control for this experiment\n- ✅ **Keep time-aware hero card logic** (per Homescreen Revamp Phase 1 PRD) — live class, post-class celebration, brain games, breathing, evening, night breathing, night reminder\n- ✅ **Keep Upcoming Today / Tomorrow Upcoming session list**\n- ✅ **Keep persistent header** (Namaste, Yoga Days counter, day strip)\n- ✅ **SE card conditional on opt-in** — same rule as WFI (only render if opted in)\n\n---\n\n## Assets\n\n- `sb-photo.jpg` / `sb-nobg.png` / `sb-1.png` – `sb-9.png` — Saurabh Bothra photos for YE session cards\n- SE instructor photo — **placeholder \"SE\" circle for now**, replace with real instructor photo\n- Marma / Kanchan Hatwar photo — **placeholder \"KH\" circle for now**, replace with real instructor photo\n- `recipe-poster-better-lunch.jpeg` — sample recipe poster, already in prototype folder\n- Daily poster assets — to be delivered via backend, CMS-managed (one image per day for the 8 AM slot)\n- Community Session cover image — TBD\n- Habuild logo SVG — header branding\n\n---\n\n## Dependencies\n\n- **Backend:**\n  - Message scheduler (cron-based delivery at specific times)\n  - Per-member personalization: name, opted-in programs (SE flag), batch time, language preference\n  - LIVE state detection (class start / end timestamps)\n  - Push notification delivery (FCM)\n  - Personal session link generation per member\n  - Daily poster CMS pipeline\n  - Attendance tracking hook (Join Now click → yoga days increment)\n- **CRM / Data (Bala):** Member profile flags — SE opt-in, batch time, language\n- **Content team:** Daily poster pipeline, weekly community session metadata, night-reminder copy bank\n- **Design (Deba):** Polish chat UI, card layouts, illustrations based on prototype\n- **Instrumentation (Saurabh Shah):**\n  - Home-to-home retention tracking (landed home → next landed home)\n  - Total attendance tracking (app Join Now + WhatsApp CRM attendance)\n  - YE Join Now retention tracking\n  - Experiment group cohort flag on every event\n- **Engineering (Arun):** Effort estimate (MVP + full build), implementation\n- **GTM (Saurabh Botra):** WhatsApp install campaign to hit 50k installs; historical conversion rate to size send volume\n\n---\n\n## Open Items\n\n| Item | Owner | Status |\n|---|---|---|\n| Daily poster asset pipeline (who uploads each day, what time, fallback when no poster is ready) | Khushi + content team | Open |\n| SE instructor photo + asset | Khushi | Open |\n| Kanchan Hatwar / Marma instructor photo | Khushi | Open |\n| Community Session weekly anchor time | Khushi + community team | Open |\n| Night reminder copy bank (rotating inspirational messages) | Content team | Open |\n| Night reminder personal-link generation (backend) | Arun / Eng | Open |\n| Engineering estimates (MVP + full build) | Arun | Open |\n| Member SE opt-in data — where it lives, how to query | Bala / CRM | Open |\n| Experiment instrumentation spec | Saurabh Shah | Open |\n| Success threshold (% retention uplift vs Control, sustained 2 weeks) | Khushi + Prasun | Open |\n| WhatsApp campaign send volume sizing (to hit 50k installs) | Saurabh Botra | Open |\n\n---\n\n## Deferred Items (will update this PRD when addressed)\n\n- **Sunday session layout** — \"Today's Special\" multi-session stack with 24 Hr Access section (like Control mock). Will design separately post-launch.\n- **Paused subscription state** — \"Subscription Paused until <date> — Resume\" card with chat thread behavior. Will design separately.\n\n---\n\n## Prototype Links\n\n- Full day flow (single-phone scroll-through): `/Users/khushibagai/Documents/Habuild/prototypes/chat-first-app/4-whatsapp-first-interface.html`\n- Time-of-day states (side-by-side phone frames): `/Users/khushibagai/Documents/Habuild/prototypes/chat-first-app/4-whatsapp-first-interface-states.html`\n- Design reference: `/Users/khushibagai/Documents/Habuild/prototypes/chat-first-app/REBUILD-SPEC.md`\n- Card spec: `/Users/khushibagai/Documents/Habuild/prototypes/chat-first-app/CARD-SPEC.md`\n\n---\n\n## Changelog\n\n- **2026-04-30** — Added Notification Logic section (push universe, daily matrix, \"what if member doesn't open\" computed-view rule with show-from/show-till windows). Clarified terminology: \"in-app chat\" = WhatsApp-like UI inside Habuild app, not actual WhatsApp. Recipe Poster moved to deferred / out of scope for v1.\n- **2026-04-24** — Initial PRD draft. Cohort sized to 50k (25k per arm). Covers weekday flow, SE opt-in rule, recipe poster as image asset, water reminders at 11 AM / 2 PM / 5 PM, night reminder with personal link at 9:30 PM, community session weekly announcement, trophy-style post-class celebration. Nidra app dropped (breathing extended through night). Paused / Sunday / Expired / International / Renewal / Quick Actions explicitly out of scope for v1.\n"},
  {"id": "bb-research", "title": "Box Breathing — Research Library", "group": "Box Breathing", "sc": "ps-a", "paraSection": "resources", "filename": "research/box-breathing/RESEARCH.md", "content": "# Box Breathing — Consolidated Research Archive\n\nThis document consolidates everything Khushi has gathered on box breathing, breathing patterns, swara yoga, and the science of breath. It is the canonical answer source for the `box-breathing-expert` skill.\n\n**Last updated:** 2026-05-25\n**Curated by:** Khushi Bagai (PM, Habuild)\n\n---\n\n## Source map\n\n| # | Source | What it is | File |\n|---|---|---|---|\n| 1 | Saurabh's Claude conversation | Saurabh Bothra's exploration of swara yoga breath rate via Claude. Covers breath quota science, 5-6 bpm resonance, cross-species lifespan data, Shiva Swarodaya overview | (synthesis below — original was a shared claude.ai URL) |\n| 2 | Bothra \"Breathize\" workbook | Master pattern library (80+ patterns from 8 traditions), IROS framework, BOLT test protocol, app architecture variables, Week 1 + Week 2 curriculum | `sources/breathing-patterns.xlsx` + `sources/breathing-patterns-copy.xlsx` (identical) + `sources/breathing-patterns-research.csv` |\n| 3 | Shiva Swarodaya Treatise | Bihar School of Yoga, 1984, Swami Muktibodhananda. 247 pp. Full Sanskrit text + English translation of the canonical swara yoga source | `sources/swara-yoga-treatise-bihar-school.pdf` |\n| 4 | Swara Yoga (Jnandev/Bhavanani 2020) | Yoga Satsanga Ashram UK. 41 pp partial PDF. Intro chapters + Dr Bhavanani's modern clinical research appendix | `sources/swara-yoga-jnandev-bhavanani.pdf` |\n| 5 | WhatsApp research group chat | 1118 lines of member responses (6-21 May 2026) from the Habuild Box Breathing research WhatsApp group. Insights synthesised in earlier session — qualitative validation of patterns + Saurabh sir's voice + 84% close-eyes finding | `sources/whatsapp-research-group-may-2026.zip` |\n\n**Note:** Sources 2's two xlsx files are byte-identical. The CSV is an earlier export of one sheet.\n\n---\n\n## Section A — Breath rate & lifespan science\n\n(Synthesised from Saurabh's Claude conversation)\n\n### The core thesis\n**Life is measured in breaths, not years.** Vedic / swara yoga texts say each person has a pre-allocated lifetime breath quota recorded in the body.\n\n**Standing math:** average human = 15 breaths/min → 900/hr → 21,600/day. At a 120-year ceiling (Vedic *poorna ayu*): `15 × 60 × 24 × 365 × 120 ≈ 94.6 crore (~946 million) breaths lifetime allocation.`\n\nDifferent activities/emotions \"spend\" breaths at different tariffs.\n\n### The 5-6 bpm convergence\nThree independent sources converge on **5-6 breaths/min** as the sweet spot where the body operates without wear:\n1. Swara yogis (introspection, ~10th century)\n2. Modern HRV / resonance-frequency cardiology (sensors + spectral analysis)\n3. Comparative biology (lifespan-vs-breath-rate across species)\n\nAt resonance: **one breath ≈ 10 seconds**. Personal range typically 4.5 to 7.0 bpm.\n\n> \"Breathing at 6 breaths/minute could induce coherence of the 0.1 Hz oscillations, thus facilitating physical and psychological regulation.\"\n\n### Cross-species data (inverse breath ↔ lifespan)\n\n| Animal | Breaths/min | Lifespan |\n|---|---|---|\n| Mouse | 90–170 | 1.5–3 yrs |\n| Rabbit | 30–60 | 5–6 yrs |\n| Monkey | 30–50 | 20–30 yrs |\n| Dog | 20–30 | 10–20 yrs |\n| Human | 15–18 | 60–80 yrs |\n| Horse | 8–15 | 50+ yrs |\n| Whale | 4–6 | 100+ yrs |\n| Galapagos tortoise | ~3–4 | 150–190 yrs |\n\nA **2022 *Scientific Reports* paper** found total lifetime breaths cluster within a factor of ~2 across very different species (a Galapagos tortoise gets ~10⁸ breaths/lifetime, \"within a factor of 2 of mammals\").\n\n### Exhalation length by activity (Shiva Swarodaya)\nLonger exhalation = more air per breath = faster spend of prana balance.\n\n| State | Exhalation length (finger-widths from nostril) |\n|---|---|\n| Resting | 10 |\n| Emotionally excited | 12 |\n| Singing | 16 |\n| Vomiting | 18 |\n| Eating | 20 |\n| Walking | 24 |\n| Sleeping | 30 |\n\n**Sleep being the most expensive is called out as counterintuitive** — \"which is probably why early yogis tried to reduce it through yoga nidra-style states.\"\n\n### The \"buy back breaths\" prescription\n10 min at 6 bpm = 60 breaths instead of 180. Net saving = 120 breaths per session. Three sessions/day ≈ \"an hour's worth of breath quota recovered daily.\" Compounds into years over a lifetime.\n\n### Load-bearing quotes\n- *\"Your life isn't measured in years. It's measured in breaths. And the meter is already running.\"*\n- *\"the length of a person's lifespan is predetermined by a certain allocated number of breaths, already recorded within the body.\"*\n- *\"While breathing consciously one can take an infinite number of breaths without reducing the lifespan. Breathing rapidly without any awareness, on the other hand, quickly uses up the life quota and one dies much sooner.\"*\n- *\"As you proceed with this breathing, the time span of each breath continuously increases and after some time you will achieve a rate of 5-6 breaths per minute or even lesser.\"*\n- *\"a person who acquires the knowledge of Swara becomes immortal\"* — flagged as overstated but \"gesturing at something real\"\n\n### References cited\n- Shiva Swarodaya, ~10th c. Sanskrit, 395 sutras\n- Yoga Sutra of Patanjali — \"expiration is linked to mood stability\"\n- Yogananda's *Autobiography of a Yogi*: *\"The restless monkey breathes at the rate of 32 times a minute, in contrast to man's average of 18 times...\"*\n- 2022 *Scientific Reports* paper on cross-species lifetime breaths\n- HRV biofeedback research (resonance frequency at 0.1 Hz / 6 bpm)\n\n---\n\n## Section B — Master pattern library\n\n(Synthesised from Bothra's Breathize workbook)\n\n### Background\nBuilt by **Saurabh Bothra** (IIT BHU mechanical engineer, ex-Art of Living volunteer for Sri Sri Ravi Shankar) as research for a breathing app called \"Breathize\" / \"Breath Gym.\"\n\n### The IROS framework\nThe workbook proposes a 4-variable schema for any breathing pattern:\n- **I** = Inhalation (seconds)\n- **R** = Retention (hold after inhale, seconds)\n- **O** = Out / exhalation (seconds)\n- **S** = Sustain (hold after exhale, seconds)\n\nThis is a usable app data model for any programmable breath pattern.\n\n### IROS by goal\n\n| Goal | I | R | O | S | Notes |\n|---|---|---|---|---|---|\n| Athletes Sports | 10 | – | – | – | |\n| Water Sports | 2 | 15 | 15 | 5 | |\n| Stress free | 3 | 5 | 3 | 6 | |\n| Advanced reformative | 8 | 30 | 18 | 10 | |\n\n### Default training (effect-based)\n\n| Name | I | R | O | S |\n|---|---|---|---|---|\n| Clear mind | 3 | – | 9 | – |\n| Relax | 3 | – | 6 | 6 |\n| Calming | 3 | 5 | 3 | 6 |\n| Power | 3 | 6 | 6 | – |\n| Harmony | 3 | 9 | 6 | 3 |\n| Anti-stress | 9 | – | 2 | – |\n| Anti-appetite | 5 | – | 5 | 5 |\n\n### Vedic / Hindu pranayama library\n\n| Name | I | R | O | S | Notes |\n|---|---|---|---|---|---|\n| Anulom Vilom | 3 | – | – | – | alternate nostril |\n| Bahya | 4 | – | 8 (hmmm) | 12 | exhale + sound |\n| Bhastrika | 1 | – | 1 | – | 20x fast |\n| Bhastrika (2) | 10 | 15 | 15 | – | 2x deep |\n| Bhramari | 6 | 2 | 9 | – | humming with Shanmukhi Mudra |\n| Chandra Bhedana | 5 | 15 | 5 | 2.5 | Inhale Left / Exhale Right — **Cooling** |\n| Coherent breathing | 6 | – | 6 | – | resonance |\n| Kapalbhati | 0.6 | – | 0.4 | – | rapid skull-shining |\n| Nadi Shodhana NS1 | 5.3 | 5.3 | 10.6 | 0 | |\n| Nadi Shodhana NS2 | 4.3 | 17.2 | 8.6 | – | |\n| One Minute Breath OMB1 | 20 | 20 | 20 | – | 15s relax between breaths |\n| One Minute Breath OMB2 | 10 | 10 | 10 | – | |\n| Pratiloma | 7 | – | 5 | – | Inhale R/Exhale L then reverse |\n| Samaveta S1 | 4 | 2 | 6 | – | |\n| Samaveta S2 | 10 | 10 | 10 | – | |\n| Savitri | 6 | 3 | 6 | 3 | solar |\n| Sitali | 4 | – | 8 | – | Inhale mouth wide open / Exhale nose |\n| Sitkari | 4 | – | 8 | – | Inhale mouth, teeth together (SSSS) / Exhale nose |\n| **Square breathing (= box)** | **4** | **4** | **4** | **4** | baseline |\n| Surya Bhedana | 5 | 15 | 5 | 2.5 | Inhale Right / Exhale Left — **Heating** |\n| Udgeeth | 3 | – | 12 | – | Exhale with OM |\n| Ujjayi | 10 | – | 10 | 2 | inhale + exhale with sound |\n| Vrajana S1 | 4 | – | 6 | – | |\n| Vrajana S2 | 6 | – | 8 | – | |\n| Vrajana S3 | 8 | – | 12 | – | |\n\n### Tibetan Buddhist\n- **Purifying breath**: 5 / 12.5 / 0.8 (×3) / – (Inhale nose / Exhale mouth × 3)\n- **Tummo (Inner Fire)**: 0.6 / – / 0.4 / 30 (30 fast breaths + 30s hold after exhale)\n\n### Taiji\n- **Ha breathing**: 4 / 2 / 1 / 5 (Inhale nose / exhale mouth with HA sound)\n\n### Modern Western\n- **4-7-8 (Dr. Weil)**: 4 / 7 / 8 / – (Inhale nose / Exhale mouth)\n- **Box Breathing (Navy SEAL)**: 4 / 4 / 4 / 4\n- **Box Sleeping variant**: 4 / 4 / 6 / 2 (longer exhale, shorter post-hold → stronger parasympathetic)\n- **Coherent / Resonant (Nestor)**: 5.5 / – / 5.5 / – (~5.5 bpm, \"no more essential technique\")\n- **Breathing Coordination (Stough)**: sit straight, gentle nasal inhale, count 1-10 aloud on exhale\n- **Buteyko Control Pause, Mini Breathholds, Nose Songs, High Altitude Training, Decongest the Nose**\n\n### Patrick McKeown — Oxygen Advantage techniques\n1. Nose Unblocking — small in/out, pinch nose, walk paces, recover\n2. Breathe Light to Breathe Right — smaller breaths than urge, 3-5 min air hunger\n3. Breathing Recovery — exhale, pinch 2-5s, normal 10s, repeat\n4. Simulate High-Altitude Walking — 1 min nose, exhale + hold, recover, 8-10 reps\n5. Advanced HA — 40 paces hold then mini-holds; do NOT go below 80% SpO2\n6. 5-10 Breathing (beginner) — pinch 5s, normal 10s\n\n### Categorisation by effect\n\n- **Energising / sympathetic / heating** = right nostril work, Bhastrika, Kapalbhati, Tummo, Surya Bhedana\n- **Calming / parasympathetic / cooling** = left nostril, Chandra Bhedana, Sitali, Sitkari, 4-7-8, Box (4-4-6-2)\n- **Balancing** = Nadi Shodhana, Anulom Vilom, Pratiloma, Coherent 5.5-5.5, Box (4-4-4-4)\n\n### BOLT test (Body Oxygen Level Test) protocol\n\nDiagnostic to gauge breath baseline / show progress.\n\n1. Small silent nasal inhale + exhale\n2. Pinch nose\n3. Count seconds until **first definite desire to breathe** (and first involuntary breathing-muscle movement — abdomen jerk, neck contraction)\n4. Release; the recovery inhale should be calm (if you gasp, you held too long)\n\n### BOLT score interpretation\n\n| BOLT | Level | Box breathing recommended start |\n|---|---|---|\n| <10s | Stressed/breathless | Nasal awareness only, no holds, 2 min |\n| 10-20s | Beginner | 3-3-3-3, 3 min |\n| 20-30s | Intermediate | 4-4-4-4, 5 min |\n| 30-40s | Advanced | 5-5-5-5 or 6-6-6-6, 8 min |\n| 40s+ | Master | 7-7-7-7 or 8-8-8-8, 10 min |\n\n### Optimal vs Impaired breathing checklist\n\n**Optimal:** nasal, mouth closed, deep (not big), slow & few, rhythmic, quiet, relaxed, long relaxed exhalation, erect posture, diaphragm = 70–80% of muscle activity, lower chest expands sideways/forward/back.\n\n**Impaired:** mouth breathing, shallow chest, rapid, irregular, noisy/big, tense hunched shoulders, short forced exhalation, slumped forward posture, overactive accessory muscles in chest/neck/shoulders, only upper chest expands.\n\n### Three correct-breathing principles (Breathize)\n1. Nose breathing\n2. Diaphragmatic breathing\n3. Rhythmic breathing (slow & deep, not big)\n\n### Overbreathing — what it causes\n↓CO2 in blood · mouth breathing & nitric oxide underuse · impaired O2 release from RBCs (Bohr Effect) · smooth-muscle constriction in vessels/airways · adverse blood pH · reduced O2 to muscles/heart/brain · increased acidity & exercise fatigue · limited sports performance · negative overall health.\n\n### Buteyko targets\n- **Sick patients** breathe 15+ L/min, often mouth, CO2 only ~4%, resting HR up to 90 bpm.\n- **Healthy patients** breathe ~10 breaths/min, total 5–6 L/min, resting pulse 48–55, exhaled CO2 6.5–7.5%.\n\n### Bibliography from the workbook\n- Teresa Hale — *Breathing Free*\n- Mark Burhenne — *The 8-Hour Sleep Paradox*\n- Katharina Schroth — *Three-Dimensional Treatment for Scoliosis*\n- Carl Stough — *Dr. Breath: The Story of Breathing Coordination*\n- Patrick McKeown — *The Oxygen Advantage*\n- William McArdle — *Exercise Physiology*\n- *The Primordial Breath: An Ancient Chinese Way of Prolonging Life through Breath Control*\n- *Seven Treatises from the Taoist Canon*\n- *Tao Tsang*\n- James Nestor — *Breath: The New Science of a Lost Art* (heavily quoted)\n\n---\n\n## Section C — Swara yoga tradition\n\n(Synthesised from both PDFs)\n\n### What is swara yoga?\nA tantric science of *pranic body rhythms*. \"Swara\" = \"the sound of one's own breath\" or \"the flow of breath through the nostrils.\" Yoga = union.\n\nThe science of analysing, controlling, and using the breath's natural left/right nostril alternation to regulate consciousness, energy, and action.\n\n**Distinct from pranayama:** pranayama redirects/stores prana via technique; swara yoga is about *reading* the breath and *acting in accordance with* the active flow.\n\n**Source text:** the **Shiva Swarodaya** — Sanskrit dialogue between Shiva (consciousness) and Parvati (energy), ~10th c., 395 sutras. The modern equivalent of swara is the **nasal cycle** — an ultradian rhythm of nasal congestion/decongestion lasting 60-240 minutes per side, first described in Western medicine by Kayser (1895).\n\n### The three nadis\n\n72,000 nadis exist (some texts say 350,000), but three matter:\n\n| Nadi | Side | Polarity | Brain hemisphere | Element | Color | Activity |\n|---|---|---|---|---|---|---|\n| **Ida** | Left nostril | Chandra (lunar), cool, feminine, Shakti, parasympathetic | Right (creative, emotional) | Yamuna, sattwa | Blue | Mental work |\n| **Pingala** | Right nostril | Surya (solar), hot, masculine, Shiva, sympathetic | Left (logic, language) | Ganga, rajas | Red | Physical work |\n| **Sushumna** | Both | Neutral, central spinal channel | Whole brain | – | – | Meditation only |\n\nPingala governs the right side of the body, ida the left, but each hemisphere of the brain controls the *opposite* side — so left-nostril breathing stimulates the right brain, right-nostril breathing stimulates the left brain.\n\nWithin sushumna are three subtler nadis: **vajra**, **chitrini**, and **brahma nadi** (the innermost, the path of full kundalini).\n\n### Breath cycles & timing\n\n- Each nadi flows actively for ~60 minutes (2.5 ghatis), then sushumna flows for 1-4 minutes during changeover, then the other nadi takes over\n- Modern neurology has confirmed hemisphere cycling on a 60-90 minute rhythm with transfer via the corpus callosum\n- The \"correct\" cycle is anchored to **sunrise** and the **lunar fortnight**:\n  - During *shukla paksha* (bright/waxing fortnight): ida should flow at sunrise on tithis 1-3, 7-9, 13-15; pingala at sunrise on tithis 4-6, 10-12\n  - During *krishna paksha* (dark/waning fortnight): the reverse\n- **If one nadi flows continuously >3 days, illness follows:** continual ida = colds/respiratory/constipation; continual pingala = fever/boils/acidity. Disease shows up first as *disturbance of swara* before symptoms appear\n\n### Action by swara — the actionable lookup table\n\n**Ida (left) is auspicious for:** calm/creative/mental work, drinking water, getting out of bed, charity, settling disputes, approaching seniors, religious ceremonies/mantra/initiation, meeting the guru, long journeys, music, medicine and treatment, women's sexual activity.\n\n**Pingala (right) is auspicious for:** hard physical work, eating, evacuating bowels, risky/heroic ventures, intellectual study/maths, agriculture, commerce, travel, opposition/conflict, men's sexual activity, shatkarmas.\n\n**Sushumna (both):** *only* meditation, mantra sadhana, kundalini practice. Material plans fail when sushumna flows.\n\n### Specific pranayama ratios from the texts\n\n- **Nadi shodhana** (alternate nostril): inhale left, exhale right, then inhale right, exhale left. Prerequisite to swara yoga\n- **Sukha pranayama** (easy): 6 : 6 inhale : exhale\n- **Loma pranayama**: 6 : 6 : 6 (inhale : hold : exhale)\n- **Viloma pranayama**: 6 : 6 : 6 (inhale : exhale : hold out)\n- **Sukha purvaka**: 6 : 6 : 6 : 6 — **the direct Sanskrit ancestor of modern box breathing**\n- **Savitri pranayama**: 6 : 3 : 6 : 3 — solar pranayama\n\n### Exhalation length (angulas, finger-widths)\n\nMeasured by exhaling onto a palm or mirror. Normal = 7-12 angulas. Goal of practice is to *shorten* exhalation (retain prana).\n\nSpecific siddhis tied to length: 1 angula = detachment; 2 = contentment; 3 = poetic ability; 4 = speech siddhi; 5 = foresight.\n\n### Methods to change the active nostril\n1. Close active nostril with finger/cotton, breathe through inactive for 5-10 min\n2. Inhale active, exhale inactive\n3. Apply pressure to the armpit on the *same* side as active nostril (yogis use a *yoga danda* stick). Sitting with hands in opposite armpits (*padadhirasana*) does this\n4. Lie on the side of the active nostril (gravity blocks the lower nostril within minutes)\n5. Splash hot/cold water on face\n6. Eat heating food (chilli, ginger, pepper) → triggers pingala; cooling food (yoghurt, banana, milk) → triggers ida\n\n### Pancha tattwas — five elements within each swara\n\nEach nadi cycle further subdivides into five elemental \"tattwa\" phases:\n\n| Element | Colour | Shape | Direction | Length (angulas) | Duration | Bija |\n|---|---|---|---|---|---|---|\n| Prithvi (earth) | yellow | square | centre | 12 | 20 min | Lam |\n| Apas (water) | white | crescent | downward | 16 | 16 min | Vam |\n| Agni (fire) | red | triangle | upward | 4 | 12 min | Ram |\n| Vayu (air) | blue | hexagon | slanting | 8 | 8 min | Yam |\n| Akasha (ether) | multicoloured/black | dot | diffused | minimal | rare | Ham |\n\nTaste tests for active tattwa: earth = sweet, water = astringent, fire = bitter, air = sour, ether = pungent.\n\n---\n\n## Section D — Modern clinical evidence\n\n(Synthesised from Bhavanani research appendix in Jnandev PDF)\n\nThe load-bearing studies that validate swara yoga claims with modern measurement:\n\n| Study | Finding |\n|---|---|\n| **Telles et al (1994)** | Right-nostril breathing repeated several times/day for one month significantly *increases baseline O2 consumption / metabolism*. Exclusive left-nostril breathing 4×/day *increases baseline GSR* (reduces sympathetic activity) |\n| **Rai et al (1983)** | Induced left-nostril breathing *lowers systolic, diastolic, mean BP*. Right-nostril breathing *normalises low BP*, increases heart rate, skin conductance, body temperature |\n| **Backon (1988)** | Right-nostril breathing significantly *raises blood glucose*. Left-nostril *lowers it* |\n| **Block et al** | Unilateral breathing affects cognition ipsilaterally in males — right-nostril better for spatial tasks, left-nostril better for verbal |\n| **Shannahoff-Khalsa** | Nasal mucosa mechanoreceptors signal the hypothalamus. Catecholamine levels alternate left/right in peripheral circulation, coupled to the nasal cycle |\n| **CYTER (Pondicherry)** | Right-nostril UNB/ANB = sympathetic arousal. Left-nostril UNB/ANB = parasympathetic dominance, \"inert lethargy\" |\n\n**Bottom line:** forced uninostril breathing has *measurable* differential effects (BP, glucose, metabolism, autonomic balance). The traditional swara yoga claims are publishable, not just folklore.\n\n### Other modern references\n- **HRV biofeedback** — resonance frequency of the cardiovascular system at ~0.1 Hz / 6 bpm\n- **Nasal-cycle / hallucinations paper** (PubMed 25660663) — left-nostril dominance and hallucinations in a schizophrenic female\n- **HBR Sept 2020** — \"Research: Why Breathing Is So Effective at Reducing Stress\"\n\n---\n\n## Section E — Habuild product implications\n\n### Box breathing specifically\n\n1. **Box breathing = 4-4-4-4** baseline (Square Breathing in Prana app; Box Breathing in Navy SEAL framing)\n2. **Sleeping variant 4-4-6-2** is explicitly documented — longer exhale = stronger parasympathetic. Distinct product surface area for evening\n3. **Sukha purvaka 6-6-6-6 is the direct Sanskrit ancestor** — historical anchor for Habuild positioning\n4. **At 8-8-8-8 = ~1.9 bpm**, the user is already past the resonance sweet spot (5-6 bpm). The \"what next\" is not a higher ratio — it's breadth (new patterns) or depth (nostril awareness, silent japa, mirror test)\n\n### Progression model (recommended)\n\n```\nBOLT score (one-time) → starting tier\nGoal (calm/energy/sleep) → which pattern variant\nLast 3 sessions → promote / hold / demote\nTime of day (optional) → nostril overlay\n```\n\n| BOLT | Visible label | Pattern | Duration |\n|---|---|---|---|\n| <10s | Beginner | 3-3-3-3 (no hold variant) | 2 min |\n| 10-20s | Beginner | 3-3-3-3 | 3 min |\n| 20-30s | Regular | 4-4-4-4 | 5 min |\n| 30-40s | Advanced | 5-5-5-5 or 6-6-6-6 | 8 min |\n| 40s+ | Master | 7-7-7-7 or 8-8-8-8 | 10 min |\n\n**Hard maximum duration: 15 min.** Beyond 15 min:\n- Diminishing autonomic returns (parasympathetic shift maxes out)\n- Hyperventilation/dizziness risk at sustained long retentions\n- Better to switch to a different pranayama, not extend box breathing\n\n**For the Sushma-ji audience (40+ tier-2/3 Indian women):** the visible tier should be just 3 levels — Beginner / Regular / Advanced. Auto-adjust ratio silently behind the scenes. Don't expose \"tier promotion\" language.\n\n### Adaptation rules per session\n\nCapture per session:\n- **Completion** — did they finish all cycles without pausing?\n- **Effort tag** — 1-tap post-session: easy / just right / hard\n- **Streak at current ratio** — sessions in a row at this level\n\nPromote: 3 sessions in a row at easy/just-right + full completion → suggest next ratio\nHold: any \"hard\" tag or incomplete → stay\nDemote: 2 incompletes in a row → drop one step\n\n### The differentiator\n**Nostril dominance is the missing dimension in modern breathwork apps.** Every modern app does ratio + duration. None do \"which nostril is active right now?\" — that's the differentiator swara yoga adds, with real clinical evidence behind it. Possible Habuild feature.\n\n### Content hooks from the science\n- \"Box breathing = sukha purvaka, from the 10th-century Shiva Swarodaya\"\n- \"Each session buys you back ~120 breaths of your lifetime quota\"\n- \"Longer exhale = stronger parasympathetic — that's why our sleep variant is 4-4-6-2\"\n- \"Check which nostril is active right now — it tells you what you should be doing\"\n\n### What's NOT in the library (gaps Khushi should know)\n- Wim Hof Method — not covered in any source. If asked, say \"not in library\"\n- SKY Breath (Art of Living) — Saurabh Bothra was an AoL volunteer but the workbook doesn't cover SKY ratios specifically\n- Holotropic Breathwork — not covered\n- Specific Habuild member analytics — must be queried separately via data-analyst agent\n- Comparison to Calm / Headspace / Insight Timer breathing patterns — not covered\n- Real Habuild user data on current pattern distribution — must query Mixpanel/Metabase\n\n---\n\n## Section F — Key load-bearing quotes\n\n### On breath and life\n> \"Your life isn't measured in years. It's measured in breaths. And the meter is already running.\"\n> — Saurabh's Claude conversation\n\n> \"the length of a person's lifespan is predetermined by a certain allocated number of breaths, already recorded within the body.\"\n> — Shiva Swarodaya / Saurabh's Claude conversation\n\n> \"While breathing consciously one can take an infinite number of breaths without reducing the lifespan.\"\n> — Shiva Swarodaya\n\n### On the nadis\n> \"In all the seven lokas he knows no greater wisdom or treasure than the swara.\"\n> — Shiva to Parvati, Shiva Swarodaya opening\n\n> \"Ida swara (left nostril dominance) is described as feminine, Shakti and moon-like... pingala swara (right nostril dominance) is described as masculine, Shiva and sun-like... bilateral nasal flow [sushumna] is operational [during] relaxation/meditation.\"\n> — Bhavanani\n\n### On resonance\n> \"Breathing at 6 breaths/minute could induce coherence of the 0.1 Hz oscillations, thus facilitating physical and psychological regulation.\"\n> — HRV biofeedback research\n\n> \"As you proceed with this breathing, the time span of each breath continuously increases and after some time you will achieve a rate of 5-6 breaths per minute or even lesser. Now, you will feel completely relaxed and closer to the center.\"\n> — Shiva Swarodaya practice notes\n\n### On exhalation\n> \"Longer exhalations will elicit a stronger parasympathetic response.\"\n> — Bothra Breathize workbook, Techniques sheet\n\n### On the breath-mind link\n> \"When breathing is disturbed, the mind also becomes disturbed. Control of the breath enables steadiness of mind.\"\n> — Hatha Yoga Pradipika 2:2\n\n### On the science being publishable\n> Modern clinical studies (Telles, Rai, Backon, Shannahoff-Khalsa, CYTER) confirm that forced uninostril breathing has measurable differential effects on BP, glucose, metabolism, and autonomic balance.\n\n---\n\n## Section G — Sanskrit glossary\n\n| Term | Meaning |\n|---|---|\n| Swara | nostril breath / energy channel / \"one's own self\" |\n| Ida | left nadi, lunar (chandra), cool, parasympathetic |\n| Pingala | right nadi, solar (surya), hot, sympathetic |\n| Sushumna | central nadi, both nostrils, meditation only |\n| Shoonya swara | void breath (sushumna active) |\n| Chandra swara | moon / left nostril |\n| Surya swara | sun / right nostril |\n| Nadi shodhana / shuddhi | nadi-cleansing alternate-nostril breathing |\n| Puraka | inhale |\n| Kumbhaka | hold (also retention) |\n| Antar kumbhaka | internal retention (hold after inhale) |\n| Bahir kumbhaka | external retention (hold after exhale) |\n| Rechaka | exhale |\n| Pancha tattwas | five elements: prithvi (earth), apas (water), agni (fire), vayu (air), akasha (ether) |\n| Pancha prana vayus | five winds: prana (chest), apana (pelvic), samana (navel), udana (throat), vyana (whole body) |\n| Chakras | mooladhara, swadhisthana, manipura, anahata, vishuddhi, ajna, sahasrara |\n| Tithi | lunar day |\n| Shukla paksha | bright/waxing fortnight |\n| Krishna paksha | dark/waning fortnight |\n| Angula | finger-breadth measure of breath length |\n| Ghati | 24-minute unit (2.5 ghati = 60 min = one swara cycle) |\n| Shanmukhi mudra | closing seven gates (ears/eyes/nose/mouth) to perceive active tattwa |\n| Chhayopasana | shadow-gazing concentration practice |\n| Padadhirasana | armpit-pressure asana to change nostril dominance |\n| Yoga danda | stick used in armpit to switch swara |\n| Loma | solar/positive ions (also a pranayama name) |\n| Viloma | lunar/negative ions (also a pranayama name) |\n| Ajapajapa | the spontaneous \"So-Ham\" mantra of the breath, said to repeat 21,600 times/24 hours |\n| Poorna ayu | full Vedic lifespan (120 years) |\n| Sukha purvaka | \"easy preliminary\" pranayama — 6:6:6:6, ancestor of box breathing |\n| Savitri | solar pranayama, 6:3:6:3 |\n| Brahma Muhurta | pre-dawn time, considered optimal for slow breathing |\n| Tummo | Tibetan inner-fire breathing |\n\n---\n\n## How to use this archive\n\n- **For quick answers:** invoke the `box-breathing-expert` skill which loads this file\n- **For deep questions:** Read the original sources at `sources/`\n- **For WhatsApp research data:** unzip `sources/whatsapp-research-group-may-2026.zip` and read the chat\n- **For pattern lookup:** Section B is the master library\n- **For \"what does the science say?\":** Section D\n- **For Habuild product decisions:** Section E\n\n## Provenance\n\n- Curated: 2026-05-21 to 2026-05-25\n- All five sources personally read and synthesised by Claude across 3 parallel research agents\n- WhatsApp chat synthesis is from earlier session (1118 lines, 6-21 May 2026)\n- This file is the consolidated archive\n"},
  {"id": "breathing-ux-research", "title": "Breathing — UX Research Report", "group": "Box Breathing", "sc": "ps-a", "paraSection": "resources", "filename": "breathing-ux-research-report.md", "content": "# UX Research Report: Box Breathing in Habuild App\n\n**Author:** Khushi Bagai · Product Manager\n**Research lead:** Khushi Bagai\n**Period:** May 6 – May 11, 2026\n**Status:** Final — Round 1\n**Distribution:** App Pod (Ayush, Deba, Bala), Product (SB, Anshul, Trishala), Analytics (Saurabh Shah)\n**Related artefacts:** `projects/prd-box-breathing-enhancements.md`, `research/new-habits/breathing-science-brief.md`\n\n---\n\n## 1. Executive Summary\n\nBox breathing is **already a daily habit** for the majority of engaged Habuild members — 56% of polled members had used it on the app the day before research began. The dominant friction is not motivation or awareness within the habituated cohort; it is **product gaps that block deeper practice**.\n\nThree findings drive the entire backlog:\n\n| Rank | Finding | Evidence | Action |\n|---|---|---|---|\n| 1 | Members want **SB's voice** in box breathing | 91% poll vote (41/45); 6+ unsolicited DMs / chat asks | P0 — already committed for next-week ship |\n| 2 | **Count selection is invisible** (lives in settings) | 3+ members asked for a feature that already exists | P0 — move to session start; add count 5 and 6-6-6-6 |\n| 3 | **No auto-stop timer** blocks eye-closed practice | Repeated, multi-day asks from 🫥 + Geet | P0 — fixed-duration timer with auto-stop |\n\nBonus quick win: **fix the \"Guided sound\" toggle** — copy unclear, possibly broken behaviour. Filed in App Pod Backlog.\n\n---\n\n## 2. Research Objectives\n\n1. Validate whether current box breathing in-app is a habit or a one-off\n2. Understand the **lived experience** of members who use it (when, why, how)\n3. Identify the **highest-leverage UX changes** to push into `prd-box-breathing-enhancements.md`\n4. Surface friction the team is not currently aware of\n5. Stress-test design directions via A/B option comparisons (UI + audio)\n\n---\n\n## 3. Methodology\n\n### 3.1 Approach\n\nMixed-method, asynchronous, WhatsApp-native research — chosen for fit with the Habuild audience (40+, tier-2/3 women already living inside WhatsApp).\n\n| Method | Volume | Purpose |\n|---|---|---|\n| Quantitative polls | 8 polls, ~150 respondents in group | Segment audience, measure preference strength |\n| Open-ended feedback | Free-form chat replies + DMs | Surface unprompted asks and language |\n| Visual A/B tests | Screenshots & videos of 3–4 design options | Validate UI direction before committing to build |\n| Direct prompts | @-mentions to specific members | Surface diverse responses, not just loudest voices |\n\n### 3.2 Participants\n\n- **Recruitment:** WhatsApp group link shared in Habuild community channels (May 6 – 7)\n- **Self-selection:** Members opted in; bias toward already-engaged Habuilders\n- **Group size:** ~150 joined by May 11\n- **Demographic skew:** Female, 40+, tier-2/3 Indian cities (matches Habuild core audience)\n- **Active responders:** ~30–60 per poll (response rate 20–40%)\n\n### 3.3 Limitations\n\n1. **Self-selection bias** — group skews toward active members. Doesn't capture lapsed users or non-app members well (though Poll 1 surfaced that 27% don't have the app at all).\n2. **No 1:1 interviews yet** — qualitative depth is shallower than 5 structured interviews would provide.\n3. **No analytics triangulation in this round** — poll claim of \"did it yesterday\" not yet verified against Mixpanel.\n4. **Hindi/English code-mixing** — some response nuance may be lost in translation.\n\n---\n\n## 4. Participants & Reach\n\n| Metric | Value |\n|---|---|\n| Group joined | ~150 members |\n| Active poll responders | 30–60 per poll |\n| Median response rate | ~33% |\n| Members who provided qualitative feedback | 12+ |\n| Members who provided DMs | 2+ |\n| Days of research | 5 |\n\nNotable individuals (representative voices, anonymised where needed):\n- **🫥** — power user, multi-day engagement, drove the timer ask\n- **Sweta Shah** — most articulate critic, found bugs others missed\n- **Geet 💌🧿** — bedtime user, daily habit\n- **Ansh 🧿** — pattern-matcher, identified that the winning audio option mirrors live sessions\n- **Subadhra, Jyothi, Roopa, amitoj** — independent asks for SB's voice\n\n---\n\n## 5. Quantitative Findings\n\n| # | Date | Poll | Top answer | Vote share | Interpretation |\n|---|---|---|---|---|---|\n| 1 | May 7 | Do you use box breathing on app? | Yes (sometimes/everyday) | 19/33 = 58% | Habit exists |\n| 2 | May 8 | Did you do it yesterday? | Haan, ki | **32/57 = 56%** | High daily activation |\n| 3 | May 8 | Want SB's voice? | Haan, zaroor | **41/45 = 91%** | Strongest signal in study |\n| 4 | May 8 | Want reminder? | Bedtime (16) / None (15) | Split | Build with strong opt-out |\n| 5 | May 8 | \"Time remaining\" UI variant | Option 3 | 16/19 = 84% | Strong preference |\n| 6 | May 9 | Preferred box breathing variant | Option 3 | 33/38 = 87% | Strong preference |\n| 7 | May 11 | Best of 4 design options | Option 4 (musical tones) | 10/19 = 53% | Audio-led wins |\n\n---\n\n## 6. Findings & Insights\n\nFindings are ranked by **signal strength × actionability**. Each finding includes severity (P0 / P1 / P2), evidence, and direct user quotes.\n\n### Finding 1 — SB's voice is non-negotiable\n\n**Severity:** P0\n**Theme:** Brand consistency / emotional resonance\n**Evidence:** 91% poll vote (41/45) · 6+ independent unsolicited mentions\n\nMembers have been Pavlov-conditioned to SB's voice through years of live yoga sessions. A different voice (or no voice) feels like a different product.\n\n> *\"V r so used to his voice & it will surely give us calming effect.\"* — Subadhra\n>\n> *\"we are habitual in saurabh sir's soothing voice.\"* — Geet\n>\n> *\"Please place the voice of Saurabh Sir in it to make it more impactful.\"* — Sweta Shah\n>\n> *\"Yes me too felt using guruji's voice wd give more impact n calming effect.\"* — Jyothi\n\n**Recommendation:** Ship SB voice-over next week (already committed). Treat as foundational, not optional.\n\n---\n\n### Finding 2 — Count selection is invisible\n\n**Severity:** P0\n**Theme:** Discoverability / information architecture\n**Evidence:** 3+ members asked for a feature that already exists in settings\n\nMembers repeatedly asked for \"the ability to choose 3 / 4 / 5 / 6 count\" — a feature already present in settings. One member corrected them mid-thread; others responded with \"I didn't know.\"\n\n> *\"It will good we can have the counts like 4, 5 and 6 displayed in the starting once we click on box breathing and members can select.\"* — Navya\n>\n> *\"Ooo tq even I was unaware of this setting.\"* — Jyothi\n>\n> *\"How can I do 6-6-6-6 box breathing through app\"* — Manoj (this count is missing)\n\n**Recommendation:**\n- Surface count selection at **session start**, not buried in settings\n- Add missing **count 5**\n- Add **6-6-6-6** mode (extended)\n\n---\n\n### Finding 3 — No auto-stop timer blocks eye-closed practice\n\n**Severity:** P0\n**Theme:** Job-to-be-done mismatch\n**Evidence:** Repeated multi-day asks from 🫥, seconded by Geet\n\nThe job is full relaxation with eyes closed. The current product forces members to break the practice to check elapsed time.\n\n> *\"if you could add a timer... like if someone wants to practice for 10 mins without keeping an eye on the clock all the time.\"* — 🫥\n>\n> *\"In that case we can keep our eyes closed and relax completely.\"* — 🫥\n>\n> *\"Yes timer option can be set if possible.\"* — Geet\n\n**Recommendation:** Pre-session duration picker (e.g., 3 / 5 / 10 / 15 min) with auto-stop.\n\n---\n\n### Finding 4 — Members want progressive cycles *within* a session\n\n**Severity:** P1\n**Theme:** Live-session parity\n**Evidence:** Single high-signal voice, mapped to existing live behaviour\n\nThe product currently roadmaps progression across sessions. Members want progression *within* a single session, mirroring SB's live structure.\n\n> *\"few rounds of 3, then 4, then 6. Like the way we do in class also.\"* — 🫥\n\n**Recommendation:** Add an **in-session progressive mode** (3 → 4 → 5 → 6 cycles automatically), separate from level-up across sessions.\n\n---\n\n### Finding 5 — Musical-tone audio resonates because it mirrors live\n\n**Severity:** P0 (bundled with Finding 1)\n**Theme:** Live-session parity / sensory continuity\n**Evidence:** Poll 7 winner (53%) + pattern-match insight from Ansh\n\nThe winning design option (Option 4) was musical-tone audio — a high note on inhale, low on exhale. Members recognised it as SB's live-session technique.\n\n> *\"I remember Saurabh played this option 4 in some of the breathing sessions... high note on breathe-in and a low note on breathe out. That was good. You can do it with eyes closed too then.\"* — Ansh\n\n**Recommendation:** Combine SB voice + musical inhale/exhale tones. This is the in-app port of an existing live experience — low risk, high recognition.\n\n---\n\n### Finding 6 — Visual square is harsh when eyes are open\n\n**Severity:** P2\n**Theme:** Visual design / accessibility\n**Evidence:** Diverging opinion across 3 camps\n\nThree camps emerged:\n- **Eyes open, hates current visual:** Sweta — \"uncomfortable / heavy\"\n- **Eyes open, likes current visual:** Geet — \"comfortable with box formation\"\n- **Eyes closed (largest):** Murthy, 🫥, Sweta\n\n> *\"those lines forming a square feels a little uncomfortable / heavy. You can change... like clouds moving in background / colour.\"* — Sweta\n\n**Recommendation:** Keep box as default, but offer a softer \"ambient\" theme (cloud / colour) as a level-up unlock. Audio-led mode also addresses this implicitly.\n\n---\n\n### Finding 7 — Reminder is a *sleep* job, not a generic nudge\n\n**Severity:** P1\n**Theme:** Notification design / job-to-be-done\n**Evidence:** Poll 4 distribution + Geet's qualitative\n\nBedtime (16) and \"no reminder\" (15) split the active cohort. Generic reminders will under-perform and over-fatigue.\n\n> *\"I daily do this box breathing before sleeping. I feel calm n sleepy after doing this.\"* — Geet\n\n**Recommendation:** Bedtime-only reminder with strong opt-out. Tie to user's session time / member preference. Do not default-on for the whole base.\n\n---\n\n### Finding 8 — \"Guided sound\" toggle is unclear or broken\n\n**Severity:** P2 (quick win)\n**Theme:** Bug / copy clarity\n**Evidence:** Sweta flagged directly\n\n> *\"What is the meaning of guided sound off. I have disabled but could not find any difference.\"* — Sweta\n\n**Recommendation:** Investigate behaviour. If working, rewrite label. If broken, fix. **Ticket filed in App Pod Backlog.**\n\n---\n\n### Finding 9 — App vs Webapp confusion bleeds into adoption\n\n**Severity:** Outside scope (flagged)\n**Theme:** Product hygiene / branding\n**Evidence:** 2+ members had the wrong app (Habuild Members webapp vs Habuild native)\n\nThe Habuild Members PWA and the Habuild native app share branding and logo. Members can't tell which is which.\n\n**Recommendation:** Out of scope for box breathing. Flag to growth / app pod for separate work.\n\n---\n\n## 7. Insight Themes (Mental Model)\n\nAcross all findings, three meta-themes recur:\n\n1. **\"In-app should feel like live.\"** Members hold SB's live sessions as the reference experience. Every gap they raised was an in-app missing piece *they already have live* (SB's voice, musical tones, progressive counts).\n2. **\"Let me close my eyes.\"** The deepest job is sensory relaxation. Anything that forces visual attention (clock, harsh square) is friction.\n3. **\"Don't make me dig.\"** Features they want already exist (count selection, levels) but are buried. Discoverability is the gating issue, not features.\n\n---\n\n## 8. Recommendations Summary\n\nMapped against the existing PRD (`projects/prd-box-breathing-enhancements.md`).\n\n| # | Recommendation | Priority | PRD action |\n|---|---|---|---|\n| 1 | SB voice-over in box breathing | P0 | Already committed — ship next week |\n| 2 | Surface count selection at session start; add count 5 + 6-6-6-6 | P0 | New addition |\n| 3 | Duration timer with auto-stop | P0 | New addition |\n| 4 | Musical-tone audio (paired with SB voice) | P0 | New addition |\n| 5 | In-session progressive cycles (3→4→5→6) | P1 | Refines existing |\n| 6 | Bedtime-only reminder, opt-out default | P1 | Refines existing |\n| 7 | Softer ambient visual theme (clouds/colour) | P2 | New addition |\n| 8 | Fix \"Guided sound\" toggle | P2 | **Ticket filed — App Pod Backlog** |\n| 9 | App vs Webapp confusion | Out of scope | Flagged to growth |\n\n---\n\n## 9. Next Steps\n\n| Step | Owner | When |\n|---|---|---|\n| Update PRD with Findings 2–4 + 7 | Khushi | This week |\n| Ship SB voice-over (Finding 1) | Ayush + Deba | Next week |\n| File \"Guided sound\" toggle bug ticket | Khushi | Done — App Pod Backlog |\n| Run Round 2 polls (lapsed user diagnostics, outcome felt, other pranayama types) | Khushi | Next 7 days |\n| Triangulate \"did it yesterday\" claim with Mixpanel | Saurabh Shah | Next 7 days |\n| 5 × 1:1 interviews with daily users + lapsed users | Khushi | Within 2 weeks |\n| D30 metric review post Phase 1 launch | Khushi + Saurabh Shah | Per PRD timeline |\n\n---\n\n## 10. Appendix\n\n### A. Raw chat transcript\n`~/Downloads/WhatsApp Chat - Habuild - Box Breathing/_chat.txt`\n\n### B. Related research\n- `research/new-habits/breathing-science-brief.md` — clinical and habit-formation evidence\n- `research/new-habits/new-habits-thesis.md` — broader new habits investigation\n- `research/pain-points.md` — full user pain-point synthesis\n\n### C. Related product docs\n- `projects/prd-box-breathing-enhancements.md` — PRD this research feeds\n- `prototypes/habits/breathing-habit.html` — existing prototype with SB voice bar\n\n### D. Open polls planned for Round 2\n- Why did you skip yesterday? (lapsed user diagnostic)\n- Outcome — do you feel a difference after box breathing?\n- Other pranayama you practice (anulom-vilom, kapalbhati, bhramari)\n- Have you recommended box breathing to anyone? (virality signal)\n- For non-app members — why haven't you downloaded?\n"},
  {"id": "breathing-user-research", "title": "Breathing — User Research", "group": "Box Breathing", "sc": "ps-a", "paraSection": "resources", "filename": "breathing-user-research.md", "content": "# Box Breathing — User Research Synthesis\n\n**Source:** Habuild – Box Breathing WhatsApp group (created May 6, 2026)\n**Group size at synthesis:** ~150 members joined\n**Active research window:** May 6 – May 11, 2026\n**Author:** Khushi\n**Status:** Living document — update as more polls run\n\n---\n\n## TL;DR\n\nBox breathing already has a real active habit in the member base (**56% did it yesterday in-app**). The friction is not motivation. The top 3 unmet needs are:\n\n1. **SB's voice-over is not in the feature** — 91% of voters want it. Multiple members independently asked for it.\n2. **Count selection is invisible** — exists in settings but most members don't know.\n3. **No timer / auto-stop** — forces members to break eye-closed practice to check the clock.\n\nFeeds into `projects/prd-box-breathing-enhancements.md`.\n\n---\n\n## Methodology\n\nCreated a dedicated WhatsApp group (\"Habuild - Box Breathing\") and ran:\n- 8 polls (mix of segmentation, preference, and UI A/B options)\n- Open-ended feedback prompts\n- Video / screenshot comparisons for visual UI variants\n- Direct DMs for members who could only respond privately\n\nAudience: self-selected Habuild members from the broader community. Female-skewing, 40+, tier-2/3 cities (matches Habuild core).\n\n---\n\n## Quantitative results\n\n| # | Date | Question | Top answer | Vote share |\n|---|---|---|---|---|\n| 1 | May 7 | Do you do Box Breathing on app? | Yes (sometimes/everyday) | 19/33 = 58% |\n| 2 | May 8 | Kal aapne app par box breathing ki? | Haan, ki | **32/57 = 56% did it yesterday** |\n| 3 | May 8 | Saurabh sir ki voice chahiye? | Haan, zaroor chahiye | **41/45 = 91%** |\n| 4 | May 8 | Reminder chahiye? | Sone se pehle (16) / Nahi (15) | Split |\n| 5 | May 8 | \"How much is left\" UI | Option 3 | 16/19 = 84% |\n| 6 | May 9 | Preferred option in box breathing | Option 3 | 33/38 = 87% |\n| 7 | May 11 | Best of 4 design options | Option 4 (musical tones) | 10/19 = 53% |\n\n**Headline numbers:**\n- **56% did box breathing yesterday on app** — real active habit\n- **91% want SB's voice** — overwhelming consensus\n- **27% of the group doesn't have the Habuild app** (Poll 1) — discoverability problem outside the app too\n\n---\n\n## Qualitative insights (ranked by signal strength)\n\n### 1. SB's voice is the single most-asked feature — and non-negotiable\n\nMembers independently requested SB's voice-over in box breathing:\n\n- **Sweta Shah:** *\"Please place the voice of Saurabh Sir in it to make it more impactful.\"*\n- **Subadhra:** *\"V r so used to his voice & it will surely give us calming effect.\"*\n- **Geet:** *\"we are habitual in saurabh sir's soothing voice.\"*\n- **Jyothi:** *\"Yes me too felt using guruji's voice wd give more impact n calming effect.\"*\n- **Roopa:** *\"Saurabh Sir voice gives good vibes and feels like giving your 100%.\"*\n- **amitoj sall:** sent the same suggestion via private DM the day before\n- **Sweta (later):** *\"The most important one is adding the voice of Saurabh Sir as conveyed earlier and the most wanted feature by everyone.\"*\n\n**Why it matters:** Members are Pavlov-conditioned to SB's voice from live yoga sessions. Anyone else's voice = different product. Committed: ship next week.\n\n---\n\n### 2. Count selection exists, but it's invisible\n\nMultiple members asked for \"option to select count 3 / 4 / 5 / 6\" — Sweta corrected them that it's already in settings.\n\n- **Navya Punith:** *\"Counts like 5 and 6 are displayed at the end... It will good we can have the counts like 4, 5 and 6 displayed in the starting once we click on box breathing and members can select.\"*\n- **Jyothi (post-correction):** *\"Ooo tq even I was unaware of this setting.\"*\n- **Manoj Bora:** *\"How can I do 6-6-6-6 box breathing through app\"* — not currently supported.\n\n**Why it matters:** This is a discoverability bug, not a feature gap. Move count selection from settings to session start. Also add **5 second count** (missing) and **6-6-6-6 mode**.\n\n---\n\n### 3. Timer / auto-stop is the second-biggest unmet need\n\n- **🫥:** *\"if you could add a timer... like if someone wants to practice for 10 mins without keeping an eye on the clock all the time.\"*\n- *\"So it stops on its own... after 10 mins.\"*\n- *\"In that case we can keep our eyes closed and relax completely.\"*\n- **Geet seconded:** *\"Yes timer option can be set if possible.\"*\n\n**Why it matters:** The current product forces members to break their eye-closed practice to check the clock. The job-to-be-done is full relaxation, which a fixed-duration timer enables.\n\n---\n\n### 4. Progressive cycles within a session (3 → 4 → 5 → 6)\n\n- **🫥:** *\"gradually increasing the count… few rounds of 3, then 4, then 6. Like the way we do in class also.\"*\n\n**Why it matters:** Members already experience this structure in live yoga sessions. They want the in-app feature to mirror what SB does live. This is different from level-up across sessions — they want progression *within* a session.\n\n---\n\n### 5. Visual square feels harsh when eyes are open\n\nTwo camps emerged.\n\n**Camp A — eyes open, current visual feels heavy:**\n- **Sweta:** *\"those lines forming a square feels a little uncomfortable / heavy. You can change that or change the same like clouds moving in background / colour etc.\"*\n\n**Camp B — square is fine:**\n- **Geet:** *\"I am very comfortable with the box formation.\"*\n\n**Camp C — eyes closed (largest):**\n- **Murthy:** *\"Better to do with eyes closed.\"*\n- **🫥:** *\"keep our eyes closed and relax completely.\"*\n- **Sweta (later):** *\"all this matters for the one who keeps eyes open.\"*\n\n**Why it matters:** Audio-led variant (Option 4 with musical tones) wins because it serves the eye-closed camp AND removes the visual friction for the eyes-open camp.\n\n---\n\n### 6. Musical-tone audio mirrors what SB already uses live\n\n- **Ansh 🧿:** *\"I remember Saurabh played this option 4 in some of the breathing sessions… it had a sound of a musical instrument attached to it — like a high note on breathe-in and a low note on breathe out. That was good. You can do it with eyes closed too then.\"*\n\n**Why it matters:** Option 4 won the design poll *because* members already heard it in live sessions. The \"musical tones + SB voice\" combo is the version they're really asking for. This is product-market fit hiding inside their live experience.\n\n---\n\n### 7. Reminder is a *sleep job*, not a generic nudge\n\nPoll 4 results:\n- Sone se pehle: **16**\n- Nahi, jab man kare: **15**\n- Yoga class ke baad: 2\n- Lunch ke baad: 1\n\nPlus qualitative — **Geet:** *\"I daily do this box breathing before sleeping. I feel calm n sleepy after doing this.\"*\n\n**Why it matters:** Don't build a generic \"do your box breathing\" reminder. Build a **bedtime reminder** with strong opt-out (half the group is self-driven and doesn't want one).\n\n---\n\n### 8. Discoverability is broken *outside* the app too\n\n- **27%** of the WhatsApp group (9/33 in Poll 1) didn't know about the Habuild app\n- **pinky11ster** and **sumana g** had the wrong app — the Habuild Members webapp (PWA) vs. the Habuild native app\n- Both share branding/logo, creating confusion\n\n**Why it matters:** Separate product hygiene problem, but it bleeds into adoption of any new feature. App pod / marketing should clean up the two-app confusion.\n\n---\n\n### 9. \"Guided sound\" toggle is unclear / possibly broken\n\n- **Sweta Shah:** *\"What is the meaning of guided sound off. I have disabled but could not find any difference.\"*\n\n**Why it matters:** Either the toggle does nothing, or the label fails to communicate what it does. Quick win — fix the copy or fix the behaviour. **Ticket filed in App Pod Backlog.**\n\n---\n\n## Implications — what to push into the PRD\n\nUpdates to `projects/prd-box-breathing-enhancements.md`:\n\n| # | Insight → Product change | Priority | Status |\n|---|---|---|---|\n| 1 | SB voice-over in box breathing | P0 | Committed for next week |\n| 2 | Surface count selection at session start (not in settings); add 5-count and 6-6-6-6 mode | P0 | New |\n| 3 | Pre-set duration timer with auto-stop (e.g., 5 / 10 min) | P0 | New |\n| 4 | Musical-tone audio variant (matches SB's live sessions) | P0 | New |\n| 5 | Bedtime reminder (with opt-out, not default-on for all) | P1 | Refines existing |\n| 6 | In-session progressive cycles (3 → 4 → 5 → 6) | P1 | Refines existing |\n| 7 | Soften/vary the visual (cloud, colour, level-based) for eyes-open users | P2 | New |\n| 8 | Fix \"Guided sound\" toggle — copy + actual behaviour | P2 | **Ticket created in App Pod backlog** |\n| 9 | Resolve Habuild-app vs Habuild-Members-webapp confusion | Outside scope | Flagged to growth |\n\n---\n\n## Open questions for next polls\n\n- For members who skipped yesterday (16/57 in Poll 3), **why?** — friction polls 6 + 7 from the planned set\n- What's the *outcome* they actually feel after box breathing? — Poll 7 planned\n- Other breathing techniques they do (anulom-vilom, kapalbhati, bhramari) — Poll 14 planned\n- Do they recommend it to anyone? (virality signal) — Poll 15 planned\n\n---\n\n## Appendix — raw chat reference\n\nFile: `~/Downloads/WhatsApp Chat - Habuild - Box Breathing/_chat.txt`\n"},
  {"id": "recipe-feedback-r2", "title": "Recipes — Feedback Round 2 (May 21)", "group": "Recipes", "sc": "ps-a", "paraSection": "resources", "filename": "recipe-feedback-group-insights-2026-05-21.md", "content": "# Recipe Feedback Group — Full Insights Report (Round 3, Closing)\n\n**Group:** Habuild Recipes — Feedback (3rd export)\n**Period covered:** 6 May 2026 → 20 May 2026 (~2 weeks of structured feedback)\n**Members in group:** ~605 net (642 joined, 37 left)\n**Polls run:** 14 quantitative polls (n=36–177 per poll)\n**Qualitative messages:** 900+ messages, 30+ image attachments, audio + PDFs\n**Product iterations tested:** 2 prototypes + 1 in-app Content tab (3 in total this cycle, ~6 over the project arc)\n**Author:** Khushi · App Pod, Habuild\n\n> This is a closing report for the feedback group as a research surface. We now have enough signal to lock decisions. The group remains a high-value asset; we should keep using it, but with sharper hypotheses going forward.\n\n---\n\n## How to read this document\n\nIt's organised in three parts:\n\n1. **User insights** — Who they are, how they cook, how they consume, what's underneath the polls (Part 1)\n2. **Themes & content experiments tried** — Every content theme we've shipped, with verdicts (Part 2)\n3. **Product & feature experiments tried** — Every product surface + feature we've tried, with verdicts (Part 3)\n\nEach experiment is tagged with a verdict:\n\n- ✅ **WORKED** — Clear positive signal, ship/keep\n- ⚠️ **MIXED** — Some signal, but cost/value imbalance\n- ❌ **DIDN'T WORK** — Negative signal or clear data against it\n- 🟡 **INCONCLUSIVE** — Not tested rigorously enough\n- 🟢 **NOT YET BUILT** — Demand validated, no product yet\n\n---\n\n# PART 1 — User Insights (Deep)\n\n## 1.1 Demographics & psychographics\n\n**Who is in the group (composition):**\n\n| Attribute | Profile |\n|---|---|\n| Gender | ~85% women, ~15% men (chef RJ, Suresh Loni, Pramod Bhargava, Dr Karia, Rajesh Joshi etc.) |\n| Age band | 40–65, biggest cluster 45–55 |\n| Geography | Pan-India: Bengaluru, Pune, Chennai, Mumbai, Nagpur, Indore, Delhi, Goa, Kerala. NRI members blocked by +91 onboarding. |\n| Tier | Mostly metro + tier-2. Some tier-3. |\n| Health context | Diabetes, BP, weight, joint pain, women's health, post-menopause, family-cooking burden. ~30% mention a health condition unprompted. |\n| Cooking confidence | HIGH. They are experienced cooks. They cook DAILY. They don't need step-by-step. |\n| Tech comfort | Mid. They use WhatsApp fluently. App navigation is harder. Some confused: *\"Is this on Facebook?\"* |\n| Family role | Default cook for the household. Cooking is a multi-stakeholder act (husband's sugar, kid's preference, mother-in-law's tastes). |\n\n## 1.2 Five behavioural segments\n\nThe same Sushma-ji can move between these in a single week. These are *states*, not personas.\n\n### Segment A — The WhatsApp Ritualist (~40%)\n\n> *\"What's app would be easier as you can keep them starred & I am already doing it for reference. I also refer to an year old OH salad recipes too on what's app.\"* — Supriya Kamath\n\n- Reads turant. Stars 1 in 5. Cooks 5–6/month.\n- Job-to-be-done: retrieve a starred recipe 11 months later without scrolling\n- Cannot be converted to \"instead of WhatsApp\" — can be converted to \"in addition to\"\n\n### Segment B — The App Archivist (~15%)\n\n> *\"WhatsApp we need to go back and search. If we change phone all messages will go. If it is there in Habuild app, it will be very convenient.\"* — Madhavee Kedari\n\n- Has lost recipes to a phone change. Triple-redundancy savers (WhatsApp + screenshots + notebook).\n- Already converted. Just wants the app to actually contain WhatsApp's content.\n- Small but high-LTV. Weekly opener, not daily.\n\n### Segment C — The Joint Family Cook (~25%)\n\n> *\"Joint family men apne liye alag se banane men thoda problem hota hai\"* — Chitra\n> *\"My 3-year-old grandson — never tasted sugar.\"* — Shubhada\n\n- Reads recipe → mentally calculates \"can I make this for everyone or just me?\" → 70% conclude \"just me, separately\" → which is the friction.\n- Needs *permission* to cook for one OR scale-for-six. Family Edition feature was right idea but only 8% poll recognition — we need to *position*, not just *build*.\n- Default state of 60–70% of 40+ Indian women.\n\n### Segment D — The Mix-and-Match Cook (~30%)\n\n> *\"I do not try as per the cooking instructions, instead I choose some ingredients and like to cook them as per my style and taste.\"* — anonymous (99301 06161)\n> *\"Cook recipes based on ingredients & also the family mood specially kids.\"* — Supriya\n> 6 independent voices across both rounds said variant of the same thing.\n\n- Sees recipe as inspiration, not instruction. Silently deviates.\n- The single biggest hidden segment because they don't *complain* — they just swap.\n- Single highest-confidence unmet need: **Swap Chips** (Ravina asked for it by name).\n\n### Segment E — The Quiet Evangelist (~10%)\n\n> *\"Recipe of ragi laddu. Just follow this recipe.\"* — Ashalatha (shared two photos unprompted)\n> *\"I am making laddu yesterday but adding ragi flour with akrod and makhana, jaggery.\"* — Kirti (offered her variant; Ashalatha then made *Kirti's* version next day)\n\n- The Ashalathas and Kirtis. Wants to teach. Will type out a recipe in WhatsApp manually if someone asks.\n- Her variant is *better than the original* in her cohort's eyes because it carries her trust.\n- At 14M members, 0.1% submission = 14,000 community recipes/cycle. Satvic and others cannot match this — they have no cohorts.\n\n## 1.3 What the polls really say (re-read)\n\n| Stated finding | What it *looks* like | What it actually means |\n|---|---|---|\n| 66% want WhatsApp image format unchanged | \"Don't change the format\" | Don't change the **ritual**. Image = arrives in hand, familiar, shareable in one tap, no authentication. |\n| 47% want tips/tricks > 7% want more recipes | \"Education > volume\" | They're saying *\"I know how to cook these. Stop selling me recipes I can google. Sell me the upgrade.\"* They want earned authority. |\n| 62% prefer WhatsApp (n=99) | \"App is losing\" | App is competing against a habit, not a product. The 38% who chose app gave structural reasons. Habits beat features at week 1; durability wins at year 1. |\n| 52% don't know content tab exists | \"Discovery problem\" | Real-estate problem inside our own app. Our most-engaged members don't navigate past home. IA failure, not content failure. |\n| 82% save recipes, 1% cook same day | \"Members value recipes\" | They value the **act of saving** — aspirational, not usage. Pinterest lives in this gap. Saving ≠ cooking. |\n| 87% remember Herbal Tea Week | \"Themes work\" | The brand has content-arc memory that recipes alone don't. **Themes are the unit, not recipes.** Underweighted. |\n| 64% read immediately | \"Strong engagement\" | Engagement is shallow. They read; they don't act. The 64→1 gap is the real product problem. |\n| 58% want meal-time filter | \"Wrong IA\" | We organised by condition. Members organise their day around **morning drink, breakfast, lunch, snack, dinner**. That's the mental model. |\n\n## 1.4 Language & cultural notes\n\n- **Code-switching is universal.** Hindi-English-Marathi-Tamil-Kannada-Konkani-Bengali mixed in a single message. *\"Mae bhi\"*, *\"Same here\"*, *\"Tq mam\"* in the same thread.\n- **Regional ingredient names are a real barrier.** Same ingredient has 4+ names: ambali = ambil = ambli (state-by-state), nachni = ragi, kambu = bajra, kutki = sama, kodra = kodo. Milan: *\"Names change areawise.\"*\n- **Reverence for SB is constant and unprompted.** Members say *\"Saurabh Sir teaches\"*, *\"Saurabh beta\"*, *\"Hats off to Saurabh and team\"*. Even when crediting another member (Ashalatha), they redirect credit back to SB.\n- **Saturday / Sunday is a routine anchor.** *\"I shared this in our Saturday batch\"*, *\"weekly master guide on Sundays\"*, *\"recipes for given week sent previous Saturday\"*. The week has a shape; we should design to it.\n- **\"All recipes are good\"** is the default polite reply. Not signal — noise. Real signal lives in specific complaints and specific shares.\n\n## 1.5 Unprompted outcome stories (marketing gold)\n\nThese came WITHOUT being asked. They're real, they're attributed, they're shareable:\n\n- **Geeta (Nagpur)** — *\"His fasting sugar dropped from 145 to 124 in 3 months. The doctor was surprised. I'm not — I trust the food.\"* (Karela sabzi, salt-soak trick)\n- **Madhavee (Chennai)** — *\"Lost 4 kilos in 6 months. Not because of this alone — but because I stopped the biscuits.\"* (Apple-carrot crunch as 5pm snack)\n- **Aarti** — *\"Hot water in morning helping reduce my belly fat\"*\n- **Duriya** — *\"Ragi jowar makai flour se bahot faida huva, kabj dur ho gayi\"* (constipation gone)\n- **Kirti** — *\"Accidity problem also reduce\"* (ginger water)\n- **Salila** — *\"After I started receiving recipes from Habuild, I became more mindful of my routine and truly enjoyed the cooking process. My family loved them too.\"*\n- **Manjula** — *\"Fat first, protein, fibre has become a habit like yoga. No need to keep reminders. Cumin water, ajwain water for drinking.\"*\n\n**Strategic implication:** These are the testimonials we need on the marketing site and inside the app's onboarding. They're a moat — no other recipe brand has them.\n\n## 1.6 The 5 universal asks (repeated across both rounds)\n\nThese come up in nearly every research round, often by different people:\n\n1. **Regional cuisine variety** (5+ voices: Pushpa, Ashalatha, Raj, Amruth, Duriya) — North-bias is real\n2. **Weekly meal plan, delivered Saturday** (Isha, Sumathi, Madhu) — working women can't plan ad-hoc\n3. **Ingredient alternatives / substitutes** (Ravina by name, twice) — pantry reality, not idealism\n4. **Specific health-condition cues** — *\"Who can't take this\"* (Babita), *\"diabetic dinner safe?\"* (Anagha), *\"during periods okay?\"* (Manjula)\n5. **Search past recipes** (Madhavee twice, Supriya, Madhu, Sweta) — the 42% friction number is real\n\n---\n\n# PART 2 — Themes & Content Experiments Tried\n\nWe've shipped 10+ content themes over the past 12+ months. Here is a verdict for each, with the data behind it.\n\n## 2.1 Theme — Herbal Tea Week ✅ WORKED\n\n**What we did:** A week of daily herbal tea recipes on WhatsApp + tied to a Content tab section.\n\n**Signal:**\n- **85% recall** after several weeks (poll on May 8: 138/163 yes, 9 *little bit*, 16 no)\n- Mentioned spontaneously by 10+ members: *\"I drink every day herbal tea cumin coriander fennel\"* — Duriya, Sakina, Rashmi, Umema (multiple \"me too\" cascades)\n- LATHA: *\"Daily I consume first that tea only cumin matti daily different type\"*\n- Chandrakala: *\"Drink herbal tea — Cumin, Dhaniya, fennel seeds & Ajwain morning\"*\n\n**Why it worked:**\n- Themed = one mental model carried across 5–7 days (easier to remember than 5 unrelated recipes)\n- All ingredients already in the pantry\n- Simple = boil water + 3 spices\n- Low-friction cooking that fit existing morning routines\n\n**Implication:** Themes are the unit. We've been underweighting this. The product unit shouldn't be \"1 recipe\" — it should be \"1 week of one idea.\"\n\n## 2.2 Theme — Detox Drinks ✅ WORKED\n\n**What we did:** Drinks (ajwain, jeera, fennel, methi-water, coconut water) shared periodically.\n\n**Signal:**\n- Madhu Mahajan: *\"Detox drinks and salads from Habuild recipes book are in my daily routine\"*\n- Kalpana: *\"Drinking daily since I got your LD sessions as we have both fatty liver\"*\n- Aarti: *\"I use hot water in morning to drink after yoga it very helpful to me reducing my belly fat\"*\n- Krupa: *\"Early morning I drink warm lemon, a pinch of turmeric, salt\"*\n- Many independent voices echoing the same thing — a strong sign of habit formation\n\n**Why it worked:** Same as Herbal Tea — pantry ingredients, simple, fits morning routine, low-stakes.\n\n**Implication:** Drink-format content is a high-conversion micro-habit. Members report sustained daily behaviour.\n\n## 2.3 Theme — Salads (multiple weeks) ✅ WORKED\n\n**What we did:** Salad recipes — OH Salad, fibre salads, chickpea salad, mixed sprouts, apple-carrot crunch.\n\n**Signal:**\n- *\"Liked all salad recipes which I am trying almost daily to maintain thali proportion\"* — Shobha K\n- *\"99301 06161: I tried most of the salad recipes. They are yummy\"*\n- Madhavee → apple-carrot crunch as 5pm snack → 4 kg weight loss\n- Supriya → year-old OH Salad still being referenced\n- Duriya: *\"Regularly use salad\"*\n- Umema: *\"Regularly eat salad and fruit\"*\n\n**Why it worked:**\n- 5pm snack-replacement is a clear behavioural slot (Madhavee made this explicit)\n- Travel-friendly (Madhavee's \"box\" insight)\n- Visual variety in WhatsApp message\n- Don't require cooking — assembly only\n\n**Implication:** Snack-window salads are a winning content slot. Specifically the 4–6pm slump-replacement angle.\n\n## 2.4 Theme — Snacks (kala chana, makhana, energy bites) ✅ WORKED\n\n**What we did:** Roasted chana, corn bhel, date-nut energy bites, makhana, moong cheela, sprouts.\n\n**Signal:**\n- Harshal Patil: *\"I tried roasted kala chana, corn bhel, date nuts energy bites, roasted makhana, sprouts salad mostly, moong cheela all these I tried and all were very useful, tasty and healthy. Sprouts salad mostly I like and take in the dinner mostly.\"*\n- Raj Khopkar: *\"Snacks were too good\"*\n- High mentions in cooking diaries\n\n**Implication:** Snack content is high-conversion. Probably because it directly replaces packet snacks (the unhealthy default), which is an *opt-out* behaviour with a clear before-and-after.\n\n## 2.5 Theme — Ambali week (current, May 2026) 🟡 INCONCLUSIVE / EARLY POSITIVE\n\n**What we did:** 7-day Ambali journey — millet flour fermented drink, daily variation.\n\n**Signal:**\n- Strong recipe-question volume: Anagha (*\"as a diabetic, can I consume in dinner?\"*), Manjula (*\"Made Rajkira ambali for breakfast\"*), Asha Pagaria, Sunita\n- Members are recognising ambali = ambil (regional variant) — real cross-pollination\n- BUT — question volume = confusion volume. Multiple \"wheat flour okay?\" / \"can I have rajkira?\" / \"which millet?\" questions. Members are uncertain.\n\n**Why it's only inconclusive:** It's been running 1 week. Confusion is higher than expected. Need 2-3 more weeks to see if it sticks like Herbal Tea.\n\n**Implication:** Multi-day journey themes with daily variation work IF the variations are obvious. Ambali daily variations are subtle (Day 2: add jeera, Day 3: more water) — members are missing the daily progression. **Make the daily change loud.**\n\n## 2.6 Theme — Microgreens / Quinoa / Rajgira 🟡 INCONCLUSIVE (curiosity, no behaviour yet)\n\n**What we did:** Mentioned in passing in recent content + added to Nutrition Magazine prototype.\n\n**Signal:**\n- Munna: *\"I want to know about quinoa and its recipe\"*\n- Manjula: *\"Do you have the microgreen PDF? If yes please share.\"*\n- Uma: gave detailed explanation about quinoa (member-to-member knowledge transfer)\n- Babita: *\"Rajgira (Amaranth) Amaranth leaves also available, we can cook\"*\n\n**Why inconclusive:** Members are CURIOUS but not yet COOKING. No outcome stories. Information consumption ≠ adoption.\n\n**Implication:** New ingredient themes need a \"first recipe to try this week\" wedge — not just an info card. Curiosity is the easy 10% of the funnel; recipe + reason is the missing 90%.\n\n## 2.7 Theme — Vegetarian gravies / curries ❌ NOT TRIED (clear demand, content gap)\n\n**Demand signal:**\n- Amruth: *\"We need recipes of many vegetarian gravies for chapati, pulka, roti types\"*\n- Multiple members asking about lunch/dinner recipes (we mostly send breakfast + snacks)\n\n**Implication:** Content gap. We've been heavy on breakfast + snacks; lunch/dinner gravies are unmet.\n\n## 2.8 Theme — Regional cuisines (South / East / West) ❌ TRIED ONLY MARGINALLY (clear ask)\n\n**Signal:**\n- Pushpa (loud): *\"Almost all r north Indian recipes. We want recipes from all over India means north, south, east, west and healthy\"*\n- Ashalatha (South India): *\"South we use lots of millets in breakfast\"* (implying we don't show it)\n- Implicit demand from regional names being requested\n\n**Why we haven't:** Content team is North-based; SB's recipe vocabulary is North-default.\n\n**Implication:** **Regional content is the next content axis to invest in.** Easy ROI — content already exists with the audience (Geeta from Nagpur, Ashalatha from Bengaluru, Madhavee from Chennai); we just need to curate it.\n\n## 2.9 Theme — Diet Plans (full day schedule) ❌ TRIED ONCE, LOW SUCCESS\n\n**Signal:**\n- Sumathi: *\"It would be nice if you prepare weekly chart of morning drink to night dinner of different varieties daily\"*\n- 17% in poll wanted \"Diet Plan\" — lower than \"Tips & tricks\" (47%) but not zero\n- Hard to deliver via WhatsApp images because it's multi-meal information\n\n**Implication:** Demand is real but the format (WhatsApp image) doesn't fit. **This is a strong app-only use case** — full-day plan is naturally tabular, exactly what a WhatsApp image can't do. Wedge against WhatsApp.\n\n## 2.10 Theme — Seasonal recipes (summer cooling, winter warming) ⚠️ MIXED (asked for, not consistently delivered)\n\n**Signal:**\n- Raj Khopkar: *\"More seasonal recipes like now we have summer so sattu ke different recipes\"*\n- Isha (Delhi): *\"Please indicate which ones are summer friendly. Delhi is very hot now.\"*\n- 7% poll vote for season-relevance (\"can I have jowar in summer\")\n\n**Implication:** Season is a strong organising principle for older Indian cooks (Ayurvedic + traditional). We have summer-cooling content but don't *tag* it as such. Easy win: add a season chip.\n\n## 2.11 Theme — Dessert / sweets ⚠️ MIXED (tried, niche but loved)\n\n**Signal:**\n- Divya: *\"I have tried dessert recipes. They were delicious.\"*\n- Kirti, Ashalatha → ragi laddoo chain (sweet)\n- Pushpa: makhana laddu image shared\n\n**Implication:** Healthy-sweet category is a strong specific slot. Especially around festivals + Saturdays. Could be a programmed monthly drop (\"Habuild Sweet Saturday\").\n\n---\n\n# PART 3 — Product & Feature Experiments Tried\n\n## 3.1 Product surfaces tried\n\n### Product 0 — WhatsApp PDF/image (baseline, daily) ✅ STILL THE BASELINE\n\n- The default. Daily PDF/image of one recipe.\n- 64% read immediately. 24% save. 82% reuse later. 87-day recall on themed weeks.\n- Strong habit, strong nostalgia. *\"I refer to year-old recipes.\"*\n- Weak on retrieval, durability, search, phone-change.\n- **Verdict: The thing we're trying to replace IS the thing that's working.** The job is to *complement* it, not kill it.\n\n### Product 1 — Habuild Your Recipes (May 9, prototype 1) ❌ LOST TO WHATSAPP\n\n- Link: `khushibagai-create.github.io/habuild-your-recipes/`\n- Concept: Recipe Locker / Herbal Tea Week as an app\n- Tested by 59 members (88% tried)\n- **App vs WhatsApp poll: 38% app, 62% WhatsApp**\n- Sweta's complaint: storage issue acknowledged but still chose WhatsApp\n- Verdict: ❌ **Cold-start app version of a WhatsApp habit does not win.** We picked the wrong wedge.\n- Lesson: The \"give them WhatsApp content in an app\" approach loses because it doesn't add value WhatsApp can't deliver.\n\n### Product 2 — Nutrition Magazine (May 20, prototype 2) ⚠️ MIXED — features mostly underused\n\n- Link: `khushibagai-create.github.io/habuild-nutrition/`\n- Concept: Magazine-feel daily recipe with depth features (ingredient tap, family edition, servings, ask team, share)\n- Tested by ~40+ members\n- App vs WhatsApp question NOT re-asked (oversight — should re-test)\n- Most useful feature poll showed only the **daily recipe** (64%) had real recognition\n- Verdict: ⚠️ The magazine *aesthetic* worked (Supriya, Achla called it \"interesting\" / \"motiva
