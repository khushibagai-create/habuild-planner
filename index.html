function mkSidebarItem(f, deletable) {
  const item = document.createElement('div');
  item.className = 'mw-sidebar-item' + (f.id === activeWorkFile ? ' active' : '');
  item.style.position = 'relative';
  // Show emoji if set, otherwise colored dot
  const emoji = getFileEmoji(f.id);
  if (emoji) {
    const emojiSpan = document.createElement('span');
    emojiSpan.textContent = emoji;
    emojiSpan.style.cssText = 'font-size:14px;line-height:1;flex-shrink:0;';
    item.appendChild(emojiSpan);
  } else {
    const dot = document.createElement('span'); dot.className = 'mw-sidebar-dot';
    dot.style.background = SC_COLOR[f.sc] || '#444';
    item.appendChild(dot);
  }
  const name = document.createElement('span'); name.className = 'mw-sidebar-name';
  name.textContent = f.title;
  item.appendChild(name);
  item.onclick = () => {
    activeWorkFile = f.id;
    document.getElementById('mwSidebar').querySelectorAll('.mw-sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    renderFileContent(f.id);
  };
  if (deletable) {
    const del = document.createElement('button');
    del.innerHTML = '&times;'; del.title = 'Delete file';
    del.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;font-size:14px;cursor:pointer;opacity:0;transition:opacity 0.15s;padding:0 2px;';
    item.addEventListener('mouseenter', () => del.style.opacity = '1');
    item.addEventListener('mouseleave', () => del.style.opacity = '0');
    del.onclick = e => {
      e.stopPropagation();
      if (!confirm('Delete "' + f.title + '"?')) return;
      customWorkFiles = customWorkFiles.filter(cf => cf.id !== f.id);
      saveCustomWF();
      localStorage.removeItem('habuild_mw_v_' + f.id);
      if (activeWorkFile === f.id) { activeWorkFile = WORK_FILES[0].id; renderFileContent(activeWorkFile); }
      renderSidebar();
    };
    item.appendChild(del);
  }
  return item;
}

function showNewFileInput(sidebar, newBtn) {
  if (sidebar.querySelector('.new-file-input-row')) return;
  newBtn.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'new-file-input-row';
  row.style.cssText = 'padding:6px 16px;display:flex;gap:6px;align-items:center;';
  const input = document.createElement('input');
  input.placeholder = 'File name…';
  input.style.cssText = 'flex:1;background:#0a0a0a;border:1px solid #333;border-radius:4px;padding:5px 8px;font-size:12px;color:#e0e0e0;font-family:inherit;outline:none;';
  const ok = document.createElement('button');
  ok.textContent = 'Create';
  ok.style.cssText = 'background:#e0e0e0;color:#000;border:none;border-radius:4px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;';
  const cancel = () => { row.remove(); newBtn.style.display = ''; };
  ok.onclick = () => {
    const title = input.value.trim(); if (!title) return;
    const slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const id = 'custom_' + slug + '_' + Date.now();
    const f = { id, title, group:'My Files', sc:'ps-s', filename: slug+'.md', content:'# '+title+'\n\n' };
    customWorkFiles.push(f); saveCustomWF();
    row.remove(); newBtn.style.display = '';
    renderSidebar();
    activeWorkFile = id;
    document.getElementById('mwSidebar')?.querySelectorAll('.mw-sidebar-item').forEach(i=>i.classList.remove('active'));
    renderFileContent(id);
    if (dirHandle) writeToFile(id, f.content);
  };
  input.onkeydown = e => { if(e.key==='Enter') ok.onclick(); if(e.key==='Escape') cancel(); };
  const x = document.createElement('button');
  x.innerHTML = '&times;'; x.style.cssText = 'background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:0;';
  x.onclick = cancel;
  row.appendChild(input); row.appendChild(ok); row.appendChild(x);
  sidebar.insertBefore(row, newBtn);
  input.focus();
}

// ── PARA Context Menu ──────────────────────────────────────────────────────────
let _paraCtxMenu = null;

function closeParaCtxMenu() {
  if (_paraCtxMenu) { _paraCtxMenu.remove(); _paraCtxMenu = null; }
}

function openParaCtxMenu(e, fileEntry) {
  e.preventDefault(); e.stopPropagation();
  closeParaCtxMenu();

  const menu = document.createElement('div');
  menu.className = 'para-ctx-menu';
  _paraCtxMenu = menu;

  const lbl = document.createElement('div');
  lbl.className = 'para-ctx-label'; lbl.textContent = 'Move to…';
  menu.appendChild(lbl);

  PARA_ORDER.forEach(sec => {
    if (sec === fileEntry.paraSection) return;
    const item = document.createElement('div');
    item.className = 'para-ctx-item';
    const dot = document.createElement('span');
    dot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;';
    dot.className = PARA_META[sec].dotClass;
    item.appendChild(dot);
    item.appendChild(document.createTextNode(PARA_META[sec].label));
    item.onclick = () => {
      moveToPARASection(fileEntry.id, sec);
      closeParaCtxMenu();
      renderSidebar();
      showToast('Moved to ' + PARA_META[sec].label);
    };
    menu.appendChild(item);
  });

  const sep = document.createElement('div'); sep.className = 'para-ctx-sep';
  menu.appendChild(sep);

  const dlItem = document.createElement('div');
  dlItem.className = 'para-ctx-item';
  dlItem.textContent = fileEntry.deadline ? 'Change deadline…' : 'Set deadline…';
  dlItem.onclick = () => { closeParaCtxMenu(); openDeadlineModal(fileEntry); };
  menu.appendChild(dlItem);

  if (fileEntry.deadline) {
    const clearDl = document.createElement('div');
    clearDl.className = 'para-ctx-item';
    clearDl.textContent = 'Clear deadline';
    clearDl.onclick = () => {
      const f = findPARAFile(fileEntry.id);
      if (f) { f.deadline = null; savePARA(paraData); }
      closeParaCtxMenu();
      renderSidebar();
    };
    menu.appendChild(clearDl);
  }

  if (!fileEntry.builtIn) {
    const sep2 = document.createElement('div'); sep2.className = 'para-ctx-sep';
    menu.appendChild(sep2);
    const delItem = document.createElement('div');
    delItem.className = 'para-ctx-item danger';
    delItem.textContent = 'Delete file';
    delItem.onclick = () => {
      closeParaCtxMenu();
      if (!confirm('Delete "' + fileEntry.name + '"? This cannot be undone.')) return;
      removePARAFile(fileEntry.id);
      savePARA(paraData);
      customWorkFiles = customWorkFiles.filter(f => f.id !== fileEntry.id);
      saveCustomWF();
      localStorage.removeItem('habuild_mw_v_' + fileEntry.id);
      if (activeWorkFile === fileEntry.id) {
        const first = [...paraData.projects, ...paraData.areas, ...paraData.resources, ...paraData.archives][0];
        activeWorkFile = first ? first.id : (WORK_FILES[0]?.id || null);
        if (activeWorkFile) renderFileContent(activeWorkFile);
      }
      renderSidebar();
      showToast('File deleted');
    };
    menu.appendChild(delItem);
  }

  document.body.appendChild(menu);

  let x = e.clientX, y = e.clientY;
  const mw = 190, mh = menu.offsetHeight || 200;
  if (x + mw > window.innerWidth - 8) x = window.innerWidth - mw - 8;
  if (y + mh > window.innerHeight - 8) y = window.innerHeight - mh - 8;
  menu.style.left = Math.max(8, x) + 'px';
  menu.style.top  = Math.max(8, y) + 'px';

  setTimeout(() => {
    document.addEventListener('click', function _closeCtx() {
      closeParaCtxMenu();
      document.removeEventListener('click', _closeCtx);
    });
  }, 0);
}

// ── Deadline modal ─────────────────────────────────────────────────────────────
function openDeadlineModal(fileEntry) {
  const ov = document.createElement('div');
  ov.className = 'para-modal-overlay';
  ov.onclick = () => ov.remove();

  const modal = document.createElement('div');
  modal.className = 'para-modal';
  modal.onclick = e => e.stopPropagation();

  const title = document.createElement('div');
  title.className = 'para-modal-title';
  title.textContent = 'Set deadline for "' + fileEntry.name + '"';
  modal.appendChild(title);

  const lbl = document.createElement('div');
  lbl.className = 'para-modal-label'; lbl.textContent = 'Deadline date';
  modal.appendChild(lbl);

  const input = document.createElement('input');
  input.type = 'date'; input.className = 'para-modal-input';
  input.value = fileEntry.deadline || '';
  input.style.colorScheme = 'dark';
  modal.appendChild(input);

  const row = document.createElement('div'); row.className = 'para-modal-row';
  const cancel = document.createElement('button');
  cancel.className = 'para-modal-cancel'; cancel.textContent = 'Cancel';
  cancel.onclick = () => ov.remove();
  const ok = document.createElement('button');
  ok.className = 'para-modal-ok'; ok.textContent = 'Set deadline';
  ok.onclick = () => {
    const val = input.value;
    const f = findPARAFile(fileEntry.id);
    if (f) { f.deadline = val || null; savePARA(paraData); }
    ov.remove();
    renderSidebar();
    if (val) showToast('Deadline set');
  };
  row.appendChild(cancel); row.appendChild(ok);
  modal.appendChild(row);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  setTimeout(() => input.focus(), 50);
}

// ── New-file modal ─────────────────────────────────────────────────────────────
function openNewFileModal(preferredSection) {
  const ov = document.createElement('div');
  ov.className = 'para-modal-overlay';
  ov.onclick = () => ov.remove();

  const modal = document.createElement('div');
  modal.className = 'para-modal';
  modal.onclick = e => e.stopPropagation();

  const title = document.createElement('div');
  title.className = 'para-modal-title'; title.textContent = 'New file';
  modal.appendChild(title);

  const nameLbl = document.createElement('div');
  nameLbl.className = 'para-modal-label'; nameLbl.textContent = 'File name';
  modal.appendChild(nameLbl);
  const nameInput = document.createElement('input');
  nameInput.className = 'para-modal-input';
  nameInput.placeholder = 'e.g. Q1 OKRs, Research Notes…';
  modal.appendChild(nameInput);

  const secLbl = document.createElement('div');
  secLbl.className = 'para-modal-label'; secLbl.textContent = 'PARA section';
  modal.appendChild(secLbl);
  const secSel = document.createElement('select');
  secSel.className = 'para-modal-select';
  PARA_ORDER.forEach(sec => {
    const opt = document.createElement('option');
    opt.value = sec;
    opt.textContent = PARA_META[sec].label + ' — ' + PARA_META[sec].desc;
    if (sec === (preferredSection || 'areas')) opt.selected = true;
    secSel.appendChild(opt);
  });
  modal.appendChild(secSel);

  const dlLbl = document.createElement('div');
  dlLbl.className = 'para-modal-label'; dlLbl.textContent = 'Deadline (optional)';
  modal.appendChild(dlLbl);
  const dlInput = document.createElement('input');
  dlInput.type = 'date'; dlInput.className = 'para-modal-input';
  dlInput.style.colorScheme = 'dark';
  modal.appendChild(dlInput);

  function updateDeadlineVis() {
    const show = secSel.value === 'projects';
    dlLbl.style.display = show ? '' : 'none';
    dlInput.style.display = show ? '' : 'none';
  }
  secSel.onchange = updateDeadlineVis;
  updateDeadlineVis();

  const row = document.createElement('div'); row.className = 'para-modal-row';
  const cancel = document.createElement('button');
  cancel.className = 'para-modal-cancel'; cancel.textContent = 'Cancel';
  cancel.onclick = () => ov.remove();
  const ok = document.createElement('button');
  ok.className = 'para-modal-ok'; ok.textContent = 'Create';
  ok.onclick = () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    const section = secSel.value;
    const deadline = section === 'projects' ? (dlInput.value || null) : null;
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const id = 'custom_' + slug + '_' + Date.now();
    const filename = slug + '.md';
    const content = '# ' + name + '\n\n';
    const newEntry = { id, name, content, paraSection: section, deadline, builtIn: false, sc: 'ps-s', group: 'My Files', filename };
    paraData[section].push(newEntry);
    savePARA(paraData);
    const legacyEntry = { id, title: name, group: 'My Files', sc: 'ps-s', filename, content };
    customWorkFiles.push(legacyEntry);
    saveCustomWF();
    ov.remove();
    if (section === 'archives') paraCollapsed.archives = false;
    paraCollapsed[section] = false;
    renderSidebar();
    activeWorkFile = id;
    renderFileContent(id);
    if (dirHandle) writeToFile(id, content);
    showToast('Created in ' + PARA_META[section].label);
  };
  nameInput.onkeydown = e => {
    e.stopPropagation();
    if (e.key === 'Enter') ok.onclick();
    if (e.key === 'Escape') cancel.onclick();
  };
  row.appendChild(cancel); row.appendChild(ok);
  modal.appendChild(row);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  setTimeout(() => nameInput.focus(), 50);
}

// ── Build a PARA file item ─────────────────────────────────────────────────────
function mkPARAFileItem(fileEntry) {
  const item = document.createElement('div');
  item.className = 'para-file-item' + (fileEntry.id === activeWorkFile ? ' active' : '');

  const emoji = getFileEmoji(fileEntry.id);
  if (emoji) {
    const ic = document.createElement('span');
    ic.className = 'para-file-icon'; ic.textContent = emoji;
    item.appendChild(ic);
  } else {
    const dot = document.createElement('span');
    dot.className = 'para-file-dot ' + PARA_META[fileEntry.paraSection].dotClass;
    item.appendChild(dot);
  }

  const name = document.createElement('span');
  name.className = 'para-file-name';
  name.textContent = fileEntry.name;
  item.appendChild(name);

  if (fileEntry.deadline) {
    const info = deadlineInfo(fileEntry.deadline);
    if (info) {
      const badge = document.createElement('span');
      badge.className = 'para-deadline-badge ' + info.cls;
      badge.textContent = info.label;
      badge.title = fileEntry.deadline;
      item.appendChild(badge);
    }
  }

  if (!fileEntry.builtIn) {
    const del = document.createElement('button');
    del.className = 'para-file-del'; del.innerHTML = '&times;';
    del.title = 'Delete file';
    del.onclick = e => {
      e.stopPropagation();
      if (!confirm('Delete "' + fileEntry.name + '"?')) return;
      removePARAFile(fileEntry.id);
      savePARA(paraData);
      customWorkFiles = customWorkFiles.filter(f => f.id !== fileEntry.id);
      saveCustomWF();
      localStorage.removeItem('habuild_mw_v_' + fileEntry.id);
      if (activeWorkFile === fileEntry.id) {
        const first = [...paraData.projects, ...paraData.areas, ...paraData.resources, ...paraData.archives][0];
        activeWorkFile = first ? first.id : (WORK_FILES[0]?.id || null);
        if (activeWorkFile) renderFileContent(activeWorkFile);
      }
      renderSidebar();
    };
    item.appendChild(del);
  }

  item.onclick = () => {
    activeWorkFile = fileEntry.id;
    document.getElementById('mwSidebar')?.querySelectorAll('.para-file-item')
      .forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    renderFileContent(fileEntry.id);
  };

  item.addEventListener('contextmenu', e => openParaCtxMenu(e, fileEntry));
  return item;
}

// ── PARA Sidebar render ────────────────────────────────────────────────────────
function renderPARASidebar() {
  const sidebar = document.getElementById('mwSidebar');
  if (!sidebar) return;
  sidebar.innerHTML = '';

  PARA_ORDER.forEach(secKey => {
    const meta = PARA_META[secKey];
    const files = paraData[secKey];
    const isOpen = !paraCollapsed[secKey];

    const section = document.createElement('div');
    section.className = 'para-section' + (isOpen ? ' open' : '');

    const header = document.createElement('div');
    header.className = 'para-section-header';

    const chevron = document.createElement('span');
    chevron.className = 'para-section-chevron'; chevron.textContent = '▶';
    header.appendChild(chevron);

    const dot = document.createElement('span');
    dot.style.cssText = 'width:7px;height:7px;border-radius:50%;flex-shrink:0;';
    dot.className = meta.dotClass;
    header.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'para-section-label'; label.textContent = meta.label;
    header.appendChild(label);

    const count = document.createElement('span');
    count.className = 'para-section-count'; count.textContent = files.length || '';
    header.appendChild(count);

    header.onclick = () => {
      paraCollapsed[secKey] = !paraCollapsed[secKey];
      section.classList.toggle('open', !paraCollapsed[secKey]);
    };
    section.appendChild(header);

    const body = document.createElement('div');
    body.className = 'para-section-body';
    files.forEach(f => body.appendChild(mkPARAFileItem(f)));

    const newBtn = document.createElement('button');
    newBtn.className = 'para-new-file-btn';
    newBtn.innerHTML = '<span style="font-size:14px;font-weight:300;line-height:1">+</span> New file here';
    newBtn.onclick = e => { e.stopPropagation(); openNewFileModal(secKey); };
    body.appendChild(newBtn);

    section.appendChild(body);
    sidebar.appendChild(section);
  });

  const globalNew = document.createElement('button');
  globalNew.className = 'para-global-new';
  globalNew.innerHTML = '<span style="font-size:16px;font-weight:300;line-height:1">+</span> New file…';
  globalNew.onclick = () => openNewFileModal('areas');
  sidebar.appendChild(globalNew);
}

function renderSidebar() {
  renderPARASidebar();
}

function renderFileContent(fileId) {
  activeWorkFile = fileId;
  const area = document.getElementById('mwContent'); if (!area) return;
  area.innerHTML = '';
  const file = findFile(fileId) || WORK_FILES[0];
  const edited = hasLocalEdits(file.id);

  // ── Cover image banner (Feature 2) ──
  const coverUrl = getFileCover(file.id);
  if (coverUrl) {
    const coverWrap = document.createElement('div');
    coverWrap.className = 'mw-cover-wrap';
    coverWrap.style.margin = '-40px -56px 32px';
    const img = document.createElement('img');
    img.className = 'mw-cover-img'; img.src = coverUrl; img.alt = '';
    const overlay = document.createElement('div');
    overlay.className = 'mw-cover-overlay';
    const changeBtn = document.createElement('button');
    changeBtn.className = 'mw-cover-btn'; changeBtn.textContent = 'Change cover';
    changeBtn.onclick = e => { e.stopPropagation(); openCoverPopup(file.id, changeBtn); };
    const removeBtn = document.createElement('button');
    removeBtn.className = 'mw-cover-btn'; removeBtn.textContent = 'Remove cover';
    removeBtn.onclick = () => { setFileCover(file.id, ''); renderFileContent(file.id); };
    overlay.appendChild(changeBtn); overlay.appendChild(removeBtn);
    coverWrap.appendChild(img); coverWrap.appendChild(overlay);
    area.appendChild(coverWrap);
  }

  // ── Doc header with emoji + hover actions (Features 1 & 2) ──
  const docHeader = document.createElement('div');
  docHeader.className = 'mw-doc-header';

  const emoji = getFileEmoji(file.id);
  if (emoji) {
    const emojiEl = document.createElement('div');
    emojiEl.className = 'mw-doc-emoji';
    emojiEl.textContent = emoji;
    emojiEl.title = 'Click to change emoji';
    emojiEl.onclick = e => { e.stopPropagation(); openEmojiPicker(file.id, emojiEl); };
    const removeEmojiBtn = document.createElement('div');
    removeEmojiBtn.className = 'mw-emoji-remove'; removeEmojiBtn.textContent = '×';
    removeEmojiBtn.title = 'Remove icon';
    removeEmojiBtn.onclick = e => { e.stopPropagation(); setFileEmoji(file.id, ''); renderSidebar(); renderFileContent(file.id); };
    emojiEl.appendChild(removeEmojiBtn);
    docHeader.appendChild(emojiEl);
  }

  // Hover action bar (Add icon / Add cover)
  const hoverActions = document.createElement('div');
  hoverActions.className = 'mw-header-hover-actions';
  if (!emoji) {
    const addIconBtn = document.createElement('button');
    addIconBtn.className = 'mw-header-action-btn';
    addIconBtn.innerHTML = '☺ Add icon';
    addIconBtn.onclick = e => { e.stopPropagation(); openEmojiPicker(file.id, addIconBtn); };
    hoverActions.appendChild(addIconBtn);
  }
  if (!coverUrl) {
    const addCoverBtn = document.createElement('button');
    addCoverBtn.className = 'mw-header-action-btn';
    addCoverBtn.innerHTML = '🖼 Add cover';
    addCoverBtn.onclick = e => { e.stopPropagation(); openCoverPopup(file.id, addCoverBtn); };
    hoverActions.appendChild(addCoverBtn);
  }
  docHeader.appendChild(hoverActions);
  area.appendChild(docHeader);

  // ── Actions bar ──
  const actions = document.createElement('div'); actions.className = 'mw-file-actions';
  const saveHint = document.createElement('span'); saveHint.className = 'mw-save-indicator';
  saveHint.id = 'mwSaveIndicator'; saveHint.textContent = edited ? 'Edited locally' : '';
  actions.appendChild(saveHint);
  const sp = document.createElement('span'); sp.style.flex = '1'; actions.appendChild(sp);
  // Connect folder button
  const connectBtn = document.createElement('button'); connectBtn.className = 'mw-btn';
  connectBtn.id = 'connectFolderBtn'; connectBtn.onclick = connectFolder;
  actions.appendChild(connectBtn);
  updateConnectBtn();
  const dlBtn = document.createElement('button'); dlBtn.className = 'mw-btn';
  dlBtn.textContent = 'Download .md'; dlBtn.onclick = () => downloadFile(file.id);
  actions.appendChild(dlBtn);
  if (edited) {
    const resetBtn = document.createElement('button'); resetBtn.className = 'mw-btn';
    resetBtn.textContent = 'Reset'; resetBtn.onclick = () => resetFile(file.id);
    actions.appendChild(resetBtn);
  }
  area.appendChild(actions);

  // Editable content
  const editable = document.createElement('div');
  editable.className = 'mw-md mw-editable';
  editable.contentEditable = 'true'; editable.spellcheck = false;
  const savedHtml = localStorage.getItem('habuild_mw_v_' + file.id);
  if (savedHtml) {
    editable.innerHTML = savedHtml;
    // Re-sync visual strikethrough state from checkbox attributes on load
    editable.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      const li = cb.closest('li');
      if (li) { li.style.color = cb.checked ? '#555' : ''; li.style.textDecoration = cb.checked ? 'line-through' : ''; }
    });
  } else {
    renderMarkdown(file.content, editable, null);
  }
  attachCheckboxHandlers(editable, file.id);

  editable.addEventListener('input', () => {
    clearTimeout(_saveTimer);
    const ind = document.getElementById('mwSaveIndicator');
    if (ind) ind.textContent = '...';
    _saveTimer = setTimeout(() => {

function attachCheckboxHandlers(container, fileId) {
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.style.cssText = 'cursor:pointer;accent-color:#34d399;margin-right:6px;';
    cb.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      cb.checked = !cb.checked;
      // Sync HTML attribute so innerHTML serializes the correct state
      if (cb.checked) { cb.setAttribute('checked', ''); } else { cb.removeAttribute('checked'); }
      const li = cb.closest('li');
      if (li) { li.style.color = cb.checked ? '#555' : ''; li.style.textDecoration = cb.checked ? 'line-through' : ''; }
      localStorage.setItem('habuild_mw_v_' + fileId, container.innerHTML);
      writeToFile(fileId, htmlToMd(container));
      const ind = document.getElementById('mwSaveIndicator');
      if (ind) { ind.classList.add('saved'); ind.textContent = 'Saved'; setTimeout(() => { ind.classList.remove('saved'); ind.textContent = 'Edited locally'; }, 1500); }
    });
    // Prevent native click from toggling the checkbox back after mousedown already handled it
    cb.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
  });
}

async function syncGranola(manual=false) {
  if (!granolaDirHandle || !apiKey) return;
  const processed = JSON.parse(localStorage.getItem(GRANOLA_KEY)||'{}');
  const toProcess = [];
  try {
    const perm = await granolaDirHandle.requestPermission({mode:'read'});
    if (perm !== 'granted') return;
    for await (const [name, handle] of granolaDirHandle.entries()) {
      if (handle.kind !== 'file') continue;
      if (!/\.(md|txt|json)$/i.test(name)) continue;
      const file = await handle.getFile();
      const key = name + '_' + file.lastModified;
      if (!processed[key]) toProcess.push({name, handle, key});
    }
    if (!toProcess.length) { if (manual) showToast('No new meeting notes'); return; }
    showToast('Reading ' + toProcess.length + ' note' + (toProcess.length>1?'s':'') + '…');
    const meetingResults = [];
    for (const {name, handle, key} of toProcess) {
      const file = await handle.getFile();
      const content = await file.text();
      if (content.trim().length < 30) { processed[key] = Date.now(); continue; }
      const {tasks, insights, questions} = await extractTasksFromNotes(content, name);
      meetingResults.push({name, tasks, insights, questions});
      processed[key] = Date.now();
    }
    localStorage.setItem(GRANOLA_KEY, JSON.stringify(processed));
    localStorage.setItem('habuild_granola_last', Date.now().toString());
    const hasContent = meetingResults.some(m => m.tasks.length || m.insights.length || m.questions.length);
    if (!hasContent) { if(manual) showToast('No action items found in notes'); return; }
    showMeetingDigest(meetingResults);
  } catch(e) { console.warn('Granola sync error:', e); if (manual) showToast('Sync failed — check folder access'); }
}

async function extractTasksFromNotes(content, filename) {
  if (!apiKey) return {tasks:[], insights:[], questions:[]};
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1200,
        system: `You are a Second Brain assistant for Khushi, PM at Habuild (India yoga habit app).
Extract three things from meeting notes. Return ONLY valid JSON, no markdown.

Format: {"tasks":[...],"insights":[...],"questions":[...]}

tasks: action items owned by Khushi.
  Each: {"label":"concise action under 100 chars","secId":"coord|data|calls|focus","tag":"","tc":"t-none"}
  Sections: coord=messaging/syncing people, data=metrics/analysis, calls=user interviews, focus=reading/writing/thinking
  Tags: "14-day trial"→t-data | "A/B testing"→t-coord | "TV app"→t-coord | "cognitive games"→t-focus | "research"→t-calls | "notifications"→t-focus | "homescreen"→t-coord | else ""→t-none

insights: key decisions made or important learnings from this meeting. Short strings, max 120 chars each.

questions: open questions or unknowns surfaced in this meeting that are still unresolved. Short strings.

Return empty arrays if nothing found. Do not invent items not in the notes.`,
        messages: [{role:'user', content:'Notes from "'+filename+'":\n\n'+content.slice(0,4500)}]
      })
    });
    if (!res.ok) return {tasks:[], insights:[], questions:[]};
    const j = await res.json();
    const raw = j.content[0].text.trim().replace(/^```json?\s*/i,'').replace(/```\s*$/,'').trim();
    const parsed = JSON.parse(raw);
    return {
      tasks: Array.isArray(parsed.tasks) ? parsed.tasks : [],
      insights: Array.isArray(parsed.insights) ? parsed.insights : [],
      questions: Array.isArray(parsed.questions) ? parsed.questions : [],
    };
  } catch(e) { return {tasks:[], insights:[], questions:[]}; }
}

// ── HTML → Markdown ───────────────────────────────────────────────────────────
function htmlToMd(el) {
  let out = '';
  function walk(node, ctx) {
    if (node.nodeType === Node.TEXT_NODE) { out += node.textContent; return; }
    const tag = node.tagName?.toLowerCase();
    if (!tag) return;
    const kids = () => [...node.childNodes].forEach(c => walk(c, ctx));
    switch(tag) {
      case 'h1': out+='\n# '; kids(); out+='\n'; break;
      case 'h2': out+='\n## '; kids(); out+='\n'; break;
      case 'h3': out+='\n### '; kids(); out+='\n'; break;
      case 'p':  out+='\n'; kids(); out+='\n'; break;
      case 'strong': out+='**'; kids(); out+='**'; break;
      case 'em':     out+='_'; kids(); out+='_'; break;
      case 'code':   if(ctx==='pre'){kids();}else{out+='`';kids();out+='`';} break;
      case 'pre':    out+='\n```\n'; [...node.childNodes].forEach(c=>walk(c,'pre')); out+='\n```\n'; break;
      case 'blockquote': out+='\n> '; kids(); out+='\n'; break;
      case 'ul': out+='\n'; kids(); break;
      case 'ol': { let i=1; [...node.children].forEach(li=>{out+=`\n${i}. `;walk(li,'ol');i++;}); break; }
      case 'li': {
        const cb = node.querySelector('input[type="checkbox"]');
        if (cb) {
          out += cb.checked ? '- [x] ' : '- [ ] ';
          [...node.childNodes].forEach(c=>{ if(c!==cb) walk(c,ctx); });
        } else { if(ctx!=='ol') out+='- '; kids(); }
        out+='\n'; break;
      }
      case 'a':  { const h=node.getAttribute('href')||''; out+='['; kids(); out+=`](${h})`; break; }
      case 'hr': out+='\n---\n'; break;
      case 'br': out+='\n'; break;
      case 'table': {
        [...node.querySelectorAll('tr')].forEach((row,ri)=>{
          const cells=[...row.querySelectorAll('th,td')];
          out+='| '+cells.map(c=>c.textContent.trim()).join(' | ')+' |\n';
          if(ri===0) out+='| '+cells.map(()=>'---').join(' | ')+' |\n';
        }); break;
      }
      default: kids(); break;
    }
  }
  [...el.childNodes].forEach(n=>walk(n,null));
  return out.replace(/\n{3,}/g,'\n\n').trim()+'\n';
}

  let top = rect.bottom + 6;
  if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if (top + ph > window.innerHeight - 12) top = rect.top - ph - 6;
  popup.style.left = Math.max(12, left) + 'px';
  popup.style.top = Math.max(12, top) + 'px';

  setTimeout(() => input.focus(), 0);

  setTimeout(() => {
    document.addEventListener('click', function closeCoverHandler(ev) {
      if (!popup.contains(ev.target) && ev.target !== anchorEl) {
        popup.remove(); _coverPopupEl = null;
        document.removeEventListener('click', closeCoverHandler);
      }
    });
  }, 0);
}

// ═══════════════════════════════════════════════════════════════════
// Feature 3: Slash Command Menu
// ═══════════════════════════════════════════════════════════════════
let _slashMenuEl = null;
let _slashQuery = '';
let _slashRange = null;
let _slashActiveIdx = 0;

function getFilteredCommands(query) {
  if (!query) return SLASH_COMMANDS;
  const q = query.toLowerCase();
  return SLASH_COMMANDS.filter(c =>
    c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.tag.toLowerCase().includes(q)
  );
}

function closeSlashMenu() {
  if (_slashMenuEl) { _slashMenuEl.remove(); _slashMenuEl = null; }
  _slashQuery = '';
  _slashRange = null;
  _slashActiveIdx = 0;
}

function openSlashMenu(rect) {
  closeSlashMenu();
  const menu = document.createElement('div');
  menu.className = 'mw-slash-menu';
  _slashMenuEl = menu;
  document.body.appendChild(menu);
  positionSlashMenu(rect);
  renderSlashItems();
}

function positionSlashMenu(rect) {
  if (!_slashMenuEl) return;
  const mh = _slashMenuEl.offsetHeight || 220;
  let top = rect.bottom + window.scrollY + 4;
  if (rect.bottom + mh + 20 > window.innerHeight) top = rect.top + window.scrollY - mh - 4;
  let left = rect.left + window.scrollX;
  if (left + 260 > window.innerWidth - 12) left = window.innerWidth - 272;
  _slashMenuEl.style.left = Math.max(12, left) + 'px';
  _slashMenuEl.style.top = top + 'px';
}

function renderSlashItems() {
  if (!_slashMenuEl) return;
  _slashMenuEl.innerHTML = '';
  const cmds = getFilteredCommands(_slashQuery);
  if (!cmds.length) { closeSlashMenu(); return; }
  if (_slashActiveIdx >= cmds.length) _slashActiveIdx = 0;
  cmds.forEach((cmd, i) => {
    const item = document.createElement('div');
    item.className = 'mw-slash-item' + (i === _slashActiveIdx ? ' active' : '');
    item.innerHTML = `<span class="mw-slash-icon">${cmd.icon}</span><span class="mw-slash-name">${cmd.name}</span><span class="mw-slash-desc">${cmd.desc}</span>`;
    item.onmouseenter = () => { _slashActiveIdx = i; renderSlashItems(); };
    item.onclick = () => applySlashCommand(cmd);
    _slashMenuEl.appendChild(item);
  });
}

function applySlashCommand(cmd) {
  closeSlashMenu();
  const editable = document.querySelector('.mw-editable');
  if (!editable) return;
  editable.focus();

  // Delete the /query text
  if (_slashRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_slashRange);
  }
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  // Walk backward from cursor to find the / character
  const textNode = range.startContainer;
  if (textNode.nodeType === Node.TEXT_NODE) {
    const text = textNode.textContent;
    const cursorPos = range.startOffset;
    // Find the slash position
    const slashPos = text.lastIndexOf('/', cursorPos);
    if (slashPos !== -1) {
      const delRange = document.createRange();
      delRange.setStart(textNode, slashPos);
      delRange.setEnd(textNode, cursorPos);
      delRange.deleteContents();
    }
  }

  // Insert the block element
  let newEl = null;
  switch(cmd.tag) {
    case 'p':
      newEl = document.createElement('p');
      newEl.innerHTML = '<br>';
      break;
    case 'h1': case 'h2': case 'h3':
      newEl = document.createElement(cmd.tag);
      newEl.innerHTML = '<br>';
      break;
    case 'todo':
      newEl = document.createElement('ul');
      const li = document.createElement('li');
      li.innerHTML = '<input type="checkbox"> ';
      newEl.appendChild(li);
      break;
    case 'ul':
      newEl = document.createElement('ul');
      const ulli = document.createElement('li');
      ulli.innerHTML = '<br>';
      newEl.appendChild(ulli);
      break;
    case 'ol':
      newEl = document.createElement('ol');
      const olli = document.createElement('li');
      olli.innerHTML = '<br>';
      newEl.appendChild(olli);
      break;
    case 'blockquote':
      newEl = document.createElement('blockquote');
      newEl.innerHTML = '<br>';
      break;
    case 'pre':
      newEl = document.createElement('pre');
      const code = document.createElement('code');
      code.innerHTML = '<br>';
      newEl.appendChild(code);
      break;
    case 'hr':
      newEl = document.createElement('hr');
      break;
    default:
      newEl = document.createElement('p');
      newEl.innerHTML = '<br>';
  }

  const updSel = window.getSelection();
  if (updSel.rangeCount) {
    const r = updSel.getRangeAt(0);
    // Find block-level parent to insert after
    let node = r.startContainer;
    while (node && node !== editable && node.parentNode !== editable) node = node.parentNode;
    if (node && node !== editable) {
      node.parentNode.insertBefore(newEl, node.nextSibling);
    } else {
      editable.appendChild(newEl);
    }
    // Place cursor inside new element
    const newRange = document.createRange();
    if (cmd.tag === 'hr') {
      const p = document.createElement('p'); p.innerHTML = '<br>';
      newEl.insertAdjacentElement('afterend', p);
      newRange.setStart(p, 0); newRange.collapse(true);
    } else if (cmd.tag === 'todo' || cmd.tag === 'ul') {
      const liNode = newEl.querySelector('li');
      newRange.selectNodeContents(liNode); newRange.collapse(false);
    } else if (cmd.tag === 'ol') {
      const liNode = newEl.querySelector('li');
      newRange.selectNodeContents(liNode); newRange.collapse(false);
    } else if (cmd.tag === 'pre') {
      const codeNode = newEl.querySelector('code');
      newRange.selectNodeContents(codeNode); newRange.collapse(false);
    } else {
      newRange.selectNodeContents(newEl); newRange.collapse(false);
    }
    updSel.removeAllRanges(); updSel.addRange(newRange);
  }

  editable.dispatchEvent(new Event('input', {bubbles:true}));
  if (cmd.tag === 'todo') attachCheckboxHandlers(editable, activeWorkFile);
}

// Hook slash command into the editable div (called after rendering)
function initSlashMenu(editable) {
  editable.addEventListener('keydown', e => {
    if (_slashMenuEl) {
      const cmds = getFilteredCommands(_slashQuery);
      if (e.key === 'ArrowDown') {
        e.preventDefault(); _slashActiveIdx = (_slashActiveIdx + 1) % cmds.length;
        renderSlashItems(); return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault(); _slashActiveIdx = (_slashActiveIdx - 1 + cmds.length) % cmds.length;
        renderSlashItems(); return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        if (cmds[_slashActiveIdx]) applySlashCommand(cmds[_slashActiveIdx]);
        return;
      }
      if (e.key === 'Escape') { closeSlashMenu(); return; }
    }
  });

  editable.addEventListener('input', () => {
    const sel = window.getSelection();
    if (!sel.rangeCount) { closeSlashMenu(); return; }
    const range = sel.getRangeAt(0);
    const textNode = range.startContainer;
    if (textNode.nodeType !== Node.TEXT_NODE) { closeSlashMenu(); return; }
    const text = textNode.textContent;
    const pos = range.startOffset;
    // Find the last slash before the cursor on this line
    const lineText = text.substring(0, pos);
    const slashIdx = lineText.lastIndexOf('/');
    if (slashIdx === -1) { closeSlashMenu(); return; }
    // Only handle slash at start of word (preceded by space/newline or start)
    const before = lineText[slashIdx - 1];
    if (before && before !== ' ' && before !== '\n') { closeSlashMenu(); return; }
    _slashQuery = lineText.substring(slashIdx + 1);
    // If query has spaces, close (not a command)
    if (_slashQuery.includes(' ')) { closeSlashMenu(); return; }
    const rect = range.getBoundingClientRect();
    if (!_slashMenuEl) {
      _slashRange = range.cloneRange();
      openSlashMenu(rect);
    } else {
      _slashRange = range.cloneRange();
      renderSlashItems();
      positionSlashMenu(rect);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
// Feature 4: Floating Selection Toolbar
// ═══════════════════════════════════════════════════════════════════
let _selToolbar = null;

function createSelToolbar() {
  if (_selToolbar) return;
  const tb = document.createElement('div');
  tb.className = 'mw-sel-toolbar';
  tb.style.display = 'none';
  _selToolbar = tb;

  const buttons = [
    { label: 'B', title: 'Bold', style: 'font-weight:700;', action: () => document.execCommand('bold') },
    { label: 'I', title: 'Italic', style: 'font-style:italic;', action: () => document.execCommand('italic') },
    { label: 'S', title: 'Strikethrough', style: 'text-decoration:line-through;', action: () => document.execCommand('strikeThrough') },
    null, // separator
    { label: '&lt;/&gt;', title: 'Inline code', style: 'font-family:monospace;font-size:11px;', action: wrapSelectionInCode },
    { label: '🔗', title: 'Link', style: 'font-size:14px;', action: wrapSelectionInLink },
  ];

  buttons.forEach(btn => {
    if (btn === null) {
      const sep = document.createElement('div'); sep.className = 'mw-sel-sep';
      tb.appendChild(sep); return;
    }
    const b = document.createElement('button');
    b.className = 'mw-sel-btn'; b.title = btn.title;
    b.innerHTML = btn.label; b.style.cssText += btn.style;
    b.onmousedown = e => { e.preventDefault(); btn.action(); };
    tb.appendChild(b);
  });

  document.body.appendChild(tb);
}

function wrapSelectionInCode() {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const code = document.createElement('code');
  try { range.surroundContents(code); } catch(e) {
    // surroundContents fails for cross-element selections — fallback
    const frag = range.extractContents();
    code.appendChild(frag); range.insertNode(code);
  }
  sel.removeAllRanges();
  const newRange = document.createRange();
  newRange.selectNodeContents(code); newRange.collapse(false);
  sel.addRange(newRange);
  const ed = document.querySelector('.mw-editable');
  if (ed) ed.dispatchEvent(new Event('input', {bubbles:true}));
}

function wrapSelectionInLink() {
  const url = prompt('Enter URL:', 'https://');
  if (!url) return;
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const a = document.createElement('a');
  a.href = url; a.target = '_blank';
  try { range.surroundContents(a); } catch(e) {
    const frag = range.extractContents();
    a.appendChild(frag); range.insertNode(a);
  }
  sel.removeAllRanges();
  const ed = document.querySelector('.mw-editable');
  if (ed) ed.dispatchEvent(new Event('input', {bubbles:true}));
}

function updateSelToolbar() {
  if (!_selToolbar) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) {
    _selToolbar.style.display = 'none'; return;
  }
  // Check selection is inside .mw-editable
  const editable = document.querySelector('.mw-editable');
  if (!editable) { _selToolbar.style.display = 'none'; return; }
  const anchorNode = sel.anchorNode;
  if (!editable.contains(anchorNode)) { _selToolbar.style.display = 'none'; return; }

  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if (!rect.width && !rect.height) { _selToolbar.style.display = 'none'; return; }

  _selToolbar.style.display = 'flex';
  const tw = _selToolbar.offsetWidth || 200;
  let left = rect.left + (rect.width / 2) - (tw / 2);
  let top = rect.top + window.scrollY - _selToolbar.offsetHeight - 10;
  if (top < 4) top = rect.bottom + window.scrollY + 6;
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  _selToolbar.style.left = left + 'px';
  _selToolbar.style.top = top + 'px';
}

document.addEventListener('selectionchange', () => {
  // Small delay so selection is finalized
  setTimeout(updateSelToolbar, 10);
});

// ═══════════════════════════════════════════════════════════════════
// Feature 5: Command Palette (Cmd+K)
// ═══════════════════════════════════════════════════════════════════
let _cmdPalOpen = false;
let _cmdPalActiveIdx = 0;

function openCommandPalette() {
  if (_cmdPalOpen) { closeCommandPalette(); return; }
  _cmdPalOpen = true;
  _cmdPalActiveIdx = 0;

  const overlay = document.createElement('div');
  overlay.className = 'mw-cmdpal-overlay';
  overlay.id = 'mwCmdPal';
  overlay.onclick = e => { if (e.target === overlay) closeCommandPalette(); };

  const modal = document.createElement('div');
  modal.className = 'mw-cmdpal-modal';
  modal.onclick = e => e.stopPropagation();

  const input = document.createElement('input');
  input.className = 'mw-cmdpal-input';
  input.placeholder = 'Search documents...';
  input.setAttribute('autocomplete', 'off');

  const list = document.createElement('div');
  list.className = 'mw-cmdpal-list';
  list.id = 'mwCmdPalList';

  modal.appendChild(input); modal.appendChild(list);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  renderCmdPalList('', list);

  setTimeout(() => input.focus(), 0);

  input.addEventListener('input', () => {
    _cmdPalActiveIdx = 0;
    renderCmdPalList(input.value.trim(), list);
  });

  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.mw-cmdpal-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _cmdPalActiveIdx = Math.min(_cmdPalActiveIdx + 1, items.length - 1);
      updateCmdPalActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      _cmdPalActiveIdx = Math.max(_cmdPalActiveIdx - 1, 0);
      updateCmdPalActive(items);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const active = list.querySelector('.mw-cmdpal-item.active');
      if (active) active.click();
    } else if (e.key === 'Escape') {
      closeCommandPalette();
    }
  });
}

function closeCommandPalette() {
  document.getElementById('mwCmdPal')?.remove();
  _cmdPalOpen = false;
}

function updateCmdPalActive(items) {
  items.forEach((it, i) => it.classList.toggle('active', i === _cmdPalActiveIdx));
  const activeEl = items[_cmdPalActiveIdx];
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

function renderCmdPalList(query, list) {
  list.innerHTML = '';
  const paraAllFiles = [...paraData.projects, ...paraData.areas, ...paraData.resources, ...paraData.archives];
  const allFiles = paraAllFiles.map(f => ({
    id: f.id,
    title: f.name,
    group: PARA_META[f.paraSection]?.label || f.group || 'My Files',
  }));
  const q = query.toLowerCase();
  const filtered = q ? allFiles.filter(f => f.title.toLowerCase().includes(q)) : allFiles;

  if (!filtered.length) {
    const empty = document.createElement('div');
    empty.className = 'mw-cmdpal-empty';
    empty.textContent = 'No documents found';
    list.appendChild(empty); return;
  }

  filtered.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'mw-cmdpal-item' + (i === _cmdPalActiveIdx ? ' active' : '');
    const emojiEl = document.createElement('div');
    emojiEl.className = 'mw-cmdpal-emoji';
    const emoji = getFileEmoji(f.id);
    emojiEl.textContent = emoji || '📄';
    const titleEl = document.createElement('div');
    titleEl.className = 'mw-cmdpal-title';
    titleEl.textContent = f.title;
    const groupEl = document.createElement('div');
    groupEl.className = 'mw-cmdpal-group';
    groupEl.textContent = f.group || 'My Files';
    item.appendChild(emojiEl); item.appendChild(titleEl); item.appendChild(groupEl);
    item.onclick = () => {
      closeCommandPalette();
      switchTab('mywork');
      activeWorkFile = f.id;
      renderSidebar();
      renderFileContent(f.id);
    };
    list.appendChild(item);
  });
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openCommandPalette();
  }
});

// Quick Capture Inbox
// ═══════════════════════════════════════════════════════════════════
const INBOX_KEY = 'habuild_inbox';
function loadInbox() { return JSON.parse(localStorage.getItem(INBOX_KEY) || '[]'); }
function saveInbox(items) { localStorage.setItem(INBOX_KEY, JSON.stringify(items)); }
function inboxUnprocessedCount() { return loadInbox().filter(i => !i.processed).length; }

function syncInboxBadges() {
  const n = inboxUnprocessedCount();
  const fab = document.getElementById('captureBadge');
  const tabBadge = document.getElementById('inboxTabBadge');
  if (fab) { fab.textContent = n > 0 ? (n > 9 ? '9+' : n) : ''; fab.classList.toggle('visible', n > 0); }
  if (tabBadge) { tabBadge.textContent = n > 0 ? (n > 9 ? '9+' : n) : ''; tabBadge.classList.toggle('visible', n > 0); }
}

function openCaptureModal() {
  if (document.getElementById('captureOverlay')) return;
  let selectedResonance = null;
  const overlay = document.createElement('div');
  overlay.className = 'capture-overlay'; overlay.id = 'captureOverlay';
  overlay.onclick = e => { if (e.target === overlay) closeCaptureModal(); };
  const modal = document.createElement('div');
  modal.className = 'capture-modal'; modal.onclick = e => e.stopPropagation();
  const textarea = document.createElement('textarea');
  textarea.className = 'capture-input'; textarea.placeholder = 'Capture any idea, thought, or note…'; textarea.rows = 2;
  textarea.addEventListener('input', () => { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 180) + 'px'; });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); closeCaptureModal(); return; }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSaveCapture(textarea.value, selectedResonance); }
  });
  const resRow = document.createElement('div'); resRow.className = 'capture-resonance';
  const resLabel = document.createElement('span'); resLabel.className = 'capture-res-label'; resLabel.textContent = 'Resonance:';
  resRow.appendChild(resLabel);
  const RESONANCE_OPTIONS = [{ id:'inspired', emoji:'💡', label:'Inspired' }, { id:'useful', emoji:'🔧', label:'Useful' }, { id:'surprising', emoji:'⚡', label:'Surprising' }];
  const resBtns = [];
  RESONANCE_OPTIONS.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'capture-res-btn'; btn.dataset.resonance = opt.id;
    btn.innerHTML = `${opt.emoji} ${opt.label}`;
    btn.onclick = () => {
      if (selectedResonance === opt.id) { selectedResonance = null; btn.classList.remove('selected'); }
      else { selectedResonance = opt.id; resBtns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
    };
    resBtns.push(btn); resRow.appendChild(btn);
  });
  const footer = document.createElement('div'); footer.className = 'capture-footer';
  const hint = document.createElement('div'); hint.className = 'capture-hint';
  hint.innerHTML = '<kbd>Enter</kbd> save &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> newline &nbsp;·&nbsp; <kbd>Esc</kbd> close';
  const saveBtn = document.createElement('button'); saveBtn.className = 'capture-save-btn'; saveBtn.textContent = 'Capture'; saveBtn.disabled = true;
  textarea.addEventListener('input', () => { saveBtn.disabled = textarea.value.trim().length === 0; });
  saveBtn.onclick = () => doSaveCapture(textarea.value, selectedResonance);
  footer.appendChild(hint); footer.appendChild(saveBtn);
  modal.appendChild(textarea); modal.appendChild(resRow); modal.appendChild(footer);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  setTimeout(() => textarea.focus(), 30);
}

function closeCaptureModal() { document.getElementById('captureOverlay')?.remove(); }

function doSaveCapture(text, resonance) {
  const trimmed = text.trim(); if (!trimmed) return;
  const items = loadInbox();
  items.unshift({ id:'cap_'+Date.now()+'_'+Math.random().toString(36).slice(2), text:trimmed, resonance:resonance||null, capturedAt:Date.now(), processed:false });
  saveInbox(items); closeCaptureModal(); syncInboxBadges(); showToast('Captured');
  if (currentTab === 'inbox') renderInboxPane();
}

// Inline capture from the Inbox tab itself (no modal)
function captureFromInbox() {
  const input = document.getElementById('inboxCaptureInput'); if (!input) return;
  const text = input.value.trim(); if (!text) return;
  const items = loadInbox();
  items.unshift({ id:'cap_'+Date.now()+'_'+Math.random().toString(36).slice(2), text:text, resonance:null, capturedAt:Date.now(), processed:false });
  saveInbox(items); input.value = ''; input.style.height = ''; syncInboxBadges(); renderInboxPane(); input.focus();
}
function wireInboxCaptureInput() {
  const input = document.getElementById('inboxCaptureInput');
  const btn = document.getElementById('inboxCaptureBtn');
  if (!input || !btn) return;
  const refresh = () => {
    btn.disabled = input.value.trim().length === 0;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  };
  input.addEventListener('input', refresh);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); captureFromInbox(); }
  });
  refresh();
}

function renderInboxPane() {

const DOT_BG = { 'd-data':'#3B82F6','d-coord':'#8B5CF6','d-calls':'#10B981','d-focus':'#F59E0B' };

function mkInboxCard(item) {
  const card = document.createElement('div'); card.className = 'inbox-card'; card.id = 'icard_'+item.id;
  const textEl = document.createElement('div'); textEl.className = 'inbox-card-text'; textEl.textContent = item.text;
  card.appendChild(textEl);

  const timeEl = document.createElement('span'); timeEl.className = 'inbox-card-time'; timeEl.textContent = formatRelativeTime(item.capturedAt);
  meta.appendChild(timeEl);
  if (item.resonance) {

      const sep=document.createElement('div'); sep.className='mw-sel-sep'; _selToolbar.appendChild(sep);
      const l2Btn=document.createElement('button'); l2Btn.className='mw-sel-btn ps-l2-btn'; l2Btn.title='Mark Important'; l2Btn.textContent='Mark';
      l2Btn.onmousedown=e=>{e.preventDefault();wrapSelectionInMark('l2');}; _selToolbar.appendChild(l2Btn);
      const l3Btn=document.createElement('button'); l3Btn.className='mw-sel-btn ps-l3-btn'; l3Btn.title='Highlight Key'; l3Btn.textContent='Key';
      l3Btn.onmousedown=e=>{e.preventDefault();wrapSelectionInMark('l3');}; _selToolbar.appendChild(l3Btn);
    }
    recordOpen(fileId);
  };
})();
</script>
</body>
