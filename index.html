BP`, `Immunity`, `PCOD`, `General`\n    - `image_url` (text — full Supabase public URL)\n    - `initial` (text — single char fallback for avatar)\n    - `created_at` (timestamptz)\n  - **Optional schema additions (not yet added):**\n    - `meal_type` (text) — values: `breakfast`, `lunch`, `dinner`, `morning-drink`, `snack`, `dessert`, `side`. Dashboard already reads from this column if present; falls back to localStorage. Run `ALTER TABLE submissions ADD COLUMN meal_type text;` to graduate dashboard tags to backend.\n    - `status` (text) — for `hidden`/`featured`/`visible` moderation. Same fallback pattern.\n- **Bucket:** `submission-photos` (public read)\n- **Auth:** uses legacy JWT anon key (embedded in prototype + dashboard JS — fine for prototype)\n- **Operations:** GET / POST / PATCH / DELETE all hit PostgREST endpoints directly from frontend\n\nCurated overrides live in a `CURATED_RECIPES` map in `recipe-features-nutrition-magazine.html` — applied in `refreshRemoteSubmissions()` via `applyCuration()`. Currently overrides Rajshree's \"Ragi Oats Sugar Free Cookies\" with a full recipe (ingredients + method).\n\n---\n\n## 5. Mixpanel tracking\n\n**Project:** `User Research` (ID `3998338`, US cluster)\n**Token:** `81929a7952506e86cd230338890d3298` (in prototype)\n\nSuper properties registered on every event:\n- `prototype_name: 'recipes'`\n- `prototype_version: 'v2'`\n- `user_name`, `user_phone` (from blocking onboarding)\n\nEvents fired: `Identity Captured`, `Screen Viewed`, `CTA Clicked`, `Card Tapped`, `Toggle Changed`, `Form Submitted`, `Modal Opened/Closed`, `Share Initiated`, `Scroll Depth`, `Session Ended`.\n\nDashboard: `https://mixpanel.com/project/3998338`\n\n---\n\n## 6. Architecture (single-file prototype)\n\n`recipe-features-nutrition-magazine.html` is one big file containing:\n\n- **Inline CSS** (~600 lines) with Habuild tokens (forest #2D5016, sage, cream, sand, gold) + Playfair Display titles + Inter body\n- **HTML screens** (~14 screen sections, only one `.active` at a time — `display: flex` toggle)\n- **Inline JS** with:\n  - State persistence: `localStorage` key `habuild-nut-v2`\n  - Supabase calls: `backendCreate()`, `backendUpdate()`, `backendDelete()`, `refreshRemoteSubmissions()`\n  - Like helpers: `getRecipeKey()`, `isLiked()`, `getLikeCount()`, `toggleLike()` (baseline 12–72 likes hashed from recipe key)\n  - Filters: `HIDE_DISHES` array hides `sattu drink`, `ragi laddoo`, `hello recipe`, `hello`\n  - Featured logic: `getFeatured()` picks the most-liked submission across all sources\n\n**Key screen IDs:**\n- `screen-onboarding-*` — name + phone capture (blocking)\n- `screen-home` — Featured Recipes + Your recipes + Browse + FAQ\n- `screen-today` — Today's recipe detail (Ambali Day 6)\n- `screen-member-detail` — community/own recipe detail (Edit + Delete pills if own)\n- `screen-add-recipe` — Add Recipe form (also handles Edit mode via `openAddRecipe(existing)`)\n- `screen-recipe-success` — post-submit success\n- `screen-browse-all` — full grid with condition filter pill\n- `screen-faq` — Ask the team\n\n**Walkthrough is killed** — both the phone-continue handler AND `init()` trigger no longer show it.\n\n---\n\n## 7. Key product decisions (made, locked)\n\n| Decision | Why |\n|---|---|\n| \"Featured Today\" → **\"Featured Recipes\"** with sub \"From the community members\" | Decouple from time — Featured rotates by most-liked, not by day |\n| Most-liked recipe across all sources becomes Featured | Removes need for editorial curation; reward popularity |\n| Edit + Delete pills on own recipes | Members felt they couldn't fix typos / withdraw — fixed |\n| **\"Your recipes\"** persistent home section | Members couldn't find what they uploaded; this surfaces it |\n| Empty state: Playfair \"Save what you cook\" + solid green CTA + decorative shapes | First empty state looked weak; needed warmth |\n| Post-submit success screen (\"Your recipe is live\") with quiet \"Done — back to home\" link | Confirm submission worked; reduce anxiety |\n| Killed the 5-screen walkthrough | Onboarding fatigue; mock card looked live and confused members |\n| Hidden test entries (`sattu drink`, `ragi laddoo`, `hello`, `hello recipe`) | Test data shouldn't reach real members |\n| Featured Rajshree's \"Ragi Oats Sugar Free Cookies\" with curated complete recipe | Member submission with team-written ingredients + method overlay |\n| Like button on member detail hero, grid tiles, and home Featured card | Lightweight engagement signal that drives Featured |\n| **English-only copy mandate** | Global audience. Only Hindi for recipe/dish words (Ambali, Ragi, etc.) |\n| FAQ card moved to right after \"Browse all recipes\" | Higher discoverability of team-reply feature |\n| Removed \"Share your recipe\" CTA | Redundant with Add Recipe entry points |\n\n---\n\n## 8. What's deferred (not built)\n\n- **Family Edition** via servings toggle (planned, not in this build)\n- **Ask-the-Team gated auto-answer** (FAQ matcher + LLM fallback)\n- **Search** on Browse all recipes (filter chips work, search doesn't)\n- **WhatsApp share template** with custom card image (still uses default share-sheet)\n- **In-app notifications** when team replies to your question\n- **Translation toggle** for English ↔ Hindi (currently English-only)\n- **`meal_type` column on `submissions`** — dashboard tags are localStorage-only until column added (one ALTER TABLE call away)\n- **`status` column** for hidden/featured — same story; dashboard moderation is localStorage-only\n\n---\n\n## 8a. Admin Dashboard\n\nLive at `/recipes-dashboard.html`. Built 2026-05-27 as a moderation + ingest tool for the team.\n\n**Schema mapping:** Reads/writes the same `submissions` table the prototype uses. Same Supabase anon key (no auth on the dashboard itself — anyone with the URL can use it; share carefully).\n\n**Features:**\n- **Stats strip** — Total · Today · This week · With photo · Unique members\n- **Filter bar** — search (dish/member/city/note/condition) + meal-type dropdown + condition dropdown + date pills (All/Today/Week/Month) + status pills (All/Visible/Hidden/Featured) + photo pills (All/With/No)\n- **Recipe grid** — photo, dish (Playfair), member/city, truncated note, condition + meal-type + featured/hidden/new badges\n- **Per-card actions:** View · Edit · Feature · Hide · Delete (delete is hard SQL delete)\n- **View modal** — full photo, all metadata, inline meal-type picker, action row\n- **Add/Edit modal** — photo upload to `submission-photos` bucket, dish, member, city, condition, meal-type, one-line note\n- **localStorage moderation** at key `habuild_dashboard_moderation` — `{ hidden: [ids], featured: [ids], mealType: { id: 'breakfast', ... } }`. Dashboard prefers backend `meal_type` column if present.\n\n**Code pattern:**\n- `findRecipe(id)` finds in `allRecipes`\n- `getMealType(id)` reads `r.meal_type` first, falls back to `mod.mealType[id]`\n- `applyFilters(list)` runs the filter chain in one pass\n- All inline-handlers exposed via `window.X` for the View modal's dynamic markup\n\n---\n\n## 9. PRD link\n\n**ClickUp page:** `8c95qfx-52196` — subpage under \"Recipes\" in Product Documents\n**Local file:** `/Users/khushibagai/Documents/Habuild/projects/prd-recipes-tab.md`\n\nThe PRD is in **Lenny template**, full scope (not MVP-only), with onboarding skipped, likes assumed real backend. Has 12 sections including SQL for `recipes_likes` table, Mixpanel taxonomy, risks, open questions, and embedded screenshots of all 16 sub-flows.\n\n---\n\n## 10. Build / regenerate workflow\n\n### Edit the main prototype\n```\nFile: /Users/khushibagai/Documents/Habuild/prototypes/recipe-features-nutrition-magazine.html\nPush: cd /tmp/habuild-nutrition-fresh && cp /Users/khushibagai/Documents/Habuild/prototypes/recipe-features-nutrition-magazine.html index.html && git add index.html && git -c commit.gpgsign=false commit -m \"…\" && git push origin main\n```\n\n### Regenerate the Figma stack\n```bash\n# Captures all 12 screen states from the prototype, stacks into one HTML\npython3 /tmp/build_figma_html.py\n\n# Then bake CSS backgrounds into <img> tags (handles bp-card tiles, feature-img, etc.)\npython3 /tmp/inline_bg_to_img.py\npython3 /tmp/bake_bg_to_img.py\n\n# Then inline ALL local images as base64 (guarantees Figma import doesn't lose any)\npython3 /tmp/inline_base64.py\n\n# Copy + push\ncp /Users/khushibagai/Documents/Habuild/prototypes/recipes-for-figma.html /tmp/habuild-nutrition-fresh/recipes-for-figma.html\ncd /tmp/habuild-nutrition-fresh && git add recipes-for-figma.html && git -c commit.gpgsign=false commit -m \"…\" && git push origin main\n```\n\n### Regenerate PRD screenshots\n```bash\npython3 /tmp/capture_all_screens.py\n# 12 screenshots → /tmp/prd-screenshots/\n# Copy to PRD assets folder:\ncp /tmp/prd-screenshots/*.png /Users/khushibagai/Documents/Habuild/prototypes/assets/prd/\n```\n\n---\n\n## 11. Known issues / gotchas\n\n1. **html.to.design plugin** drops `position: absolute` small images during import. **Solution applied:** bg-fill imgs are in normal flow at `width:100% height:100%`. Big images work; small bp-card tiles work after base64 inlining.\n\n2. **Safari aggressive caching** — when iterating on `recipes-for-figma.html`, hard-reload with **Cmd+Option+R** or use a cache-buster query string (`?v=2`). The Develop menu's \"Empty Caches\" also works.\n\n3. **Supabase URL fragility** — submission-photos URLs are long with timestamps. If Supabase rotates them, the prototype loses photos. Mitigation: critical Featured recipes are curated via `CURATED_RECIPES` overlay with local asset fallbacks.\n\n4. **`.cover-content` positioning** — must stay `position: absolute; bottom: 0; z-index: 3`. Any global rule that forces `.cover > *` to `position: relative` will break the hero text overlay. Lost ~1 hour to this; documented in CSS comment.\n\n5. **`@media (min-width:480px)` body flex** — the original prototype CSS centers `<body>` as a flexbox on desktop (for the phone-frame preview). The Figma stack page MUST override this back to `display: block` or screens collapse.\n\n6. **Mixpanel events on localhost don't fire** — by design (`MIXPANEL_ENABLED = false` when hostname === 'localhost'). Test analytics on the live GitHub Pages URL.\n\n---\n\n## 12. Group research / validation\n\n- **605-member WhatsApp group** has been testing the live URL since mid-May 2026\n- **Saurabh Shah's analytics** track Mixpanel events; cohort analysis pending\n- Key validated insights:\n  - Members couldn't find their own uploaded recipes → **fixed** with \"Your recipes\" home section\n  - Mock onboarding card looked like a real recipe → **fixed** by killing walkthrough\n  - Members wanted to edit typos → **fixed** with Edit pill\n  - Hindi recipe names (Ambali, Ragi) are kept; UI is English\n\nSession state: `/Users/khushibagai/Documents/Habuild/research/recipe-app-session-state-2026-05-13.md`\n\n---\n\n## 13. Next steps (post-handover)\n\n1. **Engineering kickoff** — hand PRD + Figma frames to Ayush + Bala\n2. **Family Edition** spec — servings toggle UX\n3. **Ask-the-Team auto-answer** — FAQ matcher + LLM fallback PRD\n4. **Browse search** — add text search to filter chips\n5. **WhatsApp share template** — custom OG image per recipe\n6. **D30 metric review** — set up Mixpanel funnel: Identity → Today's Recipe View → Add Recipe → 2nd submission\n\n---\n\n## 14. Contact / context\n\n- **Build conventions:** Habuild design tokens, Playfair/Inter, mobile-first, English UI, \"members\" not \"users\"\n- **Never auto-commit** — ask before pushing\n- **Audience:** 40+ tier-2/3 Indian women — apply \"Sushma-ji test\"\n- **Bootstrapped brand point** — never mention funding\n- **WhatsApp input bar rule** (if used elsewhere): emoji + text + send button only\n\nMemory entries in `/Users/khushibagai/.claude/projects/-Users-khushibagai/memory/`:\n- `project-recipe-app.md` — recipe app project state\n- `habuild-project.md` — broader Habuild context\n- `habuild-audience.md` — audience design constraints\n- `feedback-language-english.md` — English-only mandate\n- `reference-mixpanel-skill.md` — Mixpanel implementation skill\n"},
  {"id": "prd-recipes-tab", "title": "Recipes Tab — PRD", "group": "Recipes", "sc": "ps-d", "paraSection": "projects", "filename": "prd-recipes-tab.md", "content": "# PRD — Recipes tab in the Habuild app\n\n**Owner:** Khushi Bagai · App Pod\n**Status:** Draft, ready for engineering review\n**Last updated:** 2026-05-25\n**Prototype:** [Live link](https://khushibagai-create.github.io/habuild-nutrition/) · Source: `prototypes/recipe-features-nutrition-magazine.html`\n**Research backing:** [Recipe Feedback Group — Closing Report (2026-05-21)](../research/recipe-feedback-group-insights-2026-05-21.md)\n\n---\n\n## 1. TL;DR\n\nBuild a new **Recipes** tab in the Habuild app's bottom nav that brings the WhatsApp recipe-sharing experience into the product. Members get a daily recipe, a community-shared Featured recipe, a personal cookbook of dishes they've submitted, and the ability to add, edit, delete, like, and share recipes. The full prototype is the V1 scope — design + interaction are locked.\n\n---\n\n## 2. Problem\n\nWe've been validating recipe content via WhatsApp for 12+ months and through three rounds of in-group testing with the 605-member Recipe Feedback group. Three problems consistently surface:\n\n1. **WhatsApp loses recipes.** Members star them, then can't retrieve them at month 11. *\"WhatsApp we need to go back and search. If it is there in Habuild app, it will be very convenient.\"* — Madhavee (App Archivist segment, ~15% of group)\n2. **Members want to share their own dishes.** Ashalatha unprompted shared two photos of her ragi laddu and typed out the recipe by hand. Kirti did the same. The Quiet Evangelist segment (~10%) is already submitting recipes — just not in a surface we own.\n3. **Featured-by-condition framing is wrong.** 58% of poll voters said they want recipes organised by **meal time** (morning drink, breakfast, lunch, snack, dinner), not by health condition.\n\nThe Recipes tab solves all three: a persistent, searchable, member-owned recipe surface inside the app.\n\n---\n\n## 3. Goals & non-goals\n\n### V1 goals\n- Ship a Recipes tab as the third or fourth bottom-nav slot, replicating the prototype design pixel-for-pixel\n- Enable members to submit, edit, delete, and share their own recipes via the app (currently happens in WhatsApp)\n- Make every recipe (community + curated) retrievable and persistent, not lost in chat scroll\n- Track the full submission funnel in Mixpanel so we can measure conversion at every step\n\n### V1 non-goals (deferred)\n- Voice input on the recipe form *(LinkedIn-post insight — biggest unlock, but needs ASR work. V2.)*\n- Multi-language UI (Hindi, Marathi, Tamil, Telugu, Kannada, Gujarati) *(see language poll results — V2.)*\n- Family Edition auto-open on 4+ servings *(needs servings selector first.)*\n- Search across recipes *(universal ask from the closing report — V2 priority #1.)*\n- Editorial overrides on the Featured slot *(V1 is purely most-liked. V2 may add a \"pinned by editorial\" toggle.)*\n- Ingredient swap suggestions *(Segment D ask — V3.)*\n\n### Success metrics (90 days post-launch)\n| Metric | Target | Measured via |\n|---|---|---|\n| Recipes tab MAU / paid YE app MAU | ≥35% | Mixpanel |\n| Recipes submitted by community members | ≥500/month | Supabase `submissions` table count |\n| Submission conversion (Add Recipe Tapped → Add Recipe Submitted) | ≥45% | Mixpanel funnel |\n| Likes-per-recipe average | ≥3 | Likes table query |\n| WhatsApp shares from Recipes tab | ≥2,000/month | Mixpanel `Share Initiated` |\n| 7-day retention of submitters | ≥60% | Mixpanel cohort |\n\n---\n\n## 4. User segments\n\nFrom the closing research report — these are *states*, not personas (same member can shift between them in a week).\n\n- **The WhatsApp Ritualist (~40%)** — Reads turant. Won't move off WhatsApp. The tab needs to be additive, not replacement.\n- **The App Archivist (~15%)** — Has lost recipes to a phone change. Will save a recipe in two places. Highest LTV.\n- **The Joint Family Cook (~25%)** — Reads recipe → thinks \"can I make this for 6?\" → V2 will solve via Family Edition.\n- **The Mix-and-Match Cook (~30%)** — Sees recipes as inspiration. Silently deviates.\n- **The Quiet Evangelist (~10%)** — Wants to teach. **The primary submission source.** Ashalatha, Kirti, Rajshree all live here. The Recipes tab exists for them.\n\n---\n\n## 5. Solution at a glance\n\nFour entry points from the Recipes tab home, in order:\n\n1. **Today's recipe** — the daily-rotating SB-curated recipe (cover-card design)\n2. **Browse Recipes** — preview tiles + \"Browse all recipes\" → filtered by meal time + condition\n3. **Featured Recipes** — the most-liked community submission (rotates daily based on community likes)\n4. **Your recipes** — the member's personal cookbook (empty state for new members)\n\nTwo creation/management flows:\n\n- **Add a recipe** — photo + name + how-to-make + why-it's-special → success screen with WhatsApp share\n- **Edit / Delete own recipe** — from any of the member's own recipe detail screens\n\nOne support flow:\n\n- **Your questions · FAQ** — Curated FAQ matcher + freeform Ask-the-team\n\n---\n\n## 6. Detailed user flows\n\n> Every screenshot below is a real frame from the live prototype. Match design + spacing exactly.\n\n### 6.1 Home — Recipes tab top fold\n\nWhen a member taps the Recipes tab in the bottom nav, they land here.\n\n![Home — top of Recipes tab](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/01_home_top.png)\n\n**What's on screen:**\n- **Cover card** — Today's curated recipe with hero photo, eyebrow (\"Today's recipe · Day X of 6\" for journey weeks like Ambali / Herbal Tea / Detox), serif title, lead copy, and \"Read recipe →\" CTA. Whole card is tappable.\n- **Browse Recipes** masthead — leads into a 2-column preview grid of upcoming recipes + a \"Browse all recipes →\" button.\n\n### 6.2 Home — Featured Recipes + FAQ card\n\n![Home — Featured Recipes + FAQ](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/02_home_featured.png)\n\n**What's on screen:**\n- **Your questions · FAQ** card — entry to the FAQ matcher / Ask-the-team\n- **Featured Recipes** masthead with subhead *\"From the community members\"*\n- **Featured card** — hero photo of the most-liked community recipe (V1 = highest like count across all community submissions, server-computed), kicker `From the Community · {condition_tag}`, dish title, member byline, member quote, **heart pill in top-right corner with like count**, and \"View complete recipe →\" CTA.\n\nFeatured card is server-side rendered, refreshes on every Recipes tab open.\n\n### 6.3 Home — Your recipes (populated)\n\n![Home — Your recipes section, populated](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/03_home_your_recipes.png)\n\n**What's on screen:**\n- \"YOUR RECIPES\" masthead (matching the magazine treatment)\n- 2-column Pinterest-style grid of the member's submissions\n- Each tile shows hero photo + dish name + \"YOUR RECIPE\" caption\n- **\"Add another\" tile** sits in column 1 of the next row — dashed border, square aspect ratio, taps into the Add Recipe form\n\nHidden dishes (test entries) are filtered out client-side. Sort order: most recent first.\n\n### 6.4 Home — Your recipes (empty state)\n\nThis is what a brand-new member sees in the Your recipes slot on Day 1.\n\n![Home — Your recipes empty state](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/05_your_recipes_empty.png)\n\n**What's on screen:**\n- Sand-colored card with soft decorative shapes (off-white circle top-right, forest-tinted circle bottom-left)\n- Playfair serif title: *\"Save what you cook\"*\n- Sub copy: *\"One dish you make often — that's all. Your recipe will live in your cookbook here and reach members across the community.\"*\n- Solid forest-green CTA button: *\"Add your first recipe →\"*\n\n**Behaviour:**\n- The entire card is tappable (not just the button). Tap anywhere → open the Add Recipe form.\n- Keyboard accessible: Enter / Space on focus fires the same action.\n\n### 6.5 Today's recipe detail\n\nMember taps the cover or \"Read recipe →\".\n\n![Today's recipe detail](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/06_today_recipe_detail.png)\n\n**What's on screen (in order, full-page scroll):**\n- Hero photo\n- Back arrow + recipe title\n- SB voice-tip pill (one-line takeaway in SB's voice)\n- Ingredients block — bullet list with quantities and Hindi terms in parentheses for unfamiliar items (`mulethi (liquorice)`, `laung (clove)`)\n- Method block — numbered steps\n- Benefits block — 3 specific lines (not generic \"healthy\")\n- Have a question? — text input + \"Ask\" button + line \"Our team replies within 24 hours\"\n- Share button — generates the recipe card image + WhatsApp text + opens WhatsApp\n\n### 6.6 Member detail — community recipe (someone else's)\n\nMember taps the Featured card or any \"More member dishes\" tile.\n\n![Member detail — community recipe](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/07_member_detail_community.png)\n\n**What's on screen:**\n- Hero photo with **heart pill (white background, count)** floating at bottom-right\n- Member avatar + name + city + condition tag pill\n- Dish title (Playfair serif)\n- Story paragraph (the member's own words)\n- Ingredients (if curated; community submissions may have an empty list)\n- Method (steps from the member's submission, split on newlines)\n- **\"More member dishes\"** grid — every other community member dish, with a small heart pill on each tile. \"Add your recipe\" tile pinned at position 4.\n- Bottom sticky CTA: **\"Add your recipe\"** (forest-green primary)\n\n### 6.7 Member detail — own recipe (Edit + Delete pills shown)\n\nWhen the recipe belongs to the current member (by name match), two additional controls appear below the dish title.\n\n![Member detail — own recipe](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/08_member_detail_own.png)\n\n**Extra controls:**\n- **✎ Edit recipe** pill — sand-colored bg, forest text, opens Add Recipe form pre-filled\n- **🗑 Delete** pill — transparent bg, red text + red-tinted border\n\nOwner detection: `submission.member_name (case-insensitive, trimmed) == current_user.name`. Both pills only render when this match is true.\n\n### 6.8 Add Recipe form (empty)\n\nTriggered by:\n- \"Add your first recipe\" CTA on empty state\n- \"Add another\" tile in Your recipes grid\n- \"Add your recipe\" tile in More member dishes grid\n- \"Add your recipe\" bottom CTA on any member detail page\n\n![Add Recipe form — empty](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/09_add_recipe_empty.png)\n\n**Fields (top → bottom):**\n1. **Add a photo** — tappable square zone, opens device camera / photo picker\n2. **Name of the recipe** — single-line text input, placeholder `e.g., Ragi Laddoo`\n3. **How to make** — multi-line textarea (6 rows), placeholder shows step-by-step example\n4. **Why it's special (one line)** — single-line text input (max 120 chars), placeholder `e.g., No sugar, full of iron — kids love it`\n\n**Validation:**\n- Submit button stays disabled until **all three text fields are non-empty**.\n- Photo is **optional** but strongly encouraged (we should add `(Optional)` label in V1.1).\n\n### 6.9 Add Recipe form (filled)\n\n![Add Recipe form — filled](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/10_add_recipe_filled.png)\n\n**On filled:**\n- Photo zone background-image is set to the picked photo (cover-fit)\n- All 3 text fields filled\n- Submit button activates: forest-green, full-width, label `Share with the community`\n\n**On Submit tap:**\n- Button text changes to `Sending...` (or `Saving...` if offline)\n- Photo blob uploads to `submission-photos` bucket (continues even if RLS blocks — graceful degrade)\n- Row inserts into `submissions` table\n- On success → navigate to Recipe Submitted Success screen (6.10)\n- On failure → fall back to local-only persistence + still go to success screen with a quiet \"saved on your phone\" toast\n\n### 6.10 Recipe submitted — success screen\n\n![Recipe submitted — success screen](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/11_recipe_submitted_success.png)\n\n**Composition:**\n- Sprout emoji 🌱 (44px)\n- Playfair headline: *\"Your recipe is live\"*\n- Sub: *\"Other members will now see it on their Featured page. Thank you for sharing.\"*\n- **Recipe card** — same magazine layout as Rajshree's Featured detail; renders the just-submitted recipe (photo, \"Shared by you\" kicker, dish title, avatar + byline, why-it's-special quote)\n- **Primary CTA — Share on WhatsApp** (full-width, WhatsApp green): pre-fills WhatsApp with text + URL\n- **Secondary CTA — Done — back to home** (quiet text link, muted color)\n\n**Mixpanel events fire:**\n- `Add Recipe Submitted` — with dish, method_steps count, mode (remote / local fallback)\n- `Recipe Success Screen Viewed` — with mode\n\n### 6.11 Edit Recipe — pre-filled form\n\nTriggered by the **✎ Edit recipe** pill on the member detail of own recipe.\n\n![Edit Recipe — pre-filled form](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/12_edit_recipe_prefilled.png)\n\n**Differences from Add Recipe:**\n- Screen header reads `Edit recipe`\n- Hero title reads `Edit your recipe`\n- Sub copy reads `Update the photo, recipe, or one line on why it's special.`\n- Form fields are pre-filled from the existing submission\n- Submit button reads `Save changes`\n- Validation: button enabled if all 3 text fields still have content\n\n**On Save tap:**\n- New photos (data: URLs) re-upload; existing remote URLs pass through (no re-upload waste)\n- `PATCH /submissions?id=eq.{remote_id}` to update the row server-side\n- Local mirrors are updated in-memory regardless of remote success\n- Navigate to Recipe Updated success screen (6.12)\n\n### 6.12 Recipe updated — success screen\n\n![Recipe updated — success screen](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/13_recipe_updated_success.png)\n\nSame layout as 6.10 with two copy changes:\n- Headline: *\"Recipe updated\"*\n- Sub: *\"Your changes are live for the community.\"*\n\nCTAs remain Share on WhatsApp + Done — back to home.\n\n### 6.13 Delete Recipe flow\n\nTriggered by **🗑 Delete** pill on member detail of own recipe.\n\n**Confirmation:**\n- Native `confirm()` dialog (V1) — text: *\"Delete \"{dish}\"? This can't be undone.\"*\n- V1.1: Replace with custom bottom sheet matching brand\n\n**On confirm:**\n- Remove from `STATE.myClubSubmissions` and `STATE.remoteClubSubmissions` in memory\n- `DELETE /submissions?id=eq.{remote_id}` to remove server-side\n- Refresh remote list\n- Toast: *\"Recipe deleted\"*\n- Navigate back to home\n\n**Mixpanel events:**\n- `Delete Recipe Confirmed` — id, dish\n- `Recipe Deleted` — id, dish, mode (remote / local fallback)\n\n### 6.14 Like / heart mechanic\n\nHearts appear in three places. Tap toggles like; count updates immediately. State persists server-side.\n\n- **Member detail hero (large, floating bottom-right)**\n- **Grid tile in More member dishes (small, top-right corner)**\n- **Home Featured card hero (small, top-right corner)**\n\n**Visual states:**\n- Unliked → outlined heart icon, dark text, neutral count\n- Liked → filled red heart icon, +1 from prior count\n\n**Featured logic (V1):**\n- Backend computes the most-liked community submission (excluding the hide list)\n- Recomputed on every home render — cached for ~5 min server-side to avoid hammering DB\n- Hidden dishes (`sattu drink`, `ragi laddoo`, `hello`, `hello recipe`) are filtered before sorting — config table or app-config flag\n\n### 6.15 Browse all recipes\n\n![Browse all recipes](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/14_browse_all_recipes.png)\n\n**What's on screen:**\n- Back arrow + \"All recipes\" title\n- **Top chip strip — meal time (primary filter)**: All · Saved · Morning drink · Breakfast · Lunch · Snack · Dinner. Horizontal-scrolling chips, selected chip styled forest-green.\n- **Bottom pill — condition (secondary filter)**: tap opens a bottom sheet with All / Diabetes / BP / Thyroid / PCOD / Joint pain / Sleep / Energy / Immunity / etc.\n- **Recipe grid** — 2-column tiles matching `.bp-card` layout in prototype. Each tile: hero photo, gradient overlay, condition tag (top-left), dish title (bottom-left). Tap → opens recipe detail.\n\nEmpty state if no recipes match filters: copy *\"No recipes match. Try removing a filter.\"* + chip reset CTA.\n\n### 6.16 FAQ / Ask the team\n\n![FAQ / Ask the team](https://khushibagai-create.github.io/habuild-nutrition/assets/prd/15_faq_ask_team.png)\n\n**What's on screen:**\n- Hero title: *\"Have a question?\"*\n- Sub: *\"Ask your question — our team will reply on WhatsApp in 10 minutes.\"*\n- Search/Ask input — large textarea, placeholder `e.g., Can I use jowar instead of ragi?`\n- Below the input — a curated FAQ list scoped by the top WhatsApp question themes (1,521 queries audited 2026-05-19)\n- Each FAQ row tappable → expands inline with the answer\n\n**Submit behavior:**\n- If question matches an FAQ (>0.6 keyword overlap with tags) → auto-answer inline + show two CTAs: `That helped 🌱` / `No, send to team`\n- If \"No, send to team\" → escalate to WhatsApp team queue (existing CRM hook)\n- If no match → escalate immediately + toast `Question sent — usually replied within 24 hrs`\n\n---\n\n## 7. Backend changes\n\n### New table — `recipes_likes`\n\n```sql\ncreate table public.recipes_likes (\n  id uuid primary key default gen_random_uuid(),\n  submission_id uuid references public.submissions(id) on delete cascade,\n  member_id text not null,        -- Habuild's existing member identifier (phone or member_id)\n  created_at timestamptz default now(),\n  unique (submission_id, member_id)\n);\n\ncreate index on public.recipes_likes(submission_id);\ncreate index on public.recipes_likes(member_id);\n```\n\n### New RPC — `most_liked_submission`\n\n```sql\ncreate function public.most_liked_submission()\nreturns submissions as $$\n  select s.*\n  from public.submissions s\n  left join public.recipes_likes rl on rl.submission_id = s.id\n  where s.dish not in ('Sattu Drink', 'Ragi Laddoo', 'hello', 'hello recipe')\n  group by s.id\n  order by count(rl.id) desc, s.created_at desc\n  limit 1;\n$$ language sql stable;\n```\n\nCache this RPC's result in Redis for 5 minutes to avoid DB pressure.\n\n### Existing `submissions` table — no schema changes required\n\nReuse the prototype's `submissions` table (already has `member_name`, `city`, `dish`, `note`, `condition_tag`, `image_url`, `initial`, `created_at`). The in-app version will write to the same table — the prototype's data carries forward.\n\n### Storage bucket — `submission-photos` (existing, public)\n\nExisting bucket + RLS policies are good as-is. App will upload via the same path.\n\n### Auth — drop name/phone capture in-app\n\nThe Habuild app already knows the member's identity. Drop screens `screen-onb-name` and `screen-onb-phone` entirely. Pass `member_name` and `member_id` from the app's existing session into all submission writes.\n\n---\n\n## 8. Analytics (Mixpanel) — events to instrument\n\nAll events should attach the member's `user_phone` (super property) and `prototype_name: 'recipes-tab'`.\n\n| Event | Trigger | Properties |\n|---|---|---|\n| `Screen Viewed` | Every route change | `screen_name`, `screen_path`, `time_on_prev_screen_sec` |\n| `Today Recipe Tapped` | Cover or Read recipe → | `recipe_id`, `day_index`, `journey` |\n| `Browse All Recipes Tapped` | Browse all button | — |\n| `Filter Changed` | Any chip / pill change | `filter_type` (meal_time/condition), `from`, `to` |\n| `Member Detail Viewed` | Any community detail open | `recipe_id`, `member_name`, `source` (home_featured / more_dishes_grid / browse / direct) |\n| `Add Recipe Tapped` | Any entry into Add Recipe form | `source` (empty_state / add_another / member_grid / member_bottom_cta) |\n| `Add Recipe Submitted` | Submit tap → success | `dish`, `method_steps`, `has_photo`, `mode` |\n| `Recipe Success Screen Viewed` | Success screen render | `mode`, `is_edit` |\n| `Edit Recipe Tapped` | ✎ pill tap | `id`, `dish` |\n| `Edit Recipe Submitted` | Save changes tap → success | `id`, `dish` |\n| `Delete Recipe Confirmed` | Confirm in dialog | `id`, `dish` |\n| `Recipe Deleted` | After server delete | `id`, `dish`, `mode` |\n| `Recipe Like Toggled` | Any heart tap | `recipe_id`, `liked` (true/false), `surface` (hero/tile/home_featured) |\n| `Share Initiated` | Share on WhatsApp tap | `share_target` (whatsapp), `content_id`, `content_type` (own_recipe / community_recipe / today_recipe), `surface` |\n| `FAQ Question Asked` | Ask textarea submit | `match_found` (true/false), `escalated_to_team` |\n\nThe funnel that matters most:\n\n`Recipes Tab Opened → Add Recipe Tapped → Add Recipe Submitted → Recipe Success Screen Viewed → Share Initiated`\n\nThis is the headline submission funnel for the V1 launch report at D30.\n\n---\n\n## 9. Scope summary\n\n### In V1 (everything in the prototype)\n- ✅ Today's recipe cover + detail page\n- ✅ Featured Recipes (most-liked community recipe) — server-side computed\n- ✅ Your recipes — populated grid + empty state\n- ✅ Add Recipe flow (photo + 3 fields)\n- ✅ Recipe submitted success screen + WhatsApp share\n- ✅ Edit own recipe (pre-fill + PATCH)\n- ✅ Delete own recipe (confirm + DELETE)\n- ✅ Like / heart on hero + tiles + home Featured card (real cross-user backend)\n- ✅ Browse all recipes (meal-time chip + condition pill)\n- ✅ FAQ / Ask the team (matcher + WhatsApp escalation)\n- ✅ Curated recipe overlays — start with hard-coded JSON map; CMS in V1.5\n\n### Explicitly NOT in V1\n- ❌ Voice input on Add Recipe form\n- ❌ Multi-language UI (English-only)\n- ❌ Family Edition auto-open\n- ❌ Search across recipes\n- ❌ Editorial pin/override of Featured\n- ❌ Ingredient swap suggestions\n- ❌ Recipe-from-photo OCR\n\n---\n\n## 10. Risks & mitigations\n\n| Risk | Impact | Mitigation |\n|---|---|---|\n| **Members submit low-quality recipes** (one-word methods, unclear photos) | Featured card looks weak | Defensive renderHome fallbacks (already in prototype) + soft moderation queue in admin. Hide list config-driven so we can suppress without a deploy. |\n| **Likes spammed by one member** | Featured can be gamed | One like per member per recipe (UNIQUE constraint on `(submission_id, member_id)`). Server enforces. |\n| **Photo upload fails silently** (RLS / network) | Member thinks they submitted but no photo shown | Graceful degrade: continue with text-only submission, show toast `Saved — but the photo didn't upload, try again later`. (Prototype already does this.) |\n| **No submissions on Day 1** | Empty Featured slot | Seed CLUB array (Kirti Sarmalkar) as fallback when `getFeatured` returns nothing |\n| **Heavy DB load from Featured query on every home open** | Slow Recipes tab | Cache `most_liked_submission` RPC for 5 min in Redis |\n| **Member deletes someone else's recipe** via API tampering | Trust breach | Server check: only the row's `member_id` can delete. Return 403 otherwise. |\n\n---\n\n## 11. Open questions for engineering & design\n\n1. **Tab position** — should Recipes be slot 3 (between Content and Walk) or slot 5 (between Referral and Profile)? Recommend slot 3 because it's content-adjacent.\n2. **Member identifier** — for `recipes_likes.member_id` and `submissions.member_id`, use phone (consistent with prototype) or the existing internal `member_id` UUID?\n3. **Curated overlay storage** — should the CURATED_RECIPES JSON map live in code, in a config table, or in a new `curated_recipes` editorial table from V1?\n4. **Push notifications** — when a community member's recipe is liked, do we notify the author? Recommend not in V1 — re-evaluate after D30 data.\n5. **Offline behavior** — if a member submits while offline, do we queue locally and retry, or block with a toast? Recommend block + toast for V1.\n6. **Recipes tab as default home** — should we ever default the app to Recipes (vs. yoga home)? Recommend no — yoga is the core habit.\n\n---\n\n## 12. Appendix\n\n### A. Reference research\n- [Recipe Feedback Group — Closing Insights Report (2026-05-21)](../research/recipe-feedback-group-insights-2026-05-21.md)\n- WhatsApp query audit (1,521 queries, 2026-05-19)\n- Mother's Day hackathon — voice-first thesis (LinkedIn post, 2026-05-22)\n\n### B. Source prototype\n- Live: https://khushibagai-create.github.io/habuild-nutrition/\n- Source: `prototypes/recipe-features-nutrition-magazine.html`\n- Supabase backend: `https://fpxlsuruosglkgckrvgi.supabase.co`\n  - Table: `public.submissions`\n  - Bucket: `submission-photos` (public)\n\n### C. Design tokens (already in prototype CSS)\n- `--forest: #2D5016`\n- `--sage: #4A7C59`\n- `--cream: #F5F0E8`\n- `--cream-deep: #E8D5B7`\n- `--sand: #DCC79A`\n- `--gold: #8B6914`\n- `--ink: #1c1a17`\n- Fonts: Playfair Display (titles), Inter (body)\n\n### D. Mockups index (in order they appear in this doc)\n1. `01_home_top.png` — Home top fold\n2. `02_home_featured.png` — Featured Recipes + FAQ\n3. `03_home_your_recipes.png` — Your recipes populated\n4. `04_home_fullpage.png` — Full home page scroll\n5. `05_your_recipes_empty.png` — Your recipes empty state\n6. `06_today_recipe_detail.png` — Today's recipe detail\n7. `07_member_detail_community.png` — Member detail (community)\n8. `08_member_detail_own.png` — Member detail (own, with Edit + Delete)\n9. `09_add_recipe_empty.png` — Add Recipe form empty\n10. `10_add_recipe_filled.png` — Add Recipe form filled\n11. `11_recipe_submitted_success.png` — Submitted success\n12. `12_edit_recipe_prefilled.png` — Edit Recipe pre-filled\n13. `13_recipe_updated_success.png` — Updated success\n14. `14_browse_all_recipes.png` — Browse all recipes\n15. `15_faq_ask_team.png` — FAQ / Ask the team\n\nAll hosted at `https://khushibagai-create.github.io/habuild-nutrition/assets/prd/`.\n\n---\n\n*End of PRD.*\n"},
  {"id": "prd-box-breathing", "title": "Box Breathing — PRD (Enhancements)", "group": "Box Breathing", "sc": "ps-a", "paraSection": "projects", "filename": "prd-box-breathing-enhancements.md", "content": "# PRD: Box Breathing Enhancements\n**Author**: Khushi\n**Status**: Draft\n**Last updated**: April 16, 2026\n**Reviewers**: Ayush / Deba / Bala\n**Eng lead**: Ayush\n**Design lead**: Deba\n\n---\n\n## TL;DR\n\nBox breathing exists in the Habuild app but has near-zero engagement — a discovery problem, not a motivation problem. We're enhancing it across two phases: **Phase 1** adds post-session notifications, a research-backed progressive duration system, and a sticky daily reminder. **Phase 2** adds a daily breathing tracker (No-Zero Days style) and UI improvements. The goal is to turn box breathing from a forgotten feature into a daily habit that creates a second anchor in members' wellness day. Success = 15%+ of daily active members completing at least one breathing session within 30 days of Phase 1 launch.\n\n---\n\n## Problem Statement\n\n**What is the user problem?**\n\nMembers don't know box breathing exists in the app, and those who discover it have no reason to come back. There's no cue (notification), no progression (same experience on Day 1 as Day 100), no accountability (no tracker), and no closure signal (no \"you did it today\" confirmation).\n\n> *\"App mein kuch nahi hai\"* — User call, Feb 2026\n\nThe breathing science brief (March 2026) confirms: the product challenge is not motivation — members already believe breathing is good for them. It is design: no cue, no defined minimum, no social layer, no closing ritual.\n\n**Who has this problem?**\n\n| Segment | Severity | Notes |\n|---|---|---|\n| Committed Homemaker (40-60) | High | Does yoga daily, but doesn't know breathing feature exists. Strongest candidate for habit formation. |\n| Health-Driven Senior (60-75) | High | BP and stress concerns — breathing has direct clinical benefit for this group. |\n| Working Professional (30-50) | Medium | Inconsistent schedule, but post-session notification catches them when they're already engaged. |\n| Habit Relapser (Sunita persona) | Medium | Breathing could become the \"easy win\" on days she skips yoga — the No-Zero Day fallback. |\n\n**What is the scale?**\n\n- 6 lakh daily live session participants — all potential breathing candidates\n- YouTube pranayama content is #1 by views (7.8M on top video) — demand exists\n- Current box breathing engagement: near-zero (discovery failure)\n- App feature awareness is near zero across all in-app features (user research finding #4)\n\n---\n\n## Why Now\n\n- **Breathing is the #1 content signal.** Pranayama has the highest YouTube views of any Habuild content category. Members want this — we just haven't brought it into the app properly.\n- **Second daily touchpoint.** The long-term vision is \"Habuild Daily Ritual = Morning energise (yoga) + Evening restore (wind-down).\" Box breathing is the first step toward the second anchor.\n- **Notification infra is ready.** Bala's Mobile CRM work enables cohort-based push notifications. This feature rides on that investment.\n- **Content Categorisation (#9) identified post-yoga breathing as a \"Quick Win\"** at the 7:15 AM slot.\n\n---\n\n## Phasing\n\n| Phase | Features | Priority |\n|---|---|---|\n| **Phase 1** | 1. Post-session breathing notification | Ship first |\n| | 2. Progressive breathing duration (research-backed) | Ship with #1 |\n| | 3. Sticky notification for daily breathing tracker | Ship with #1 |\n| **Phase 2** | 4. Daily breathing tracker (No-Zero Days) | After Phase 1 data |\n| | 5. UI improvements to breathing screen | After Phase 1 data |\n\n---\n\n---\n\n# PHASE 1\n\n---\n\n## Feature 1: Post-Session Breathing Notification\n\n### What we're building\n\nA push notification that fires 1 hour after the member's yoga session ends, deeplinked to the breathing screen with their prescribed duration pre-loaded.\n\n**Example:** Member does the 6:30 AM session (ends ~7:15 AM) → notification arrives at 8:15 AM → tap opens breathing screen directly → member completes 2-minute box breathing.\n\n### User flow\n\n```\nSession ends (7:15 AM)\n    ↓\nBackend schedules notification for +1 hour (8:15 AM)\n    ↓\n[Check] Has member already done breathing today?\n    ├── Yes → Suppress notification\n    └── No → Send push notification\n              ↓\n         Member taps notification\n              ↓\n         App opens directly to breathing session screen\n         (duration + technique pre-loaded, single \"Shuru karo\" button)\n              ↓\n         Member completes breathing → notification clears\n         Member dismisses → no follow-up (sticky notification handles this)\n```\n\n### Notification copy (A/B test)\n\n| Variant | Title | Body |\n|---|---|---|\n| A | Aaj ki breathing baaki hai | Sirf 2 minute. Aapke liye ready hai. |\n| B | Saurabh sir ka message | Ek kaam aur baaki hai aaj ka. 2 minute. |\n| C | 3,200 members ne aaj kiya | Aap bhi? Sirf 2 minute. |\n\nStart with A and B. The body should always show the member's actual current duration (from the progression system), not a generic \"5 min.\"\n\n### Key decisions\n\n- **No snooze.** One nudge per day per trigger. The sticky notification (Feature 3) is the persistent backup. Stacking two nag mechanisms causes uninstalls.\n- **Deeplink straight to session.** Not homescreen, not breathing discovery screen. The member should see a \"Shuru karo\" button within 2 seconds of tapping the notification. Zero intermediate screens.\n- **Suppress if already done.** If the member did breathing from any entry point today, no notification.\n- **WhatsApp fallback.** For members who have push notifications disabled, Bala sends a parallel WA message with the same copy.\n\n### Requirements\n\n| ID | Requirement | Priority |\n|---|---|---|\n| N1 | Notification triggers 1 hour after session end time | Must have |\n| N2 | Notification is suppressed if breathing is already completed today | Must have |\n| N3 | Notification deeplinks to breathing session screen (pre-loaded) | Must have |\n| N4 | Notification copy includes member's current prescribed duration | Must have |\n| N5 | A/B test framework for notification copy variants | Should have |\n| N6 | WhatsApp fallback for members with push disabled | Should have |\n| N7 | Track: notification_sent, notification_tapped, breathing_completed | Must have |\n\n---\n\n## Feature 2: Progressive Breathing Duration\n\n### What we're building\n\nA research-backed progression system where breathing duration and breath cycle length increase gradually. Beginners start at 2 minutes with an easier pattern (3-3-3-3), and progress to longer sessions with deeper breath cycles over weeks.\n\n### The science\n\nResearch findings (compiled from Laborde et al. 2021, Balban et al. 2023, Fincham et al. 2023, Lukic et al. 2022, Kuppusamy et al. 2018):\n\n- **5 minutes is the minimum effective dose** — sessions at 5, 10, 15, and 20 min produce equivalent cardiac vagal activity (RMSSD ~82-86). No significant dose-response above 5 min.\n- **Beginners should start at 3-second phases**, not 4. Clinical guidance recommends shorter holds for beginners to avoid lightheadedness, especially for women 40-65 who may have unmanaged hypertension.\n- **Dual-axis progression is critical.** Never increase both duration AND cycle length at the same time. Simultaneous increases cause lightheadedness and dropout.\n- **67% of exercise program dropouts occur during ramp-up** (Kraus et al. 2022). The progression curve must be gentle enough that members never feel they \"failed.\"\n- **Diminishing returns above 10 minutes.** No additional cardiac vagal benefit beyond this for non-clinical populations. 10 min is the ceiling.\n- **Median 66 days to automaticity** (Lally et al. 2010). Missing one day does not materially affect habit formation.\n\n### Progression table\n\n#### Phase 1: Foundation (Sessions 1-14) — \"Learn the Pattern\"\n\n| Sessions | Duration | Breath Cycle | Cycles | Notes |\n|---|---|---|---|---|\n| 1-3 | 2 min | 3-3-3-3 (12s) | 10 | Absolute beginner. Zero lightheadedness risk. |\n| 4-7 | 2.5 min | 3-3-3-3 (12s) | 12-13 | Same pattern, slightly longer. Build confidence. |\n| 8-10 | 3 min | 3-3-3-3 (12s) | 15 | Duration increase only. Pattern stays easy. |\n| 11-14 | 3 min | 4-4-4-4 (16s) | 11-12 | First cycle complexity increase. Duration held. |\n\n#### Phase 2: Building (Sessions 15-28) — \"Build Capacity\"\n\n| Sessions | Duration | Breath Cycle | Cycles | Notes |\n|---|---|---|---|---|\n| 15-18 | 4 min | 4-4-4-4 (16s) | 15 | Duration increase, pattern held. |\n| 19-21 | 5 min | 4-4-4-4 (16s) | 18-19 | Minimum effective dose reached. |\n| 22-28 | 5 min | 4-4-4-4 (16s) | 18-19 | **Consolidation week. No increases.** Let automaticity build. |\n\nThe consolidation at sessions 22-28 is non-negotiable. This is where most wellness challenges fail — novelty has worn off AND difficulty increases. Hold steady and let the negative contrast effect develop (members start feeling worse on days they skip).\n\n#### Phase 3: Intermediate (Sessions 29-56) — \"Deepen the Practice\"\n\n| Sessions | Duration | Breath Cycle | Cycles | Notes |\n|---|---|---|---|---|\n| 29-35 | 5 min | 5-5-5-5 (20s) | 15 | Cycle length increase, duration held. |\n| 36-42 | 6 min | 5-5-5-5 (20s) | 18 | Gentle duration increase. |\n| 43-49 | 7 min | 5-5-5-5 (20s) | 21 | Approaching deeper relaxation. |\n| 50-56 | 7 min | 6-6-6-6 (24s) | 17-18 | Deep parasympathetic activation. |\n\n#### Phase 4: Experienced (Session 57+) — \"Self-Selected Practice\"\n\nMember unlocks free selection of duration (5, 7, or 10 min) and pattern (4-4-4-4, 5-5-5-5, or 6-6-6-6). By session 57 (~day 66 with some misses), the habit has reached automaticity (Lally 2010). Prescription becomes counterproductive.\n\n### Summary levels (for UI)\n\n| Level | Name | Unlocks After | Duration | Cycle |\n|---|---|---|---|---|\n| 1 | Pehla Kadam | Day 0 | 2 min | 3-3-3-3 |\n| 2 | Dhire Dhire | 3 completions | 3 min | 3-3-3-3 |\n| 3 | Sahi Raasta | 7 completions | 5 min | 4-4-4-4 |\n| 4 | Mazboot | 14 completions | 7 min | 5-5-5-5 |\n| 5 | Saans ka Safar | 21 completions | 7 min | 6-6-6-6 |\n| 6 | Saans Club | 57+ completions | 5-10 min (choice) | Choice |\n\n**Completions, not consecutive days.** If someone does Day 1, skips Day 2, does Day 3 — that counts as 2 completions. Progress is never lost. Missing a day does not reset anything.\n\n### Key decisions\n\n- **Progression is suggestion, not enforcement.** After Level 2, show \"Ready to try 4-4-4-4?\" as an opt-in. Members who want to stay at 3-3-3-3 forever should be celebrated. The benefit at 5 min is the same as at 20 min.\n- **\"Chhota session\" always available.** After reaching any level, the member can always do the 90-second touch-in tier. This is the No-Zero Day minimum.\n- **Level-up screen is the hero interaction.** When a member levels up, the completion screen transforms: \"Badhai ho! Aap ab Level 3 pe hain.\" + SB quote + WhatsApp share card. This is the only moment where growth becomes tangible.\n- **Hypertension safety.** Do not offer 6-6-6-6 (6-second holds) to members who have not completed at least 50 sessions. Consider adding a \"Do you have high BP?\" screen that caps maximum hold at 4 seconds.\n- **Backend-configurable.** Level thresholds and durations should be configurable without app release, so we can tune based on completion rate data.\n\n### Requirements\n\n| ID | Requirement | Priority |\n|---|---|---|\n| P1 | Track cumulative breathing completions per member | Must have |\n| P2 | Pre-load correct duration + cycle based on member's level | Must have |\n| P3 | Show current level name and progress on breathing home screen | Must have |\n| P4 | Level-up celebration screen with SB quote and share card | Must have |\n| P5 | \"Chhota session\" (90s touch-in) always accessible | Must have |\n| P6 | Progression thresholds configurable via backend (not hardcoded) | Must have |\n| P7 | Opt-in prompt for level increase (\"Ready to try 5 min?\") | Should have |\n| P8 | \"Kya notice kiya?\" self-reflection after session (chips: Neend jaldi aayi / Mann halka laga / Saans lambi ho rahi hai / Kuch nahi abhi) | Should have |\n\n### Key citations\n\n| Citation | Finding | Relevance |\n|---|---|---|\n| Laborde et al. (2021), Int J Environ Res Public Health | 5, 10, 15, 20 min produce equivalent cardiac vagal activity | Sets 5 min as minimum effective dose, 10 min as ceiling |\n| Balban et al. (2023), Cell Reports Medicine | 5 min/day cyclic sighing > mindfulness for mood | Validates short daily breathing for consumer wellness |\n| Fincham et al. (2023), Applied Psychology | Sessions under 5 min significantly less effective | Explains why we start at 2 min (habit formation) but graduate to 5 min (efficacy) |\n| Lukic et al. (2022), JMIR Serious Games | Breeze 2 app: beginner=2min, intermediate=3min, expert=5min | Direct precedent for tiered consumer breathing app |\n| Kraus et al. (2022), PMC9165469 | 67% of exercise dropouts occur during ramp-up | Progression must be gentle; consolidation week is critical |\n| Lally et al. (2010), European J Social Psychology | Median 66 days to automaticity; missing one day doesn't affect formation | No-Zero Days philosophy is scientifically validated |\n| Kuppusamy et al. (2018), J Trad Complement Med | 5-min Bhramari → significant anxiety + BP reduction in Indian adults in 4 weeks | Direct evidence for minimum effective dose in our demographic |\n| Gollwitzer (1999), American Psychologist | Implementation intentions 2-3x follow-through | Notification copy should use \"After your session, do 2 min breathing\" framing |\n\n---\n\n## Feature 3: Sticky Notification (Persistent Daily Reminder)\n\n### What we're building\n\nAn Android ongoing notification (like a fitness tracker or music player) that stays in the notification tray until the member completes their daily breathing. Silent. No vibration. A persistent, gentle reminder that today's breathing is still pending.\n\n### User flow\n\n```\n9 AM daily → Sticky notification appears (silent)\n    \"Aaj ki breathing: 2 min baaki | Tap to start\"\n    ↓\nMember sees sticky in notification tray throughout the day\n(Static content. Does NOT update with countdowns or time-elapsed.)\n    ↓\n[Path A] Member taps sticky\n    → Deeplinks to breathing session (pre-loaded)\n    → Completes breathing\n    → Sticky updates to: \"Done! Aaj ka breathing ho gaya.\" ✓\n    → Done state persists 2 hours, then sticky disappears\n    ↓\n[Path B] Member does not complete by 9 PM\n    → Sticky text changes to: \"Sone se pehle 90 seconds? Aaj ka din bacha lo.\"\n    → Offers 90-second touch-in tier (No-Zero Day minimum)\n    → If still no action → sticky disappears at midnight\n    → Clean slate tomorrow\n```\n\n### Key decisions\n\n- **Appears at 9 AM.** After most members' morning sessions have ended. Not earlier — we don't want this competing with session reminders.\n- **Silent always.** No sound, no vibration, ever. It appears quietly and stays quietly. This is a to-do list item, not an alarm.\n- **Static content.** The sticky does NOT update throughout the day (\"it's been 4 hours...\"). Changing content creates anxiety, not motivation.\n- **7-day auto-suppress.** If a member has not tapped the sticky once in 7 consecutive days, suppress it for that member. They are telling us they don't want this. Listen.\n- **Settings toggle from Day 1.** \"Daily breathing reminder: ON/OFF.\" Default ON for new breathing users, with a tooltip explaining it.\n- **9 PM fallback to 90s.** The bar drops to the absolute lowest. \"Aaj ka din bacha lo\" = save today's day. This is the No-Zero Days philosophy in action.\n\n### iOS limitation\n\niOS does not support true ongoing notifications. On iOS, use a daily scheduled local notification at 9 AM that auto-clears when the member completes breathing (via background app refresh). Degraded but functional.\n\n### Requirements\n\n| ID | Requirement | Priority |\n|---|---|---|\n| S1 | Android ongoing notification (priority LOW/MIN, bottom of tray) | Must have |\n| S2 | Appears at 9 AM daily, silent, no vibration | Must have |\n| S3 | Auto-dismisses on breathing completion + 2 hour grace period | Must have |\n| S4 | 9 PM copy change to 90-second touch-in offer | Must have |\n| S5 | Midnight auto-dismiss if not completed | Must have |\n| S6 | 7-day auto-suppress for members who never tap | Must have |\n| S7 | Settings toggle: \"Daily breathing reminder\" ON/OFF | Must have |\n| S8 | iOS fallback: daily local notification at 9 AM, auto-clear on completion | Should have |\n| S9 | Deeplink from sticky to breathing session (same as N3) | Must have |\n| S10 | Track: sticky_shown, sticky_tapped, sticky_suppressed | Must have |\n\n### Annoyance mitigation\n\n| Risk | Mitigation |\n|---|---|\n| Members find it annoying and uninstall | 7-day auto-suppress rule + settings toggle from Day 1 |\n| Members confuse it with a stuck notification/bug | Clear Habuild branding + \"Aaj ki breathing\" text differentiates it. Test with 5-10 real members aged 50+ before shipping. |\n| Too many Habuild notifications stacking | Breathing sticky must be on its own notification channel, separate from session reminders and marketing |\n\n---\n\n---\n\n# PHASE 2\n\n---\n\n## Feature 4: Daily Breathing Tracker (No-Zero Days)\n\n### What we're building\n\nA daily breathing tracker that visualizes the member's breathing consistency — designed as a gentle accountability tool, not a streak counter. Uses the No-Zero Days philosophy: progress is permanent, missing a day is acknowledged without punishment, and the focus is always on what was accomplished.\n\n### Where it lives\n\n**Primary:** A card on the breathing home screen, between the session card and the community proof section. NOT on the main app homescreen. Reason: the homescreen already has a discovery problem. The tracker should live on the breathing surface — the member sees it when she opens breathing via notification deeplink or breathing tab.\n\n**Secondary (Phase 2.5):** A small \"breathing today\" chip on the main homescreen, once the Dynamic Homescreen project ships. Single-line summary: \"Breathing: Done today\" or \"Breathing: Baaki hai\" with tap target to breathing screen. This earns homescreen real estate only after breathing proves engagement.\n\n### User flow by day\n\n**Day 0 (First visit)**\n- No tracker visible. No empty progress bar. No \"Day 0 of 21.\"\n- Member discovers breathing → completes first session → completion screen says: \"Pehla din! Kal bhi milenge.\" + first filled dot appears.\n- The tracker seeds itself from the first completion. Before that, it does not exist.\n\n**Day 2-6 (Building)**\n- Tracker shows a horizontal row of 7 circles (Mon-Sun).\n- Completed days = filled (sage green). Today = highlighted ring. Future = empty circles.\n- Below: \"3 din ho gaye! Ek hafte mein 4 aur.\" — counting up, never down.\n\n**Day 7 (First week complete)**\n- All 7 circles filled. Small celebration: row pulses once.\n- \"Ek hafta ho gaya!\" + WhatsApp share card auto-generates.\n- Tracker resets visually for Week 2. Cumulative counter appears: \"Total: 7 din.\" This counter is permanent and only goes up.\n\n**Day 14 (Self-reinforcing threshold)**\n- \"2 hafte ho gaye. Ab yeh aapki aadat ban chuki hai.\"\n- This is scientifically grounded — the breathing science brief says Day 10-14 is the self-reinforcing threshold. The message is acknowledgment, not congratulation.\n\n**Day 21+ (Saans Club)**\n- \"21 din! Aap Saans Club mein aa gaye.\"\n- Tracker shifts from weekly row to monthly calendar view (grid, filled dots for completed days).\n- Monthly summary: \"April: 24/30 din breathing kiya. Bahut accha.\" — acknowledges misses without penalizing.\n\n### What happens when she misses a day\n\n- If she misses Day 4 and opens on Day 5: \"Wapas aa gaye! Aaj se phir shuru.\"\n- The 3 filled dots from Day 1-3 remain filled. They do not disappear or grey out.\n- There is no \"streak broken\" message. Ever. The concept does not exist in this UI.\n- Counter shows \"Total: 3 din\" — not \"3-day streak.\" Just \"3 din.\"\n- If she does breathing on Day 5, counter becomes \"4 din.\" She's back. No drama.\n\n### The \"noticing\" mechanic\n\nAfter each session, the completion screen asks: **\"Aaj kya notice kiya?\"** — not \"How do you feel?\"\n\nChips: Neend jaldi aayi / Mann halka laga / Saans lambi ho rahi hai / Kuch nahi abhi\n\nOver time, show the member her own noticing history: \"Last 7 din mein aapne 4 baar 'neend jaldi aayi' choose kiya.\"\n\nThis is self-generated evidence. It is more convincing than any science citation. The act of noticing is what creates perceived benefit (breathing science brief: \"Benefits require active curation to notice\").\n\n### Requirements\n\n| ID | Requirement | Priority |\n|---|---|---|\n| T1 | Weekly circle tracker on breathing home screen (7 dots, Mon-Sun) | Must have |\n| T2 | Cumulative completion counter (\"Total: X din\") — permanent, never resets | Must have |\n| T3 | Day 7, Day 14, Day 21 milestone celebrations with contextual copy | Must have |\n| T4 | Monthly calendar view after Day 21 | Should have |\n| T5 | WhatsApp share card at milestones | Should have |\n| T6 | \"Aaj kya notice kiya?\" post-session reflection chips | Should have |\n| T7 | Personal noticing history summary at Day 7+ | Nice to have |\n| T8 | \"Breathing: Done/Baaki\" chip on homescreen (after Dynamic Homescreen ships) | Nice to have |\n\n---\n\n## Feature 5: UI Improvements to Breathing Screen\n\n### What we're building\n\nVisual and interaction upgrades to the existing box breathing screen to support the progression system, tracker, and improved engagement.\n\n### Key improvements\n\n| Area | Current State | Proposed |\n|---|---|---|\n| Level indicator | None | Progress arc around session card showing current level + completions toward next |\n| Level name | None | Hindi name displayed: \"Level 2: Dhire Dhire — 3 min\" |\n| Next level peek | None | Single line: \"3 aur din, phir 5 min ka level milega.\" |\n| Level-up screen | None | Hero interaction: \"Badhai ho!\" + SB quote + share card |\n| Session pre-load | Generic | Duration + cycle pre-loaded based on member's level |\n| Touch-in option | None | \"Chhota session\" link always visible (90-second minimum) |\n| Post-session | Basic | \"Aaj kya notice kiya?\" reflection + mood chips |\n| Timer display | Basic circle | Cleaner animation, phase indicator (inhale/hold/exhale/hold labels) |\n\n### Design principles\n\n- **Simple and warm.** Large tap targets for 55+ segment. No less than 16px body text.\n- **Hindi-first labels** for levels. \"Pehla Kadam\" is immediately understood; \"Level 1\" is not, for this demographic.\n- **No gamification language.** No XP, no leaderboards, no points. Just levels with Hindi names and a gentle arc.\n- **Don't show the full ladder.** Showing all 6 levels creates overwhelm. \"Mujhe 10 min karna padega??\" is not the reaction we want on Day 1. Show only current level and one peek ahead.\n\n### Requirements\n\n| ID | Requirement | Priority |\n|---|---|---|\n| U1 | Progress arc on breathing home screen showing level + completions | Must have |\n| U2 | Hindi level names and current duration display | Must have |\n| U3 | Next-level peek text (one line, not full ladder) | Must have |\n| U4 | Level-up celebration screen (hero interaction) | Must have |\n| U5 | \"Chhota session\" (90s) always accessible from breathing screen | Must have |\n| U6 | Phase labels on breathing animation (inhale/hold/exhale/hold) | Should have |\n| U7 | Improved breathing animation (smoother, calmer) | Should have |\n\n---\n\n---\n\n# CROSS-CUTTING\n\n---\n\n## Goals & Success Metrics\n\n### Phase 1 metrics\n\n| Metric | Baseline | Target | Timeline |\n|---|---|---|---|\n| Daily breathing completions (as % of DAU) | ~0% | 15%+ | D30 post Phase 1 launch |\n| Notification → breathing completion rate | N/A | 20%+ tap rate, 60%+ completion after tap | D14 |\n| Sticky notification tap rate | N/A | 10%+ daily | D14 |\n| Members reaching Level 2 (3 completions) | N/A | 50% of members who try breathing once | D30 |\n| Members reaching Level 3 (7 completions) | N/A | 30% of members who try breathing once | D30 |\n| App uninstall rate | Current baseline | Must not increase | D30 (guardrail) |\n\n### Phase 2 metrics\n\n| Metric | Baseline | Target | Timeline |\n|---|---|---|---|\n| Members reaching Day 14 (self-reinforcing threshold) | From Phase 1 data | 20% of Phase 1 actives | D30 post Phase 2 launch |\n| Members reaching Saans Club (21 completions) | N/A | 10% of Phase 1 actives | D60 |\n| WhatsApp share card usage at milestones | N/A | 5%+ of members at milestone | D30 |\n| \"Aaj kya notice kiya?\" response rate | N/A | 40%+ of session completions | D14 |\n\n### How will we measure?\n\nMixpanel / Appsflyer. Saurabh Shah to set up event tracking for: notification_sent, notification_tapped, sticky_shown, sticky_tapped, breathing_started, breathing_completed, level_up, milestone_reached, share_card_tapped, notice_chip_selected. Khushi reviews at D7, D14, D30.\n\n---\n\n## Non-Goals\n\n- We are NOT redesigning the full app homescreen (that's Project #4)\n- We are NOT building live group breathing sessions in V1 (that's a separate feature if this succeeds)\n- We are NOT adding other breathing techniques beyond box breathing in V1 (cyclic sighing, Nadi Shodhana can come later)\n- We are NOT building competitive elements (leaderboards, rankings) — arousal of competition is physiologically incompatible with the parasympathetic state required for breathing\n- We are NOT building a separate breathing app for younger audience (parking lot item)\n\n---\n\n## Open Questions\n\n| Question | Owner | Due | Status |\n|---|---|---|---|\n| Can we reliably detect session end time to trigger +1 hour notification? | Ayush | Before Phase 1 build | Open |\n| Is deeplink infrastructure ready for breathing screen? (Blocked on #4?) | Ayush | Before Phase 1 build | Open |\n| Android foreground service for sticky notification — any battery/performance concerns? | Ayush | Before Phase 1 build | Open |\n| Do we need a \"Do you have high BP?\" screen to cap breath holds at 4 seconds? | Khushi + medical advisor | Before Phase 1 build | Open |\n| What is the current session batch time data? (Need to map all batch → notification times) | Saurabh Shah | Before Phase 1 build | Open |\n| Can notification copy A/B testing use Bala's existing CRM framework? | Bala | Before Phase 1 build | Open |\n| iOS ongoing notification alternative — what's technically feasible? | Ayush | Phase 1 build | Open |\n\n---\n\n## Risks & Mitigations\n\n| Risk | Likelihood | Impact | Mitigation |\n|---|---|---|---|\n| Sticky notification feels annoying / invasive | Medium | High (uninstalls) | 7-day auto-suppress + settings toggle from Day 1. Test with 5-10 members 50+ before shipping. |\n| Deeplink lands on homescreen instead of breathing | Medium | High | This is the #1 implementation risk. If the path from notification tap to \"Shuru karo\" takes >2 seconds or >0 intermediate taps, every other design decision is irrelevant. QA this relentlessly. |\n| Progression feels too slow / too fast | Medium | Medium | Backend-configurable thresholds. Monitor completion rates at each level. If any level has >30% drop-off, the jump is too steep. |\n| Members with hypertension attempt 6-second holds too early | Low | High (safety) | 6-6-6-6 only unlocks after 50+ completions. Consider onboarding BP question. |\n| Push notifications disabled by member | Medium | Medium | WhatsApp fallback for members with push disabled (Bala). |\n| Phase 2 tracker creates guilt on missed days | Low | Medium | No-Zero Days philosophy enforced: no streak-break messages, no grayed-out dots, no punishment language. |\n\n---\n\n## Rollout Plan\n\n### Phase 1\n\n| Step | Cohort | Notes |\n|---|---|---|\n| Internal testing | Habuild team | 1 week |\n| Soft launch | 10% of daily active members (Android only) | 2 weeks. Focus on notification tap rate and completion rate. |\n| Full Android rollout | All Android members | If soft launch metrics hit targets |\n| iOS rollout | All iOS members | After Android stabilizes (iOS sticky notification is degraded) |\n\n### Phase 2\n\nShip after Phase 1 has 30 days of data. Phase 2 scope may adjust based on Phase 1 learnings.\n\n### Comms\n\n| Channel | Message | Owner | Timing |\n|---|---|---|---|\n| Push notification | \"Nayi breathing feature! Rozz 2 minute se shuru karo.\" | Bala | Phase 1 launch |\n| WhatsApp broadcast | \"Habuild app mein nayi breathing feature aayi hai. Class ke baad sirf 2 minute.\" | Marketing | Phase 1 launch |\n| In-session SB mention | SB mentions breathing at end of yoga session | SB / Khushi | Phase 1 launch week |\n\n---\n\n## Timeline\n\n| Milestone | Owner | Target Date | Status |\n|---|---|---|---|\n| PRD review + alignment | Khushi, Ayush, Deba | | |\n| Design spec (Phase 1) | Deba | | |\n| Engineering scoping (Phase 1) | Ayush | | |\n| Phase 1 build | Eng | | |\n| Phase 1 QA + internal testing | QA | | |\n| Phase 1 soft launch (10%) | Khushi | | |\n| Phase 1 full rollout | Khushi | | |\n| D30 metric review (Phase 1) | Khushi + Saurabh Shah | | |\n| Phase 2 design + build | Deba + Eng | | After Phase 1 D30 review |\n| Phase 2 rollout | Khushi | | |\n\n---\n\n## Appendix\n\n### Related docs\n\n- Breathing science brief: `/research/new-habits/breathing-science-brief.md`\n- Breathing habit prototype: `/prototypes/habits/breathing-habit.html`\n- Dynamic homescreen + deeplink: `/projects/04-dynamic-homescreen.md`\n- Notifications PRD: `/projects/06-notifications.md`\n- Content categorisation: Section 9 of `/company-context.md`\n- PRD template: `/prd-template.md`\n\n### Research sources (progressive breathing)\n\n1. Laborde et al. (2021). \"Dose-Response of Slow-Paced Breathing.\" Int J Environ Res Public Health.\n2. Balban et al. (2023). \"Brief structured respiration practices.\" Cell Reports Medicine.\n3. Fincham et al. (2023). \"Breathing Practices for Stress: Systematic Review.\" Applied Psychology.\n4. Lukic et al. (2022). \"Breeze 2: Gameful Breathing Training App.\" JMIR Serious Games.\n5. Kraus et al. (2022). \"Determinants of Dropout from Exercise Intervention.\" STRRIDE Trials.\n6. Lally et al. (2010). \"How are habits formed.\" European J Social Psychology.\n7. Kuppusamy et al. (2018). \"5-min Bhramari in Indian adults.\" J Trad Complement Med.\n8. Gollwitzer (1999). \"Implementation intentions.\" American Psychologist.\n9. Milne et al. (2002). \"Motivational and volitional interventions.\" British J Health Psychology.\n10. Brandani et al. (2017). \"Hypotensive effect of breathing exercises.\" Systematic review.\n"},
  {"id": "wfi-prd", "title": "WFI — PRD", "group": "WFI", "sc": "ps-w", "paraSection": "projects", "filename": "4-WFI-PRD.md", "content": "# WhatsApp First Interface — PRD\n\n**Author:** Khushi\n**Status:** Draft\n**Last updated:** 2026-04-24\n**Experiment:** Experiment 2 of the Retention Plan (see ClickUp \"Experiment Plan\" subpage)\n\n**Prototype:**\n- Full day flow: `prototypes/chat-first-app/4-whatsapp-first-interface.html`\n- Time-of-day states (side-by-side): `prototypes/chat-first-app/4-whatsapp-first-interface-states.html`\n\n---\n\n## TL;DR\n\nThe WhatsApp First Interface replaces the Home tab of the Habuild app with a chat-first thread. Time-scheduled messages from a Habuild companion deliver all the daily content — class reminders, breathing, brain games, water, poster, community events, night wind-down — as rich cards and text inside a WhatsApp-style conversation. The variant is tested against the revamped home screen (Control) on a cohort of 50,000 paid members (25k per arm) who have never installed the app. Primary metric: landed home-to-home retention. Winner ships to 100% for the migration cohort.\n\n---\n\n## Experiment Context\n\nSummary — see **Experiment Plan** subpage in ClickUp for full design:\n\n- **Control:** Revamped Home Screen (time-aware session cards; no Quick Actions grid; no Your Poster banner)\n- **Variant:** WhatsApp First Interface (this PRD)\n- **Cohort:** 50,000 installed users — **25,000 per arm**. Sourced from paid members who have never installed the app. **Indian users only** (see Out of Scope).\n- **Assignment:** 50/50 random at install time (coin flip per installer)\n- **Window:** 2 weeks\n- **Baseline:** 12% Day 1 home-to-home retention\n- **Primary metric:** Landed home-to-home retention\n- **Secondary metrics:** Total attendance per member (app + WhatsApp combined), retention of Join Now YE attendance\n- **Decision:** Winner ships to 100%, loser deprecated\n\n---\n\n## Scope\n\n### In scope (v1)\n\n- Weekday time-controlled message flow (see full schedule below)\n- Active paid member experience only\n- Yoga Everyday (YE) session card — default for all members\n- Strong Everyday (SE) session card — **only if member is opted into Strong Everyday**\n- Health Program session card (e.g., Marma)\n- Brain Games, Box Breathing (day + night themes), Water Reminders, Community Session upcoming card\n- Recipe Poster (post-session quiz as image asset)\n- Trophy celebration (post-class milestone)\n- Feeling check-in (post-session)\n- Night reminder with personal session link (9:30 PM)\n- Persistent header: Namaste, Yoga Days counter, day strip\n- WhatsApp-style chat UI (message bubbles, typing indicator, rich cards, input bar)\n\n### Out of scope (v1 — deferred or excluded)\n\n- **Sunday session layout** (multi-session stack / \"Today's Special\" grid) — will be added post-launch, update this PRD then\n- **Paused subscription state** — will be added post-launch, update this PRD then\n- **Expired subscription state** — exists in production as-is; no change in this experiment\n- **International users** — experiment targets Indian users only. WA campaign to install is restricted to India.\n- **Renewal flow** — only active subscribers receive messages; no renewal notifications in this experiment.\n- **Quick Actions grid** (Physio / Community Calendar / Articles / Support) — **NOT in Control or Variant** for this experiment\n- **Your Poster banner** — NOT in Control or Variant\n- **Bottom nav** — NOT in Variant (WFI is home-only, no tab nav)\n- **Free-text AI responses / keyword bot** — chip-only interactions in v1\n\n---\n\n## Design & User Experience\n\n### Hero interaction\n\nMember opens the app → lands in a single chat thread. All daily content arrives as time-scheduled messages from a Habuild companion, delivered as rich cards or text bubbles. Member interacts via tap chips (A/B/C style) or rich card CTAs (Join Now, Play Now, Share Now, Start Now). No free-text input required to progress.\n\n### Persistent elements (always visible)\n\n- **Top header:**\n  - \"Namaste\" label + member name (e.g., \"Khushi bagai Ji 🙏🏻\")\n  - Yoga Days counter (blue pill box, right side)\n  - Day strip: Mon–Sat with dots (today highlighted with border, completed days filled green with ✓)\n- **Bottom input bar:**\n  - Emoji icon (left)\n  - Text input field (\"Type karein...\") — always enabled\n  - Attach icon (paperclip)\n  - Camera icon\n  - Send button (teal circle)\n\n### Visual language\n\n- **Chat background:** WhatsApp-light (#efeae2 with subtle doodle pattern)\n- **Incoming bubbles:** white background, 0/12/12/12 radius, body text 16px\n- **Outgoing bubbles:** #d9fdd3 green, 12/0/12/12 radius, blue double-tick on timestamp\n- **Time separators:** centered pill (e.g., \"6:00 AM\", \"6:00 AM · LIVE NOW\", \"7:15 AM\")\n- **Rich cards:** white card inside bubble, 12px radius, colored border-left by program:\n  - Yoga Everyday: teal (#14b8a6)\n  - Strong Everyday: pink/red (#e11d48)\n  - Health Program: purple (#7c3aed)\n  - Community Session: yellow (#eab308)\n- **Hindi / Hinglish first.** Regional language is the product.\n\n---\n\n## Time-Controlled Message Schedule (Weekday)\n\n| Time | Message | Card type | Trigger |\n|---|---|---|---|\n| 5:30 AM | Good morning greeting text | Text bubble | Scheduled |\n| 5:30 AM | Health Program (Marma) session card | Session card + Join Now | Scheduled |\n| 5:55 AM | Morning sessions intro text | Text bubble | Scheduled |\n| 6:00 AM · LIVE NOW | Yoga Everyday (Mobility & Flexibility) | Session card + LIVE badge + Join Now | Time-based |\n| 7:15 AM | Strong Everyday (Joint Strength) — Upcoming | Session card + Join Now | **Only if SE opt-in = true** |\n| 7:45 AM | Feeling check-in: \"Session ho gayi? Aaj kaisa laga?\" | Text + feeling chips | Post-session (if attended) |\n| 7:47 AM | Trophy celebration: \"X Days Completed\" + Share Now | Trophy card | If Join Now tapped earlier |\n| 8:00 AM | Recipe Poster (Habit Everyday — Better Lunch quiz) | Image card + A/B/C chips | Post-session, all members |\n| 11:00 AM | Water Reminder | Water card | Scheduled |\n| 12:00 PM | Brain Games (Sharpen your Brain) | Game card + Play Now | Scheduled (static daily) |\n| 2:00 PM | Water Reminder | Water card | Scheduled |\n| 2:30 PM | Box Breathing (day theme, bright green / nature) | Breathing card + Start | Scheduled |\n| 5:00 PM | Water Reminder | Water card | Scheduled |\n| 5:15 PM | Evening session (Yoga Everyday — Evening Flow) | Session card + Join Now | Time-based |\n| 6:30 PM | Community Session upcoming (Family Yoga Sunday) | Session card + Remind Me | Weekly announcement |\n| 9:00 PM | Night Box Breathing (Rest & Recharge, dark navy + moon) | Breathing card + Start | Scheduled |\n| 9:30 PM | Night reminder with personal session link | Rich text bubble | Scheduled |\n\n### Key rules\n\n- **SE visibility:** SE card (7:15 AM) renders only if `member.opted_in_strong_everyday === true`. Otherwise omit entirely from the thread.\n- **Session time rule:** SE session time must differ from YE session time. Default: YE 6:00 AM, SE 7:30 AM. Session card time reflects the actual class.\n- **SE card timing:** SE card is posted at 7:15 AM (15 min before the 7:30 AM SE session).\n- **Trophy + Feeling check-in** render only if the member actually joined the live class (Join Now tap tracked).\n- **Recipe Poster** renders to all members post-session, regardless of attendance.\n- **LIVE badge** shows on session card only during the actual live window (class start → class end).\n- **Night reminder personal link** is generated per member (e.g., `https://u.habuild.in/y/<member_slug>`).\n\n---\n\n## UI Components\n\n| Component | Used for |\n|---|---|\n| Session card | YE / SE / Health Program / Community (variant by color) |\n| Trophy card | Post-class milestone — \"X Days Completed + Share Now\" |\n| Water card | Water reminders — green gradient, italic Hinglish message, HABUILD watermark |\n| Box Breathing card (day) | Afternoon breathing — bright green / lake theme |\n| Box Breathing card (night) | Night breathing — dark navy + moon theme |\n| Brain Games card | Noon — amber/yellow theme |\n| Recipe Poster (image asset) | Post-session quiz — see `recipe-poster-better-lunch.jpeg` as reference |\n| Night reminder bubble | 9:30 PM rich text with bullets + personal session link |\n| Feeling chips | Post-session — \"Accha laga / Theek thaak / Thoda tough tha\" |\n| Recipe chips | A/B/C options under the recipe poster |\n| Water chips (optional) | \"Haan, piya / Abhi pee lungi\" |\n\n### Session Card States\n\n- **LIVE:** red LIVE badge with pulsing dot, active Join Now → opens live stream\n- **Upcoming:** no LIVE badge; program label includes \"· Upcoming\"; Join Now is soft queue / reminder\n- **Past / attended:** card collapses after session ends; trophy card takes over in the thread\n\n---\n\n## Notification Logic\n\n### Push Notification Universe\n\nOnly **three** types of phone push notifications exist in WFI. Everything else lives in the in-app chat (the WhatsApp-style home screen of the Habuild mobile app — **this is not actual WhatsApp**, it is the chat-style UI inside the Habuild app).\n\n| # | Type | When | Sticky? |\n|---|---|---|---|\n| A | Live Session Join | 10 min before live session starts | Sticky (pinned till session ends) |\n| B | Brain Game | 12:00 PM daily | Regular |\n| C | Box Breathing (night) | 9:00 PM daily | Regular |\n\n### Daily Matrix — Active Member\n\n*\"In-app chat\" = the WhatsApp-like chat that is the home screen of the Habuild mobile app. Not actual WhatsApp.*\n\n| Time | Item | In-app chat | Phone push |\n|---|---|---|---|\n| 5:30 AM | Good morning | ✓ | — |\n| 5:30 AM | Yoga Everyday | ✓ | — |\n| 5:50 AM | YE Join Now | — | Sticky (till 6:45) |\n| 7:15 AM | Strong Everyday *(if opted in)* | ✓ | — |\n| 7:20 AM | SE Join Now *(if opted in)* | — | Sticky (till 8:00) |\n| 11:00 AM | Water | ✓ | — |\n| 12:00 PM | Brain Game | ✓ | Regular |\n| 2:00 P
